default_install_hook_types: [commit-msg, pre-commit]
default_stages: [commit, manual]
fail_fast: true

repos:
  # Phase 1 - Init
  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 5ab6bd930e86ba0e929eedcee2be458f6b8e4936  # 0.8.16
    hooks:
      - id: uv-lock
      - id: uv-sync
        args: ["--locked", "--all-packages"]

  # Phase 2 - Formatters
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: fa93bc3224c614a0e9786d3e2d3d48edcca246eb  # v0.15.1
    hooks:
      - id: ruff-format
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # v6.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: mixed-line-ending
        args: [--fix=lf]
  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: d174eb7a8f35e05d4065c82d375ad84aa0b32352  # v0.17.2
    hooks:
      - id: markdownlint-cli2
        args: [--fix]
  - repo: https://github.com/tox-dev/pyproject-fmt
    rev: 8a22e281b3f6d1bb298aaabfc165a943a943882c  # v2.7.0
    hooks:
      - id: pyproject-fmt
        files: ^pyproject\.toml$
  - repo: https://github.com/pappasam/toml-sort
    rev: 4ec24891e200ae663aa2a7cecd19516080777133  # v0.24.2
    hooks:
      - id: toml-sort-fix
        exclude: ^(pyproject\.toml|uv\.lock)$

  # Phase 3 - Fast syntax
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: 3e8a8703264a2f4a69428a0aa4dcb512790b2c8c  # v6.0.0
    hooks:
      - id: check-added-large-files
        args: [--maxkb=600]
      - id: check-json
      - id: check-merge-conflict
      - id: check-toml
      - id: check-yaml

  # Phase 4 - Linters
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: fa93bc3224c614a0e9786d3e2d3d48edcca246eb  # v0.15.1
    hooks:
      - id: ruff-check
        args: [--fix]
  - repo: https://github.com/pre-commit/pygrep-hooks
    rev: 3a6eb0fadf60b3cccfd80bad9dbb6fae7e47b316  # v1.10.0
    hooks:
      - id: rst-backticks
      - id: rst-directive-colons
      - id: rst-inline-touching-normal
      - id: text-unicode-replacement-char
  - repo: https://github.com/codespell-project/codespell
    rev: 63c8f8312b7559622c0d82815639671ae42132ac  # v2.4.1
    hooks:
      - id: codespell
        args: [--write-changes]
  - repo: https://github.com/editorconfig-checker/editorconfig-checker.python
    rev: 61529b21391331d7cfd1f191df6293534a1fd79a  # v3.4.0
    hooks:
      - id: editorconfig-checker

  # Phase 5 - Type check
  - repo: local
    hooks:
      - id: ty-check
        name: ty-check
        language: system
        entry: uv run ty check
        pass_filenames: false

  # Phase 6 - Security & custom
  - repo: https://github.com/gitleaks/gitleaks
    rev: 2ca41cc1372d1e939a6a879f18cdc19fc1cac1ce  # v8.30.0
    hooks:
      - id: gitleaks
  - repo: local
    hooks:
      - id: scripts-have-uv-shebang
        name: scripts-have-uv-shebang
        language: pygrep
        entry: '#!/usr/bin/env -S uv run --script'
        args: [--negate]
        files: 'scripts/[^_][^/]*\.py$'
      - id: scripts-have-inline-metadata
        name: scripts-have-inline-metadata
        language: pygrep
        entry: '# /// script'
        args: [--negate]
        files: 'scripts/[^_][^/]*\.py$'
      - id: scripts-no-raw-sys-argv
        name: scripts-no-raw-sys-argv
        language: pygrep
        entry: 'sys\.argv'
        files: 'scripts/[^_][^/]*\.py$'
      - id: banned-terms
        name: banned-terms
        language: script
        entry: scripts/hooks/check-banned-terms.sh --terms "oper,medirect,finporta,opercredits,hypoooe"
        types: [text]
        exclude: ^(\.pre-commit-config\.yaml|scripts/hooks/)$

  # Phase 7 - Project-specific
  - repo: local
    hooks:
      - id: update-readme-skills
        name: Update README skills catalogue
        language: system
        entry: uv run scripts/hooks/update_readme_skills.py
        pass_filenames: false
        always_run: true

  # Phase 8 - Slow
  - repo: local
    hooks:
      - id: safety
        name: safety
        language: system
        entry: >
          bash -c "
          set -euo pipefail
          tmp=$(mktemp)
          trap 'rm -f \"$tmp\"' EXIT
          uv export --no-hashes --dev -o \"$tmp\"
          uv run safety check -r \"$tmp\" --full-report
          "
        pass_filenames: false
        files: ^(pyproject\.toml|uv\.lock)$
        stages: [commit, manual]

      - id: pytest
        name: pytest
        language: system
        entry: bash -c 'cd "$(git rev-parse --show-toplevel)" && uv run python -m pytest --no-header -q'
        pass_filenames: false
        always_run: true

  # Phase 9 - Manual
  - repo: https://github.com/semgrep/semgrep
    rev: 984f76026160ea94163eee091bc3caa876476b35  # v1.139.0
    hooks:
      - id: semgrep
        additional_dependencies: [semgrep]
        args: [--config=p/ci, --error, --timeout=120]
        stages: [manual]

  # Phase 10 - Commit-msg
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: 37b5f04f364960e8e7b361d0dbaaf8f28ec06392  # v4.2.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: [--verbose]
