{% if automation.running or automation.completed_24h %}
<div class="grid gap-3 sm:grid-cols-2 xl:grid-cols-4">
  <article class="rounded-xl border border-bark/10 bg-gradient-to-b from-moss/10 to-white px-4 py-3">
    <span class="font-sans text-[10px] font-semibold uppercase tracking-[0.2em] text-bark/50">Running</span>
    <div class="mt-2 font-display text-3xl leading-none">{{ automation.running }}</div>
  </article>
  <article class="rounded-xl border border-bark/10 bg-gradient-to-b from-bark/5 to-white px-4 py-3">
    <span class="font-sans text-[10px] font-semibold uppercase tracking-[0.2em] text-bark/50">Completed (24h)</span>
    <div class="mt-2 font-display text-3xl leading-none">{{ automation.completed_24h }}</div>
  </article>
  <article class="rounded-xl border border-bark/10 bg-gradient-to-b from-green-50 to-white px-4 py-3">
    <span class="font-sans text-[10px] font-semibold uppercase tracking-[0.2em] text-bark/50">Succeeded (24h)</span>
    <div class="mt-2 font-display text-3xl leading-none text-green-700">{{ automation.succeeded_24h }}</div>
  </article>
  <article class="rounded-xl border border-bark/10 bg-gradient-to-b from-red-50 to-white px-4 py-3">
    <span class="font-sans text-[10px] font-semibold uppercase tracking-[0.2em] text-bark/50">Failed (24h)</span>
    <div class="mt-2 font-display text-3xl leading-none {% if automation.failed_24h %}text-red-600{% else %}text-bark{% endif %}">{{ automation.failed_24h }}</div>
  </article>
</div>
{% else %}
<p class="font-sans text-sm text-bark/40">No automated activity yet.</p>
{% endif %}
