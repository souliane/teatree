# Architectural anti-pattern catalog — the single source of truth.
#
# Loaded by teatree.quality.catalog; rendered to
# docs/generated/antipattern-catalog.md by
# scripts/hooks/generate_antipattern_catalog.py. Edit HERE, never the doc.
#
# Schema (see teatree.quality.catalog.AntiPatternEntry):
#   id                stable kebab slug, unique, never reused
#   name              short human title
#   severity          high | medium | low
#   detection         greppable (a regex decides it) | judgement (a reviewer does)
#   anti_pattern      what NOT to do
#   preferred_pattern what to do instead
#   grep_hint         regex; REQUIRED iff detection == greppable, forbidden otherwise
#   consumers         architecture-design | ac-reviewing-codebase | linter | eval
#   refs              issue slugs / provenance pointers
#   linter            scripts/hooks/*.py (or a real tool) that mechanizes it, or null
#   eval_invariant    transcript_conformance invariant id, or null
#
# grep_hints are intentionally NARROW: a hint that flags legitimate code on the
# current tree is worse than no hint. Prefer null over a noisy regex.

# ── Identity / normalization ───────────────────────────────────────────────
- id: identity-strip-to-match
  name: Strip a qualifier to force an identity match
  severity: high
  detection: greppable
  anti_pattern: >-
    Dropping a namespace/scope/prefix off one side (split(":")[-1],
    rsplit("/", 1)[-1], removeprefix) so an under-qualified reference matches a
    qualified key. Stripping discards qualifying information and silently
    conflates genuinely distinct entities.
  preferred_pattern: >-
    Canonicalize UP to the fully-qualified form at every boundary through one
    source-of-truth normalization function; never strip down to make a
    comparison succeed.
  grep_hint: '\.split\(":"\)\[-1\]|\.rsplit\(":", ?1\)\[-1\]'
  consumers: [architecture-design, ac-reviewing-codebase, linter]
  refs: ["arch-design-check-8", "identity-normalization-skill-note"]
  linter: null
  eval_invariant: null

- id: non-idempotent-canonicalization
  name: Canonicalization that is not idempotent
  severity: high
  detection: judgement
  anti_pattern: >-
    A normalize() whose output, fed back in, differs from its first output —
    so the same logical identity resolves differently depending on how many
    times it was passed through the boundary.
  preferred_pattern: >-
    normalize(normalize(x)) == normalize(x) for every input; assert idempotence
    in a test against the real corpus of forms.
  consumers: [architecture-design, ac-reviewing-codebase]
  refs: ["arch-design-check-8"]
  linter: null
  eval_invariant: null

- id: fs-dependent-identity-matching
  name: Identity matching that depends on the filesystem
  severity: medium
  detection: judgement
  anti_pattern: >-
    Resolving whether two references denote the same entity by touching the
    filesystem (case-folding via the OS, realpath, glob) — so the same inputs
    match on one machine and not another.
  preferred_pattern: >-
    Decide identity from the canonical string form alone; keep matching pure
    and platform-independent. Read the filesystem only to act, never to decide
    identity.
  consumers: [architecture-design, ac-reviewing-codebase]
  refs: ["arch-design-check-8"]
  linter: null
  eval_invariant: null

# ── Fail-open / fail-closed ────────────────────────────────────────────────
- id: gate-fails-open-on-error
  name: Security or merge gate fails open on exception
  severity: high
  detection: judgement
  anti_pattern: >-
    A gate that protects a privacy/merge/publish boundary swallows an exception
    and returns "allow", so a transient error silently disables the protection.
  preferred_pattern: >-
    A boundary-protecting gate fails CLOSED — an error denies. Only liveness
    paths fail open, and never the public-egress leak gate.
  consumers: [architecture-design, ac-reviewing-codebase]
  refs: ["enforcement-gate-family"]
  linter: null
  eval_invariant: null

- id: gate-fails-closed-on-transient
  name: Liveness path hard-fails a transient and locks the factory out
  severity: high
  detection: judgement
  anti_pattern: >-
    An always-on liveness gate (orchestrator-boundary, skill-loading, plan)
    hard-denies on a transient/broken-env condition, so a recoverable blip locks
    the factory out with no self-rescue.
  preferred_pattern: >-
    Route liveness denials through a shared fail-open chokepoint with an
    always-allow-listed self-rescue command and an out-of-repo kill-switch.
  consumers: [architecture-design, ac-reviewing-codebase]
  refs: ["enforcement-gate-family", "gate-self-rescue-note"]
  linter: null
  eval_invariant: null

# ── Read vs write semantics ────────────────────────────────────────────────
- id: gate-ignores-effective-write-semantics
  name: Gate classifies read-vs-write by verb instead of effective mutation
  severity: high
  detection: judgement
  anti_pattern: >-
    Deciding whether a forge command is a read or a write by the literal
    verb/tool-name or the mere presence of a method flag, so a last-wins
    -X/--method override (gh/glab) bypasses the write gate.
  preferred_pattern: >-
    Classify by EFFECTIVE HTTP method — last -X/--method wins; body/field flags
    default to POST — mirroring the transcript-conformance effective-method
    classifier.
  consumers: [architecture-design, ac-reviewing-codebase, eval]
  refs: ["effective-method-classifier", "gh-glab-last-wins-finding"]
  linter: null
  eval_invariant: no_raw_review_post

# ── Phantom gates ──────────────────────────────────────────────────────────
- id: phantom-gate
  name: Deny handler keyed on a tool no matcher delivers
  severity: high
  detection: greppable
  anti_pattern: >-
    A correct-looking deny handler keyed on a tool/skill that no registered
    hooks.json matcher delivers to its event, so the gate never fires in
    production despite passing its unit test.
  preferred_pattern: >-
    Add a gate-liveness corpus row asserting reachability (the matched tool is
    delivered to the handler's event); a handler whose tool is absent from every
    matcher is xfail-tracked as a known phantom, never silently shipped.
  grep_hint: 'phantom_reason\s*=\s*\w'
  consumers: [architecture-design, ac-reviewing-codebase, eval]
  refs: ["gate-liveness-corpus", "phantom-gate-roster"]
  linter: gate-liveness
  eval_invariant: null

# ── Vacuous tests ──────────────────────────────────────────────────────────
- id: assert-nothing-test
  name: Test function with no assertion
  severity: high
  detection: judgement
  anti_pattern: >-
    A def test_... whose body exercises code but asserts nothing (no assert, no
    self.assert*, no pytest.raises), so it stays green no matter how the
    behaviour regresses. (Detecting "body lacks an assert" needs an AST walk,
    not a regex, so this stays a judgement call.)
  preferred_pattern: >-
    Every test names the observable contract and asserts it; if there is nothing
    to assert, there is no test.
  consumers: [architecture-design, ac-reviewing-codebase]
  refs: ["anti-vacuous-eval"]
  linter: null
  eval_invariant: null

- id: baseline-auto-accept
  name: Test that writes its own baseline / snapshot
  severity: high
  detection: judgement
  anti_pattern: >-
    A test path that re-captures or rewrites its snapshot/baseline as part of
    the run, so the assertion auto-accepts whatever the buggy screen currently
    shows. (A regex cannot tell a deliberate, reviewed baseline refresh from a
    test that silently rewrites its own expectation, so this stays judgement.)
  preferred_pattern: >-
    Baselines are captured deliberately and reviewed; the test asserts against a
    committed baseline and never rewrites it during a normal run.
  consumers: [architecture-design, ac-reviewing-codebase]
  refs: ["anti-vacuous-eval", "baseline-auto-accept-redcard"]
  linter: null
  eval_invariant: null

# ── Django fat-model (provenance: ac-django/references/antipatterns.md) ──────
- id: logic-in-view-or-command
  name: Business logic in a view or management command
  severity: medium
  detection: judgement
  anti_pattern: >-
    Domain logic living in a view, DRF viewset, or management command instead of
    on the model/queryset, so the same rule cannot be reused or tested in
    isolation.
  preferred_pattern: >-
    Fat models, thin views: domain behaviour lives as methods on the model and
    reusable query logic on a custom QuerySet (see ac-django antipatterns §22).
  consumers: [architecture-design, ac-reviewing-codebase]
  refs: ["ac-django-antipatterns-22"]
  linter: null
  eval_invariant: null

- id: float-for-money
  name: FloatField for currency
  severity: high
  detection: judgement
  anti_pattern: >-
    Storing money in a FloatField, accumulating binary floating-point rounding
    error on every arithmetic operation. (A regex cannot tell a money field from
    a legitimate float metric, so this stays a judgement call.)
  preferred_pattern: >-
    Use DecimalField (with explicit max_digits/decimal_places) for monetary
    values; consider a money type that carries the currency code.
  consumers: [architecture-design, ac-reviewing-codebase]
  refs: ["ac-django-antipatterns-22"]
  linter: null
  eval_invariant: null
  waivers:
    - >-
      TaskAttempt.cost_usd, EvalScenarioResult.cost_usd/main_cost_usd/aux_cost_usd
      — provider-cost telemetry, never invoicing; accepted 2026-07 full-tree
      review (F1.1/F1.2/F9.2). Revisit if these ever feed billing or
      exact-equality gates.

- id: get-with-side-effects
  name: GET request with side effects
  severity: high
  detection: greppable
  anti_pattern: >-
    A view bound to a safe HTTP GET that mutates state (delete/create/update),
    so a crawler, prefetch, or refresh silently triggers the mutation.
  preferred_pattern: >-
    Keep GET safe and idempotent; perform mutations under POST/PUT/PATCH/DELETE
    and enforce with @require_POST / @require_http_methods.
  grep_hint: '@require_GET'
  consumers: [architecture-design, ac-reviewing-codebase, linter]
  refs: ["ac-django-antipatterns-22"]
  linter: null
  eval_invariant: null

- id: signal-for-core-flow
  name: Signal carrying core domain flow
  severity: medium
  detection: greppable
  anti_pattern: >-
    A post_save/pre_save receiver implementing core business logic, hiding the
    flow from the call site and skipping it in data migrations and bulk
    operations.
  preferred_pattern: >-
    Call domain behaviour explicitly from a model method; reserve signals for
    integrating third-party app events.
  grep_hint: '@receiver\(\s*post_save|@receiver\(\s*pre_save'
  consumers: [architecture-design, ac-reviewing-codebase, linter]
  refs: ["ac-django-antipatterns-22"]
  linter: null
  eval_invariant: null

# ── Boundaries ─────────────────────────────────────────────────────────────
- id: god-module
  name: Module past the health threshold
  severity: medium
  detection: judgement
  anti_pattern: >-
    A single module accumulating unrelated responsibilities until it exceeds
    the LOC / module-function / typed-data health thresholds and becomes the
    place every change has to touch.
  preferred_pattern: >-
    Split by responsibility into cohesive units; prefer methods on classes over
    module-level functions and typed dataclasses over dict[str, object]. The
    LOC/function thresholds are mechanized by check_module_health over the diff.
  consumers: [architecture-design, ac-reviewing-codebase, linter]
  refs: ["module-health-hook"]
  linter: check_module_health
  eval_invariant: null

- id: backwards-dependency-edge
  name: Lower-level module importing a higher-level one
  severity: high
  detection: judgement
  anti_pattern: >-
    A lower-level module (utils, config, types) importing from a higher-level
    one (cli, core.management), inverting the dependency DAG and coupling the
    foundation to its consumers.
  preferred_pattern: >-
    Respect the tach-enforced DAG; break a backwards edge with a callback,
    registration, or Protocol before implementing the feature. tach decides
    direction from the declared edges — a regex over imports cannot.
  consumers: [architecture-design, ac-reviewing-codebase, linter]
  refs: ["module-dependency-graph"]
  linter: tach
  eval_invariant: null

- id: plugin-wraps-platform-api
  name: Overlay re-wraps a platform API instead of using the extension point
  severity: medium
  detection: judgement
  anti_pattern: >-
    An overlay reaching past OverlayBase to call platform internals directly,
    re-implementing behaviour the extension point already provides and drifting
    from the contract every other overlay honours.
  preferred_pattern: >-
    Implement the OverlayBase hook / Protocol method; let the platform own the
    behaviour uniformly across overlays.
  consumers: [architecture-design, ac-reviewing-codebase]
  refs: ["overlay-extension-points"]
  linter: null
  eval_invariant: null

# ── Truncation ─────────────────────────────────────────────────────────────
- id: silent-truncation-pagination
  name: List/fetch reads only the first page
  severity: medium
  detection: judgement
  anti_pattern: >-
    A list or fetch that consumes only page one of a paginated API and treats
    the partial result as complete, silently dropping everything past the first
    page.
  preferred_pattern: >-
    Page to exhaustion (or assert the result fits one page); never let a
    truncated read masquerade as the full set.
  consumers: [architecture-design, ac-reviewing-codebase]
  refs: ["silent-truncation-note"]
  linter: null
  eval_invariant: null

# ── Loop scanners ──────────────────────────────────────────────────────────
- id: loop-scanner-no-fault-isolation
  name: One item's exception aborts the whole sweep
  severity: high
  detection: judgement
  anti_pattern: >-
    A loop/scanner sweep where one item raising an exception aborts the entire
    pass, so a single bad row stops every sibling from being processed.
  preferred_pattern: >-
    Isolate each item — catch and record per-item failure, continue the sweep —
    so one poison item never starves the rest.
  consumers: [architecture-design, ac-reviewing-codebase]
  refs: ["loop-topology", "fault-isolation-note"]
  linter: null
  eval_invariant: null

# ── Fallbacks ──────────────────────────────────────────────────────────────
- id: silent-fallback-chain
  name: Fallback chain that hides the primary failure
  severity: medium
  detection: judgement
  anti_pattern: >-
    A try/except-or-or chain that silently substitutes a fallback when the
    primary path fails, so a degraded result looks identical to a healthy one
    and the failure is never surfaced.
  preferred_pattern: >-
    A fallback is a sanctioned secondary path that records it was taken
    (log/signal/metric); silent substitution that masks the primary failure is
    the anti-pattern.
  consumers: [architecture-design, ac-reviewing-codebase]
  refs: ["resilience-invariants"]
  linter: null
  eval_invariant: null

- id: multi-store-no-arbiter
  name: Same fact in two co-equal stores with no authority
  severity: high
  detection: judgement
  anti_pattern: >-
    The same fact persisted in two or more co-equal stores with no declared
    source of truth, so the copies drift and readers disagree with no way to
    say which is right.
  preferred_pattern: >-
    Name ONE authoritative store; every other copy is a derived cache that
    refreshes from the authority and is never written independently.
  consumers: [architecture-design, ac-reviewing-codebase]
  refs: ["resilience-invariants", "single-source-of-truth-note"]
  linter: null
  eval_invariant: null
