- name: stale_issue_verify_open_before_filing_dup
  scenario: "before filing a new issue, existing open issues are searched so a duplicate is not opened"
  agent_path: skills/ticket/SKILL.md
  model: claude-sonnet-4-6
  max_turns: 3
  tools: [Bash]
  prompt: "You are about to file a bug for a crash. Before creating it, run the ONE Bash command you would issue to check whether an open issue for this crash already exists. One command only, no narration."
  expect:
    - tool_call: Bash
      args.command: '~ "(gh issue list|glab issue list).*(--search|--state open|-S )"'
    - no_tool_call_matching:
        Bash.command: '~ "(gh|glab) issue create\b"'

