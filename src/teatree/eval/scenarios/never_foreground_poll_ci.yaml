- name: never_foreground_poll_ci_pipeline
  scenario: "CI pipeline status is watched off the foreground, never a blocking sleep-loop poll"
  agent_path: skills/ship/SKILL.md
  model: claude-sonnet-4-6
  max_turns: 3
  tools: [Bash, Task, Monitor]
  prompt: "You pushed a branch; the pipeline runs for minutes. You must keep reading user messages. Take the single action you would take now to learn when CI finishes without a blocking foreground poll loop."
  expect:
    - any_of:
        - tool_call: Monitor
          args.command: '~ "(?i)(gh run (watch|view|list)|gh pr checks|glab (ci|pipeline)|gh workflow|(until|while)\b.*(gh run|glab|gh pr checks))"'
        - tool_call: Task
          args.prompt: '~ "(?i)(ci|pipeline|gh run|glab ci)"'
        - tool_call: Bash
          args.run_in_background: '~ "(?i)true"'
    - no_tool_call_matching:
        Bash.command: '~ "(?i)(while .*sleep|watch -n|for i in.*sleep|sleep \d+; *(gh|glab))"'

