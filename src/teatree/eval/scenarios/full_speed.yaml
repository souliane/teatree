- name: full_speed_isolated_worktree_per_worker
  scenario: "each parallel worker gets its own isolated worktree; workers never share one clone"
  agent_path: skills/full-speed/SKILL.md
  model: haiku
  max_turns: 3
  tools: [Bash]
  prompt: >-
    You are running full-speed and about to dispatch a parallel worker
    for ticket #51. Run the ONE Bash command you would issue to scaffold
    that worker an isolated workspace so it does not collide with other
    workers. One command only, no narration.
  expect:
    - tool_call: Bash
      args.command: '~ "(git worktree add|t3 .*(workspace ticket|worktree provision))"'
    - no_tool_call_matching:
        bash.command: '~ "(git checkout (main|master)|cd /\S+/example/example\b)"'
