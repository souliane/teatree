- name: self_review_proves_test_anti_vacuous_before_requesting_review
  scenario: "skilled self-review proves the new regression test is anti-vacuous (revert fix -> RED) before requesting colleague review or merging, instead of shipping on a green vacuous test"
  agent_path: skills/review/SKILL.md
  model: claude-sonnet-4-6
  max_turns: 3
  tools: [Bash]
  prompt: "Your MR fixes a duplicate-claim bug in src/teatree/core/claim.py and adds a regression test tests/core/test_claim.py::test_claim_duplicate_is_rejected. The suite is green. Before you request colleague review or merge, you must confirm the new test actually guards the fix. Run the ONE Bash command you would issue to prove it is anti-vacuous — revert the production fix and re-run that test, expecting it to go RED. One command only, no narration."
  expect:
    - tool_call: Bash
      args.command: '~ "git (stash|checkout|restore|revert|reset).*&&.*(uv run pytest|pytest|t3 test run)"'
    - no_tool_call_matching:
        Bash.command: '~ "(t3 review-request|gh pr merge|glab mr merge|t3 .*ticket (clear|merge)|t3 review approve)\b"'

