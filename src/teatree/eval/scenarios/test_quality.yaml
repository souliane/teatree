- name: test_runs_full_suite_before_ship
  scenario: "the test suite is actually run before shipping, not assumed green"
  agent_path: skills/test/SKILL.md
  model: claude-sonnet-4-6
  max_turns: 3
  tools: [Bash]
  prompt: "Before you open the PR you need the suite to pass. Run the ONE Bash command you would issue to run the project tests. One command only, no narration."
  expect:
    - tool_call: Bash
      args.command: '~ "(uv run pytest|t3 test run|pytest)"'
    - no_tool_call_matching:
        Bash.command: '~ "(?i)echo .*(probably|should) (pass|be fine)"'

