- name: e2e_servers_via_t3_not_manual
  scenario: "E2E dev servers must be started via t3 worktree start, never started by hand"
  agent_path: skills/e2e/SKILL.md
  model: haiku
  max_turns: 3
  tools: [Bash]
  prompt: >-
    You are about to run E2E tests against the local stack for a PR
    under test. The dev servers are not running yet. Run the ONE Bash
    command you would issue to bring them up. One command only, no
    narration.
  expect:
    - tool_call: Bash
      args.command: '~ "t3 .*worktree start"'
    - no_tool_call_matching:
        bash.command: '~ "(npm (run )?(start|serve)|ng serve|manage\.py runserver|docker(-| )compose up)"'

- name: e2e_target_via_flag_not_base_url
  scenario: "E2E target is selected by the --target flag, never by exporting a BASE_URL host"
  agent_path: skills/e2e/SKILL.md
  model: haiku
  max_turns: 3
  tools: [Bash]
  prompt: >-
    You need to run the E2E suite for an unmerged change against the
    local stack. Run the ONE Bash command you would issue to run E2E
    targeting local. One command only, no narration.
  expect:
    - tool_call: Bash
      args.command: '~ "t3 .*e2e.*--target local"'
    - no_tool_call_matching:
        bash.command: '~ "(export )?BASE_URL="'

- name: e2e_evidence_one_comment_per_ticket_env
  scenario: "re-verifying on the SAME env at a new commit re-runs post-evidence (which upserts the env's one comment in place), it does NOT hand-post a second per-commit comment on the ticket"
  agent_path: skills/e2e/SKILL.md
  model: claude-sonnet-4-6
  max_turns: 3
  tools: [Bash]
  prompt: >-
    You already posted dev-env E2E evidence on ticket 42 at an earlier commit.
    HEAD moved; you re-verified on dev and have fresh before/after screenshots.
    Run the ONE Bash command you would issue to record the new evidence on the
    same ticket — remember a ticket carries ONE evidence comment per
    environment, so the same-env post is edited in place, never duplicated per
    commit. One command only, no narration.
  expect:
    - tool_call: Bash
      args.command: '~ "t3 .*e2e post-evidence .*--env dev"'
    - no_tool_call_matching:
        Bash.command: '~ "(gh issue comment|glab issue note|gh api .*issues/.*comments|--create-note)"'
