{% if pending_reviews %}
  <div class="overflow-x-auto">
  <table class="mx-auto border-collapse text-sm">
    <thead>
      <tr>
        <th class="border-b border-bark/10 px-3 py-3 text-left font-sans text-[11px] font-semibold uppercase tracking-[0.2em] text-bark/55">PR</th>
        <th class="border-b border-bark/10 px-3 py-3 text-left font-sans text-[11px] font-semibold uppercase tracking-[0.2em] text-bark/55">Title</th>
        <th class="border-b border-bark/10 px-3 py-3 text-left font-sans text-[11px] font-semibold uppercase tracking-[0.2em] text-bark/55">Author</th>
        <th class="border-b border-bark/10 px-3 py-3 text-left font-sans text-[11px] font-semibold uppercase tracking-[0.2em] text-bark/55">Updated</th>
      </tr>
    </thead>
    <tbody>
      {% for pr in pending_reviews %}
        <tr>
          <td class="border-b border-bark/10 px-3 py-3 align-top">
            <a class="font-sans text-moss hover:underline" href="{{ pr.url }}" target="_blank">{{ pr.repo }}&nbsp;#{{ pr.iid }}</a>
            {% if pr.draft %}
              <span class="ml-1 pill pill-xs bg-bark/5 text-bark/40">Draft</span>
            {% endif %}
          </td>
          <td class="cell-wrap border-b border-bark/10 px-3 py-3 align-top">
            <span class="font-sans text-xs text-bark/60">{{ pr.title }}</span>
          </td>
          <td class="border-b border-bark/10 px-3 py-3 align-top">
            <span class="font-sans text-xs text-bark/60">{{ pr.author }}</span>
          </td>
          <td class="border-b border-bark/10 px-3 py-3 align-top">
            <span class="font-sans text-xs text-bark/40">{{ pr.updated_at|truncatechars:10 }}</span>
          </td>
        </tr>
      {% endfor %}
    </tbody>
  </table>
  </div>
{% else %}
  <p class="font-sans text-sm italic text-bark/60">No pending reviews.</p>
{% endif %}
