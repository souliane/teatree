<div class="space-y-2">
  <div class="flex items-center gap-2">
    <span class="font-sans text-xs font-semibold uppercase tracking-[0.18em] text-bark/50">Lifecycle — #{{ ticket_id }}</span>
  </div>

  {% if not mermaid %}
  <p class="font-sans text-sm italic text-bark/50">No transitions recorded for this ticket.</p>
  {% else %}
  <div class="mermaid text-sm bg-white/60 rounded-lg p-4 overflow-x-auto">{{ mermaid }}</div>
  {% endif %}
</div>
