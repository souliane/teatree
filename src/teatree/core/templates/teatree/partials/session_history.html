<div class="space-y-3 max-h-[600px] overflow-y-auto">
  <div class="font-sans text-xs text-bark/50 uppercase tracking-[0.18em]">Session {{ session_id|truncatechars:12 }}</div>
  {% for msg in messages %}
  <div class="rounded-xl px-4 py-3 {% if msg.role == 'user' %}bg-moss/10 border border-moss/20{% else %}bg-bark/5 border border-bark/10{% endif %}">
    <span class="font-sans text-[10px] font-semibold uppercase tracking-[0.18em] {% if msg.role == 'user' %}text-moss{% else %}text-bark/50{% endif %}">{{ msg.role }}</span>
    <pre class="mt-1 whitespace-pre-wrap break-words font-sans text-sm leading-relaxed text-bark/80 overflow-x-auto max-w-full">{{ msg.text }}</pre>
  </div>
  {% endfor %}
  {% if not messages %}
  <p class="font-sans text-sm text-bark/40">No messages found.</p>
  {% endif %}
</div>
