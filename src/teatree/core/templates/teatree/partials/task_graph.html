<div class="space-y-2">
  <div class="flex items-center gap-2">
    <span class="font-sans text-xs font-semibold uppercase tracking-[0.18em] text-bark/50">Task Graph — #{{ ticket_id }}</span>
  </div>

  {% if not graph %}
  <p class="font-sans text-sm italic text-bark/50">No tasks for this ticket.</p>
  {% else %}
  <div class="space-y-1">
    {% for node in graph %}
    {% include "teatree/partials/_task_graph_node.html" with node=node %}
    {% endfor %}
  </div>
  {% endif %}
</div>
