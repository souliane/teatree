<div class="space-y-3">
  <div class="flex items-center justify-between">
    <h3 class="font-display text-xl">Task Graph — Ticket #{{ ticket_id }}</h3>
    <button onclick="closeTaskModal()" class="rounded-full p-2 text-bark/40 hover:bg-bark/10 hover:text-bark transition">
      <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
    </button>
  </div>

  {% if not graph %}
  <p class="font-sans text-sm italic text-bark/50">No tasks for this ticket.</p>
  {% else %}
  <div class="space-y-1">
    {% for node in graph %}
    {% include "teatree/partials/_task_graph_node.html" with node=node %}
    {% endfor %}
  </div>
  {% endif %}
</div>
