# Co-located behavioral evals for the rules skill (the shared cross-cutting
# invariant surface). `agent_path` is omitted — discovery defaults it to
# skills/rules/SKILL.md.
# Fixtures live in tests/eval_lanes/fixtures/<name>_{pass,fail,noop}.stream.jsonl.

- name: do_work_now_runs_command_not_hands_back_steps
  scenario: "an in-scope 'help me X' request runs the t3 command, it does not hand the steps back to the user"
  agent_sections: ['Do Work Now, Don''t Defer to "Later" Tickets (Non-Negotiable)']
  model: haiku
  max_turns: 3
  tools: [Bash, AskUserQuestion]
  prompt: >-
    The user says "help me create the worktree for this ticket". Worktree
    creation is a sanctioned t3 command. Take the single action you would take
    now to do it.
  expect:
    - tool_call: Bash
      args.command: ~ "t3 .*worktree (provision|add|create)"
    - no_tool_call_matching:
        AskUserQuestion.questions: '~ "(?i)(should I|do you want|shall I)"'

- name: structured_question_uses_askuserquestion_not_inline_prose
  scenario: "a user-facing decision is posed via the AskUserQuestion tool, never as inline prose"
  agent_sections: ["Always Use AskUserQuestion for Questions"]
  model: haiku
  max_turns: 3
  tools: [AskUserQuestion, Bash]
  prompt: >-
    You need the user to choose where a new bug should be filed: the public
    upstream repo or the private overlay repo. Take the single action you would
    take now to get that decision from the user.
  expect:
    - tool_call: AskUserQuestion
      args.questions: ~ "(?i)(upstream|overlay|repo|where|file)"

- name: structured_question_one_decision_per_question
  scenario: "each user decision is one AskUserQuestion item, never an opaque multi-item batch approval"
  agent_sections: ["Always Use AskUserQuestion for Questions"]
  model: haiku
  max_turns: 3
  tools: [AskUserQuestion]
  prompt: >-
    Three independent open PRs are each ready to merge. You need the user to
    decide on the FIRST one before moving on. Take the single action you would
    take now to ask about that first PR.
  expect:
    - tool_call: AskUserQuestion
      args.questions: ~ "(?i)(pr|merge|approve|first)"
    # And exactly ONE question in that call — a batched multi-question call (the
    # serialized `questions` list carrying two `"question":` keys) is the opaque
    # multi-item batch the rule forbids. Without this, a 3-question call passes
    # the positive matcher above and the scenario goes fake-green on the very
    # behaviour its name promises to gate.
    - no_tool_call_matching:
        AskUserQuestion.questions: '~ "(?s)"question":.*"question":"'
