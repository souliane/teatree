# teatree headless deployment — one image, five services
# (init/worker/admin/slack-listener/watchdog) sharing named volumes so init
# installs teatree once and worker/admin run it.
#
# The box-side env file `teatree.env` (next to this file, gitignored, written by
# the deploy workflow) supplies the non-secret runtime env and the Anthropic auth
# path. The GitHub token and admin password are NOT kept here as plaintext: the
# entrypoint sources them from the box's gpg-encrypted `pass` store at boot
# (#3454 — TEATREE_GH_TOKEN / T3_ADMIN_PASSWORD, see deploy/entrypoint.sh and
# deploy/README.md). Other non-secret runtime config (clone/repo paths, uv dirs)
# is baked into the image.
name: teatree

x-teatree-common: &teatree-common
  image: teatree-headless:latest
  build:
    context: ..
    dockerfile: deploy/Dockerfile
  env_file:
    - teatree.env
  # All services mount all state so admin and worker share ONE db.sqlite3
  # (WAL — safe concurrent reads) and one editable install. The DB, worktrees,
  # and workspaces are HOST bind mounts at their canonical absolute paths, so the
  # container and the host see the same files (path identity — no XDG knob). This
  # puts the factory's DB on the same daily-backed-up host disk as the operator's
  # real DB instead of a Docker-internal named volume.
  volumes:
    - teatree_src:/home/teatree/teatree
    - type: bind
      source: /home/teatree/.local/share/teatree
      target: /home/teatree/.local/share/teatree
    - type: bind
      source: /home/teatree/.local/share/teatree-worktrees
      target: /home/teatree/.local/share/teatree-worktrees
    - type: bind
      source: /home/teatree/workspace/t3-workspaces
      target: /home/teatree/workspace/t3-workspaces
    # Credential plane: the host-provisioned pass store + its GPG home, as
    # DEDICATED mounts decoupled from the data dir (a data-dir change must never
    # orphan credentials again, as #3262 did). Path identity; rw — gpg-agent
    # binds its socket and lock files inside GNUPGHOME on a headless box, and the
    # slack/postgres secret writers insert into pass at runtime. Secrets stay
    # gpg-encrypted on the host disk, OUTSIDE the backed-up data dir.
    - type: bind
      source: /home/teatree/.password-store
      target: /home/teatree/.password-store
    - type: bind
      source: /home/teatree/.gnupg
      target: /home/teatree/.gnupg
    # Claude session plane: session transcripts + per-project memory corpus —
    # the dream pass's input AND product (#3277 classifies dream's use as PRODUCT
    # DATA: it reads transcripts and maintains */memory; runtime STATE still never
    # resolves from assistant memory). Without this the containerized dream pass
    # globs an empty ~/.claude/projects and every nightly consolidation is a
    # permanent no-op (0 members). Path identity; rw — dream phases 4-6 write
    # cross-links / MEMORY.md / decay archives, and container-run headless sessions
    # persist their transcripts to the backed-up host disk. Scoped to projects/
    # only, never the whole ~/.claude — the reason is CREDENTIALS
    # (~/.claude/.credentials.json) which must stay host-only, NOT settings.
    # settings.json is non-secret and needs its own provisioning: the init role
    # generates it from the image-baked deploy/claude-settings.template.json (+ env
    # overrides) so the headless agent's model / permission mode / autoMode grants
    # / tool-use concurrency are configurable rather than stock CLI defaults
    # (#3359 — see deploy/entrypoint.sh seed_claude_settings).
    - type: bind
      source: /home/teatree/.claude/projects
      target: /home/teatree/.claude/projects
    - teatree_uv:/opt/teatree/uv
  init: true

services:
  # One-shot prep. worker/admin wait for this to exit 0, so the editable install
  # on the shared clone never races.
  teatree-init:
    <<: *teatree-common
    environment:
      TEATREE_ROLE: init
    restart: "no"

  # The loop cadence owner. DEBUG off — a long-running DEBUG Django process grows
  # connection.queries unboundedly.
  teatree-worker:
    <<: *teatree-common
    environment:
      TEATREE_ROLE: worker
      T3_DEBUG: "0"
    depends_on:
      teatree-init:
        condition: service_completed_successfully
    restart: unless-stopped
    # The worker's CPU/RAM caps are DERIVED FROM THE REAL HOST at deploy time
    # (#3432): deploy/deploy.sh runs uncapped on the host, reads its true
    # cores/RAM via src/teatree/utils/ram_probe.py, and exports
    # TEATREE_WORKER_CPUS / TEATREE_WORKER_MEM_LIMIT before `docker compose up`.
    # The cgroup cap then reflects the host, so inside the worker
    # `available_cpu_count` derives provision concurrency from the host instead
    # of a baked-in 3-core cap that made host-derived concurrency a no-op. The
    # in-file defaults below apply only when deploy.sh did not export a value
    # (python3 absent / RAM unreadable, or a bare `docker compose up`): ~18g and
    # 3 cores, the pre-#3432 hard-coded caps sized for a ~30GB host.
    mem_limit: "${TEATREE_WORKER_MEM_LIMIT:-18g}"
    cpus: "${TEATREE_WORKER_CPUS:-3.0}"

  # Django admin (gunicorn), DEBUG off like the worker — /admin/ mounts
  # unconditionally now, so the admin no longer needs DEBUG (and inherits the
  # same connection.queries-leak fix). Host networking binds it to the BOX
  # loopback (127.0.0.1:8000): the SSH tunnel is the security boundary, and the
  # middleware sees a genuine 127.0.0.1 client (a published bridge port would NAT
  # the source to the docker gateway). With a loopback-only bind the middleware's
  # loopback check is defense-in-depth against a bind misconfig, not the primary
  # gate. Host port 8000 must be free on the box. Reach it via an SSH tunnel.
  teatree-admin:
    <<: *teatree-common
    environment:
      TEATREE_ROLE: admin
      T3_DEBUG: "0"
    depends_on:
      teatree-init:
        condition: service_completed_successfully
    restart: unless-stopped
    network_mode: host
    mem_limit: 512m
    cpus: "0.5"

  # The Slack Socket-Mode receiver. Runs `t3 slack listen` for every
  # Slack-enabled overlay, writing inbound DMs/mentions/reactions to the JSONL
  # queue on the shared data mount that the worker's drain-queue slot drains.
  # Separate from the worker so a WebSocket reconnect never disturbs the loop
  # cadence, and vice-versa. Harmless on a box with no Slack overlay: the
  # process exits and `restart: unless-stopped` retries.
  teatree-slack-listener:
    <<: *teatree-common
    environment:
      TEATREE_ROLE: slack-listener
      T3_DEBUG: "0"
    depends_on:
      teatree-init:
        condition: service_completed_successfully
    restart: unless-stopped
    mem_limit: 512m
    cpus: "0.5"

  # In-daemon self-heal watchdog — the cross-platform (Linux + macOS) replacement
  # for the Linux-only systemd timer (#3289). The Docker daemon is the only
  # supervisor present on both platforms, so the watchdog lives in the daemon as a
  # sidecar container the daemon keeps alive independently of the stack it watches.
  #
  # Deliberately a STANDALONE block (NOT the x-teatree-common anchor): the anchor
  # would drag in the DB/credential/session bind mounts, the teatree.env secrets,
  # and a depends_on on init — all of which the watchdog must NOT have. It needs
  # only the docker socket + a read-only view of this checkout.
  teatree-watchdog:
    image: teatree-headless:latest
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    environment:
      TEATREE_ROLE: watchdog
      TEATREE_WATCHDOG_INTERVAL: "300"
    # root so /var/run/docker.sock is readable regardless of the host docker gid
    # (the socket is root-equivalent anyway; see README § security posture).
    user: "0:0"
    volumes:
      # The daemon control channel — the watchdog's only mutating capability.
      - /var/run/docker.sock:/var/run/docker.sock
      # This checkout, READ-ONLY, at PATH IDENTITY (source == target). Path
      # identity keeps the inner `docker compose ... up -d` config hash identical
      # to the host's, so the watchdog never recreates itself or the app services.
      - type: bind
        source: /home/teatree/teatree-deploy
        target: /home/teatree/teatree-deploy
        read_only: true
    # NO depends_on — it must start even when init crash-loops (the whole point).
    # restart: always (NOT unless-stopped) — it must resurrect even after a manual
    # stop followed by a daemon restart, so the supervisor is never silently gone.
    restart: always
    # The socket is the only channel it needs; the owner DM goes out via a
    # `compose exec` inside an app container, not from this container's network.
    network_mode: "none"
    init: true
    mem_limit: 128m
    cpus: "0.25"

volumes:
  teatree_src:
  teatree_uv:
