# teatree headless deployment — one image, three services (init/worker/admin)
# sharing named volumes so init installs teatree once and worker/admin run it.
#
# The box-side secrets file `teatree.env` (next to this file, gitignored, written
# by the deploy workflow) supplies every credential. Non-secret runtime config
# (clone/repo paths, uv dirs) is baked into the image.
name: teatree

x-teatree-common: &teatree-common
  image: teatree-headless:latest
  build:
    context: ..
    dockerfile: deploy/Dockerfile
  env_file:
    - teatree.env
  # All services mount all state so admin and worker share ONE db.sqlite3
  # (WAL — safe concurrent reads) and one editable install. The DB, worktrees,
  # and workspaces are HOST bind mounts at their canonical absolute paths, so the
  # container and the host see the same files (path identity — no XDG knob). This
  # puts the factory's DB on the same daily-backed-up host disk as the operator's
  # real DB instead of a Docker-internal named volume.
  volumes:
    - teatree_src:/home/teatree/teatree
    - type: bind
      source: /home/teatree/.local/share/teatree
      target: /home/teatree/.local/share/teatree
    - type: bind
      source: /home/teatree/.local/share/teatree-worktrees
      target: /home/teatree/.local/share/teatree-worktrees
    - type: bind
      source: /home/teatree/workspace/t3-workspaces
      target: /home/teatree/workspace/t3-workspaces
    # Credential plane: the host-provisioned pass store + its GPG home, as
    # DEDICATED mounts decoupled from the data dir (a data-dir change must never
    # orphan credentials again, as #3262 did). Path identity; rw — gpg-agent
    # binds its socket and lock files inside GNUPGHOME on a headless box, and the
    # slack/postgres secret writers insert into pass at runtime. Secrets stay
    # gpg-encrypted on the host disk, OUTSIDE the backed-up data dir.
    - type: bind
      source: /home/teatree/.password-store
      target: /home/teatree/.password-store
    - type: bind
      source: /home/teatree/.gnupg
      target: /home/teatree/.gnupg
    # Claude session plane: session transcripts + per-project memory corpus —
    # the dream pass's input AND product (#3277 classifies dream's use as PRODUCT
    # DATA: it reads transcripts and maintains */memory; runtime STATE still never
    # resolves from assistant memory). Without this the containerized dream pass
    # globs an empty ~/.claude/projects and every nightly consolidation is a
    # permanent no-op (0 members). Path identity; rw — dream phases 4-6 write
    # cross-links / MEMORY.md / decay archives, and container-run headless sessions
    # persist their transcripts to the backed-up host disk. Scoped to projects/
    # only, never the whole ~/.claude (credentials + settings stay host-only).
    - type: bind
      source: /home/teatree/.claude/projects
      target: /home/teatree/.claude/projects
    - teatree_uv:/opt/teatree/uv
  init: true

services:
  # One-shot prep. worker/admin wait for this to exit 0, so the editable install
  # on the shared clone never races.
  teatree-init:
    <<: *teatree-common
    environment:
      TEATREE_ROLE: init
    restart: "no"

  # The loop cadence owner. DEBUG off — a long-running DEBUG Django process grows
  # connection.queries unboundedly.
  teatree-worker:
    <<: *teatree-common
    environment:
      TEATREE_ROLE: worker
      T3_DEBUG: "0"
    depends_on:
      teatree-init:
        condition: service_completed_successfully
    restart: unless-stopped
    mem_limit: 5g
    cpus: "3.0"

  # Django admin (gunicorn), DEBUG off like the worker — /admin/ mounts
  # unconditionally now, so the admin no longer needs DEBUG (and inherits the
  # same connection.queries-leak fix). Host networking binds it to the BOX
  # loopback (127.0.0.1:8000): the SSH tunnel is the security boundary, and the
  # middleware sees a genuine 127.0.0.1 client (a published bridge port would NAT
  # the source to the docker gateway). With a loopback-only bind the middleware's
  # loopback check is defense-in-depth against a bind misconfig, not the primary
  # gate. Host port 8000 must be free on the box. Reach it via an SSH tunnel.
  teatree-admin:
    <<: *teatree-common
    environment:
      TEATREE_ROLE: admin
      T3_DEBUG: "0"
    depends_on:
      teatree-init:
        condition: service_completed_successfully
    restart: unless-stopped
    network_mode: host
    mem_limit: 512m
    cpus: "0.5"

volumes:
  teatree_src:
  teatree_uv:
