rules:
  - id: except-swallow-to-empty
    languages: [python]
    severity: ERROR
    message: >-
      except handler returns "" with no log: a fetch failure (auth/network/HTTP)
      is flattened into a sentinel indistinguishable from a genuinely-empty
      value. Catch the specific failure exceptions, log the cause
      (logger.warning / logger.exception with context), then return the sentinel
      — so a failure is observable and never masquerades as a successfully
      fetched empty value. See overlay.py get_issue_title.
    metadata:
      issue: BLOCKING-NOW
      status: blocking
    paths:
      include:
        - "/src/teatree/core/overlay.py"
    patterns:
      - pattern: |
          try:
              ...
          except $EXC:
              return ""
      - pattern-not: |
          try:
              ...
          except $EXC:
              ...
              logger.$LEVEL(...)
              ...
              return ""
