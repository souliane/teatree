rules:
  - id: cas-stamp-before-side-effect
    languages: [python]
    severity: ERROR
    message: >-
      A CAS receipt is claimed before a Slack side-effect that has no
      release-on-failure. Claim -> side-effect -> release: stamp the CAS to
      claim the slot (exactly-once), then post/react, then release the claim
      (unmark_eyes_reacted / unmark_loop_replied) inside an `except` so a
      failed side-effect retries instead of leaving a receipt that says
      "done" while nothing landed. Wrap the post/react in try/except and
      roll the claim back on failure, as react_merge_on_post does with
      _release_post in review_request_merge_react.py.
    metadata:
      issue: BLOCKING-NOW
      status: blocking
    paths:
      include:
        - "/src/teatree/loop/slack_answer/cycle.py"
    patterns:
      - pattern: $B.react(...)
      - pattern-either:
          - pattern-inside: |
              if $C or not $X.mark_eyes_reacted():
                  continue
              ...
          - pattern-inside: |
              if not $X.mark_eyes_reacted():
                  continue
              ...
          - pattern-inside: |
              if not _mark_unit_loop_replied(...):
                  return False
              ...
      - pattern-not-inside: |
          try:
              ...
          except ...:
              ...
              $R.unmark_eyes_reacted()
              ...
      - pattern-not-inside: |
          try:
              ...
          except ...:
              ...
              _unmark_unit_loop_replied(...)
              ...
