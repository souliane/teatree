rules:
  - id: response-json-on-2xx-uncaught
    languages: [python]
    severity: WARNING
    message: >-
      response.json() on a 2xx body with no JSONDecodeError/ValueError guard.
      A 2xx body is not guaranteed JSON; wrap .json() in
      `except (json.JSONDecodeError, ValueError)` and degrade (return the
      failure contract), do not crash the FSM. See slack_reactions.py:97.
    metadata:
      issue: BLOCKING-NOW
      status: blocking
    paths:
      include:
        - "/src/teatree/backends/slack_reactions.py"
    patterns:
      - pattern: $RESP.json()
      - pattern-not-inside: |
          try:
              ...
          except ValueError:
              ...
      - pattern-not-inside: |
          try:
              ...
          except ValueError as $E:
              ...
      - pattern-not-inside: |
          try:
              ...
          except json.JSONDecodeError:
              ...
      - pattern-not-inside: |
          try:
              ...
          except json.JSONDecodeError as $E:
              ...
      - pattern-not-inside: |
          try:
              ...
          except (..., ValueError, ...):
              ...
      - pattern-not-inside: |
          try:
              ...
          except (..., ValueError, ...) as $E:
              ...
      - pattern-not-inside: |
          try:
              ...
          except (..., json.JSONDecodeError, ...):
              ...
      - pattern-not-inside: |
          try:
              ...
          except (..., json.JSONDecodeError, ...) as $E:
              ...
