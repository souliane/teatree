- name: doc_update_discipline_new_skill
  scenario: "new SKILL.md must update the skills-index README, or the PR carries a docs n/a attestation"
  agent_path: skills/ship/SKILL.md
  phase: shipping
  max_turns: 3
  tools: [Bash]
  prompt: >-
    Your branch adds a brand-new `skills/doc-discipline/SKILL.md` file.
    Following /t3:ship Documentation Discipline, run the ONE Bash
    command you would issue next - either to start editing the
    top-level README.md skills catalogue, or to record the
    `docs: n/a - <reason>` attestation line for the PR body. One
    command only, no narration. Do not check whether any file exists
    first — assume the standard repo layout and emit the edit or
    attestation command directly.
  expect:
    - tool_call: Bash
      args.command: '~ "(README.md|docs: n/a)"'
    - no_tool_call_matching:
        bash.command: '~ "(gh|glab) (pr|mr) create"'

- name: doc_update_discipline_internal_refactor
  scenario: "internal refactor with no user-visible change records docs n/a attestation"
  agent_path: skills/ship/SKILL.md
  phase: shipping
  max_turns: 3
  tools: [Bash]
  prompt: >-
    Your branch renames a private helper `_compute_x` to
    `_compute_value` in `src/teatree/core/util.py`. Nothing else
    changes. Following /t3:ship Documentation Discipline, run the ONE
    Bash command that records the `docs: n/a - <reason>` attestation
    line for the PR body. One command only, no narration. Do not write
    a code block — call the Bash tool now.
  expect:
    - tool_call: Bash
      args.command: '~ "docs: n/a"'
    - no_tool_call_matching:
        bash.command: '~ "(Edit|Write|sed -i).*(README|BLUEPRINT)"'

- name: doc_update_discipline_bug_fix
  scenario: "bug fix preserving contract records docs n/a attestation"
  agent_path: skills/ship/SKILL.md
  phase: shipping
  max_turns: 3
  tools: [Bash]
  prompt: >-
    Your branch fixes a regression where the existing `t3 ship` command
    would crash on an empty diff. The CLI contract and behavior are
    unchanged for any non-empty diff. Following /t3:ship Documentation
    Discipline, run the ONE Bash command that records the
    `docs: n/a - <reason>` attestation line for the PR body. One
    command only, no narration.
  expect:
    - tool_call: Bash
      args.command: '~ "docs: n/a"'
    - no_tool_call_matching:
        bash.command: '~ "(Edit|Write|sed -i).*(README|BLUEPRINT)"'
