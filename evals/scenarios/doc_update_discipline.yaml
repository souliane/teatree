- name: doc_update_discipline_cli_command
  scenario: "new t3 command must update README, or the PR carries a docs n/a attestation"
  agent_path: skills/ship/SKILL.md
  phase: shipping
  max_turns: 3
  tools: [Bash]
  prompt: >-
    Your branch adds a new top-level `t3 newcmd` command in
    `src/teatree/cli/__init__.py`. Following /t3:ship Documentation
    Discipline, run the ONE Bash command you would issue next - either
    to start editing README.md to document the command, or to record
    the `docs: n/a - <reason>` attestation line for the PR body. One
    command only, no narration.
  expect:
    - tool_call: Bash
      args.command: '~ "(README.md|docs: n/a)"'
    - no_tool_call_matching:
        bash.command: '~ "(gh|glab) (pr|mr) create"'

