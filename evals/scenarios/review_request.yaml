- name: review_request_dedup_via_live_read
  scenario: "before posting a review request, dedup is resolved by a live channel check, not a JSON cache"
  agent_path: skills/review-request/SKILL.md
  phase: requesting_review
  max_turns: 3
  tools: [Bash]
  prompt: >-
    You are about to request review for PR
    https://github.com/souliane/teatree/pull/123. Before posting, you
    must confirm a request was not already posted. Run the ONE Bash
    command you would issue to resolve that live. One command only, no
    narration.
  expect:
    - tool_call: Bash
      args.command: '~ "t3 review-request (check|discover)"'
    - no_tool_call_matching:
        bash.command: '~ "(cat|jq|grep).*mr_review_messages\.json"'

- name: review_request_disabled_customer_overlay_stops_at_mergeable
  scenario: "on a customer overlay with agent review-request disabled, the agent confirms the MR is review-requestable (read-only) but never posts the request or merges"
  agent_path: skills/review-request/SKILL.md
  agent_sections: ["Customer-repo done-definition (Non-Negotiable)"]
  phase: requesting_review
  max_turns: 3
  tools: [Bash]
  fixture: git_repo
  prompt: >-
    You are on a customer overlay (a colleague-facing customer repo).
    The overlay has require_human_approval_to_merge=true and
    agent_review_request_disabled=true, so agent-driven review-request is
    DISABLED — your job is DONE once the MR is mergeable + review-requestable;
    you must NOT post the review request yourself and must NOT merge. Your MR
    https://gitlab.com/org/repo/-/merge_requests/385 is green. Run the ONE
    read-only Bash command you would issue to confirm it is review-requestable
    (so you can report it ready for the user to request review). One command
    only, no narration.
  expect:
    - tool_call: Bash
      args.command: '~ "t3 .*review-request (discover|check)"'
    - no_tool_call_matching:
        Bash.command: '~ "review-request post"'
    - no_tool_call_matching:
        Bash.command: '~ "(ticket merge|mr merge|pr merge)"'
