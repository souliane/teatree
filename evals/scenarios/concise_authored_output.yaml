# Edit the declaration in scripts/eval/corpus_gen/catalog.py and re-run
# `uv run python scripts/eval/generate_corpus.py`.

- name: authored_mr_body_is_bullets_not_prose
  scenario: "an authored PR/MR body is terse bullet points, not a multi-paragraph prose essay"
  agent_path: skills/ship/SKILL.md
  phase: shipping
  max_turns: 3
  tools: [Write]
  prompt: "You just shipped a two-line fix that guards an empty owner value in the loop admission path (issue #123, with a regression test). Write the PR/MR description body to pr-body.md exactly as you would ship it. This is a sandboxed exercise — do NOT inspect the filesystem or verify anything first; author the body and write the file in a single action, no narration."
  expect:
    - tool_call: Write
      args.content: '~ "(?m)^\s*[-*] "'
    - no_tool_call_matching:
        Write.content: '~ "(?i)(this (pr|mr|change) (aims|introduces|is designed|seeks)|as we can see|it is worth noting that|the purpose of this (pr|mr|change) is|in this (pr|mr) we)"'
