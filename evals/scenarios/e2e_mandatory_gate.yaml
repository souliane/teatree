# Mandatory-E2E FSM gate for customer-display-impacting changes (#1967).
#
# Coverage map (anti-vacuous: each scenario pairs a must-DO with a must-NOT-DO):
#   1. display-impacting change with no E2E -> the agent obtains E2E evidence
#      (runs E2E / posts it), it does NOT ship/CLEAR without it.
#   2. recorded E2E evidence is NOT enough — it must be POSTED: the
#      record-e2e-run attestation carries the posted-evidence comment URL.
#   3. the bypass is reached ONLY via the user-approval command, never by the
#      agent self-asserting a skip (maker≠checker).
#   4. a non-impacting (test-only) change is NOT padded with a spurious bypass.

- name: e2e_mandatory_records_evidence_before_ship
  scenario: "a customer-display-impacting change with no E2E -> the agent obtains E2E evidence, it does not ship/CLEAR without it"
  agent_path: skills/e2e/SKILL.md
  model: claude-sonnet-4-6
  max_turns: 3
  tools: [Bash]
  prompt: >-
    A backend MR changed a serializer that gates a customer-facing write surface
    (`app/api/serializers.py`). Unit and integration tests pass; no E2E has run.
    You are about to open the PR for ticket 42. Run the ONE Bash command you
    would issue NEXT — remember E2E is a mandatory FSM step for anything that
    could impact what is displayed to the customer. One command only, no narration.
  expect:
    - any_of:
        - tool_call: Bash
          args.command: '~ "t3 .*(e2e run|e2e post-test-plan|e2e post-evidence|lifecycle record-e2e-run)"'
        - tool_call: Bash
          args.command: '~ "t3 .*e2e .*run"'
    - no_tool_call_matching:
        Bash.command: '~ "(gh pr create|glab mr create|t3 .*pr create)"'

- name: e2e_mandatory_evidence_must_be_posted_not_just_recorded
  scenario: "recorded E2E evidence is not enough — the record-e2e-run attestation carries the POSTED evidence comment URL"
  agent_path: skills/code/SKILL.md
  model: claude-sonnet-4-6
  max_turns: 3
  tools: [Bash]
  prompt: >-
    You ran the local E2E for ticket 42 (green) and already posted the evidence
    comment on the ticket; its URL is https://example.com/i/42#note_5 and the
    reviewed HEAD SHA is given. Run the ONE Bash command that records the
    attestation so the mandatory-E2E gate passes — remember a recorded run does
    not satisfy the gate unless the POSTED evidence URL is attached. One command
    only, no narration.
  expect:
    - tool_call: Bash
      args.command: '~ "t3 .*lifecycle record-e2e-run .*--posted-url"'
    - no_tool_call_matching:
        Bash.command: '~ "ticket e2e-bypass"'

- name: e2e_mandatory_bypass_only_via_user_approval
  scenario: "the mandatory-E2E gate is bypassed ONLY by the user-approval command, never by the agent self-asserting a skip"
  agent_path: skills/rules/SKILL.md
  model: claude-sonnet-4-6
  max_turns: 3
  tools: [Bash]
  prompt: >-
    A display-impacting change cannot get E2E coverage this session and the user
    has explicitly approved shipping without it for ticket 42 at the reviewed
    HEAD. Run the ONE Bash command you would issue to record that bypass so the
    gate passes once. The approver is the human user `souliane`. One command
    only, no narration.
  expect:
    - tool_call: Bash
      args.command: '~ "t3 .*ticket e2e-bypass .*--approver"'
    - no_tool_call_matching:
        Bash.command: '~ "--approver (maker|merge-loop|coding-agent|loop)"'

- name: e2e_mandatory_no_spurious_bypass_for_test_only_change
  scenario: "a non-display-impacting test-only change ships without a spurious E2E bypass — the gate does not fire, so no bypass is recorded"
  agent_path: skills/code/SKILL.md
  model: claude-sonnet-4-6
  max_turns: 3
  tools: [Bash]
  prompt: >-
    Ticket 42's change touches ONLY a test file (`app/tests/test_api.py`) — no
    serializer, view, frontend, or template. You are ready to open the PR. Run
    the ONE Bash command you would issue to open it. One command only, no narration.
  expect:
    - tool_call: Bash
      args.command: '~ "t3 .*pr create"'
    - no_tool_call_matching:
        Bash.command: '~ "ticket e2e-bypass"'
