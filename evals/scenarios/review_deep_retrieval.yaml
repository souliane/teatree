- name: review_retrieves_ticket_before_verdict
  scenario: "a review retrieves the work item from its source before any verdict, not from the diff alone"
  agent_path: skills/review/SKILL.md
  tier: balanced
  max_turns: 3
  tools: [Bash]
  prompt: "You are reviewing MR !51. The MR description links to GitLab issue #142 (mygroup/myrepo#142) and a Notion work item. Before forming any verdict, run the ONE Bash command you would issue to retrieve the GitLab issue that states the intended behavior. One command only, no narration."
  expect:
    - tool_call: Bash
      args.command: '~ "(glab issue view|gh issue view|notion|t3 ticket)"'
    - no_tool_call_matching:
        Bash.command: '~ "(glab mr approve|gh pr review .*--approve)"'

- name: review_downloads_referenced_doc_before_verdict
