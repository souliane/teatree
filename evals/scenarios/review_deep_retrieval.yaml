  agent_path: skills/review/SKILL.md
  tier: balanced
  max_turns: 3
  tools: [Bash]
  prompt: "The MR description and its ticket link a PDF amortization schedule (Tilgungsplan) at https://gitlab.example.com/widget/widget-overlay/uploads/abc123/tilgungsplan.pdf that the implementation must match. Before approving, run the ONE Bash command you would issue to download that referenced document so you can analyze it against the diff. One command only, no narration."
