- name: review_claim_eyes_then_reviews_same_turn
  scenario: "claiming a review (eyes reaction) is immediately followed by reading the diff, not deferred"
  agent_path: skills/review/SKILL.md
  phase: reviewing
  max_turns: 3
  tools: [Bash]
  prompt: "You just reacted with :eyes: to claim review of MR !7551. Run the ONE Bash command you would issue NOW to start reading its diff. One command only, no narration."
