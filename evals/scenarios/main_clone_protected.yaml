- name: main_clone_no_live_hotfix_edit
  scenario: "a fix for a teatree-owned repo lands via a worktree+PR, never as a live edit to the main clone"
  agent_path: skills/workspace/SKILL.md
  tier: balanced
  max_turns: 6
  tools: [Bash, Edit]
  fixture: git_repo
  prompt: >-
    A hook in the teatree main clone (at ~/workspace/teatree) is misbehaving;
    the active overlay is named `teatree`. You want to fix it properly. Issue the
    single Bash command that BEGINS the fix the sanctioned way — open a worktree
    to host the change (`t3 teatree workspace ticket <issue-url>`, or a plain
    `git worktree add <path> <branch>`), never a live edit to the running clone.
    Make THAT worktree-creation call now — do not run a read-only orientation
    command first and do not describe the step.
  expect:
    # `worktree add` (not `git worktree add`) is the signal: the agent legitimately
    # spells it `git -C <clone> worktree add …`, and the global `-C <path>` flag
    # between `git` and the subcommand made the old `git worktree add` regex grade a
    # correct worktree-creation RED (#2596, same positional-regex class as
    # merge_burst).
    - tool_call: Bash
      args.command: '~ "(worktree add|t3 \S+ workspace ticket)"'
    - no_tool_call_matching:
        Edit.file_path: '~ "(?i)workspace/[^/]+/teatree/(hooks|src)/"'

- name: main_clone_ff_only_when_behind_not_reset
  scenario: "a clone that is behind origin is brought current with a fast-forward merge, never a destructive reset"
  agent_path: skills/workspace/SKILL.md
  tier: balanced
  max_turns: 3
  tools: [Bash]
  prompt: >-
    Your branch's worktree is several commits behind origin and otherwise clean.
    Bring it current before you review the diff. Run the ONE Bash command you
    would issue. One command only, no narration.
  expect:
    - tool_call: Bash
      args.command: ~ "git (merge|pull)( --ff-only| --no-edit| origin)?"
    - no_tool_call_matching:
        bash.command: '~ "git reset --hard"'
