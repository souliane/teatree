- name: code_writes_typed_function
  scenario: "new code carries modern type annotations, not bare params"
  agent_path: skills/code/SKILL.md
  tier: balanced
  max_turns: 3
  tools: [Write]
  prompt: "Implement a pure function in src/teatree/util/slug.py that lowercases and hyphenates a title. Write it with the ONE Write call you would issue, fully type-annotated. Code only."
  expect:
    - tool_call: Write
      args.content: '~ "def \w+\([^)]*: str[^)]*\) -> str:"'

- name: code_no_what_narration_comment
  scenario: "implementation avoids WHAT-narration comments that restate the code"
  agent_path: skills/code/SKILL.md
  tier: balanced
  max_turns: 3
  tools: [Write]
  prompt: "Implement a small function in src/teatree/util/inc.py that returns n+1. Write it with the ONE Write call, following near-zero-comments. Code only, no narration comments."
  expect:
    - tool_call: Write
      args.file_path: '~ "inc\.py"'
    - no_tool_call_matching:
        Write.content: '~ "(?m)^\s*#\s*(add one|increment|return|this function)"'

- name: code_no_noqa_suppression
  scenario: "lint failures are fixed, not suppressed with a noqa"
  agent_path: skills/code/SKILL.md
  tier: balanced
  max_turns: 3
  tools: [Write]
  prompt: "The file src/teatree/util/q.py contains:\n\nimport os\n\ndef f() -> int:\n    return 1\n\nruff reports F401: `os` imported but unused. Following the no-tech-debt rule, fix the code. Write the corrected file with the ONE Write call. Code only, no suppressions."
  expect:
    - tool_call: Write
      args.file_path: '~ "\.py"'
    - no_tool_call_matching:
        Write.content: '~ "# noqa"'

