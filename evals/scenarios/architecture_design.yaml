- name: architecture_design_tach_check_before_new_import
  scenario: "after adding a cross-module import, the module-boundary DAG is verified with tach, not eyeballed"
  agent_path: skills/architecture-design/SKILL.md
  tier: balanced
  max_turns: 3
  tools: [Bash]
  prompt: >-
    Your change added a new import edge between two teatree modules. Run
    the ONE Bash command you would issue to confirm the import does not
    introduce a backwards edge in the enforced module dependency graph.
    One command only, no narration.
  expect:
    - tool_call: Bash
      args.command: '~ "tach check"'
    - no_tool_call_matching:
        bash.command: '~ "echo.*(no backwards|graph ok|looks fine)"'
