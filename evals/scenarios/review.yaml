- name: review_skill_refs_resolve
  scenario: "review must validate that every referenced skill name resolves before approving"
  agent_path: skills/review/SKILL.md
  tier: balanced
  max_turns: 3
  tools: [Bash]
  prompt: >-
    You are doing a self-review of a branch that edited
    `~/.teatree-skills.yml` routing and an `agents/*.md` frontmatter
    `companion_skills:` list. Following the review checklist, run the
    ONE Bash command that confirms every referenced skill name resolves
    to a real skill. One command only, no narration.
  expect:
    - tool_call: Bash
      args.command: '~ "t3 tool validate-skill-refs"'
    - no_tool_call_matching:
        bash.command: '~ "echo.*(refs ok|looks fine|approved)"'

- name: review_branch_current_with_main
  scenario: "review of a branch must update it to current main first to avoid phantom-reversion findings"
  agent_path: skills/review/SKILL.md
  tier: balanced
  max_turns: 3
  tools: [Bash]
  prompt: >-
    You are about to cold-review a feature branch. Its merge-base with
    main is several days old and main has advanced since. Before reading
    the diff, run the ONE Bash command you would issue so the diff does
    not surface phantom reversions from stale base. One command only, no
    narration.
  expect:
    - tool_call: Bash
      args.command: '~ "(git merge\s+(origin/)?(main|master)|git fetch\b.*&&|origin/(main|master).*HEAD)"'
    - no_tool_call_matching:
        bash.command: '~ "(gh|glab) (pr|mr) (approve|review).*--approve"'

# On a colleague's MR, the Slack signal is a REACTION on the review-broadcast
# message, emitted ONLY when the review is FINISHED: `:eyes:` + `:white_check_mark:`
# when clean, `:eyes:` + `:question:` when there are blocking comments. The
# reaction goes via the personal user token (`t3 slack react CHANNEL TS EMOJI`).
# Three recurring regressions this pins:
#   1. reacting `:eyes:` at CLAIM/START (before the review is delivered) — the
#      reaction must mean "done", not "I'm starting".
#   2. DMing the author as the signal instead of reacting.
#   3. adding a second `:white_check_mark:` a colleague already placed (no dedup).
#
# Fixtures use placeholder identities (`C_REVIEW` channel, `171.5` ts) per the
# eval README's overlay-agnostic convention.

- name: review_done_reacts_with_verdict_emoji
  agent_path: skills/review/SKILL.md
  scenario: "a finished clean review reacts with the verdict check, never an :eyes: claim-at-start"
  tier: balanced
  max_turns: 3
  tools: [Bash]
  prompt: >-
    You have FINISHED cold-reviewing colleague MR !4120 and it is clean — no
    blocking findings. The review-broadcast message is `(C_REVIEW, 171.5)`. Emit
    the Slack signal that the review is done with a clean verdict. Run the ONE
    Bash command you would issue. One command only, no narration.
  expect:
    - tool_call: Bash
      args.command: '~ "t3 slack react C_REVIEW 171\.5 (white_check_mark|heavy_check_mark|\+1)"'
    - no_tool_call_matching:
        Bash.command: '~ "t3 slack react \S+ \S+ eyes\b"'

- name: review_signal_is_reaction_not_author_dm
  agent_path: skills/review/SKILL.md
  scenario: "the review verdict is signalled by a reaction on the broadcast, never a DM to the MR author"
  tier: balanced
  max_turns: 3
  tools: [Bash]
  prompt: >-
    You have FINISHED reviewing colleague MR !4120 and it is clean. The
    review-broadcast message is `(C_REVIEW, 171.5)`. The reaction (not a direct
    message to the author) is the signal. Run the ONE Bash command you would
    issue to emit the verdict signal. One command only, no narration.
  expect:
    - tool_call: Bash
      args.command: '~ "(t3 slack react C_REVIEW 171\.5|slack_react(?=.*C_REVIEW)(?=.*171\.5)|reactions\.add(?=.*C_REVIEW)(?=.*171\.5))"'
    - no_tool_call_matching:
        Bash.command: '~ "(?i)(notify (send|dm)|slack dm|chat\.postMessage|--dm-author|message the author)"'

- name: review_reaction_dedups_existing_reactor
  agent_path: skills/review/SKILL.md
  scenario: "the review reacts with its own distinct verdict and never re-adds a check a colleague already placed"
  tier: balanced
  max_turns: 3
  tools: [Bash]
  prompt: >-
    You FINISHED reviewing colleague MR !4120 and found a BLOCKING issue, so
    your verdict is "blocking" (`:question:`). The review-broadcast message
    `(C_REVIEW, 171.5)` already carries a `:white_check_mark:` from another
    reviewer. Emit YOUR verdict reaction without re-adding the check that is
    already there. Run the ONE Bash command you would issue. One command only,
    no narration.
  expect:
    - tool_call: Bash
      args.command: '~ "(t3 slack react C_REVIEW 171\.5 question\b|slack reactions[.\s]?add(?=.*C_REVIEW)(?=.*171\.5)(?=.*question))"'
    - no_tool_call_matching:
        Bash.command: '~ "t3 slack react \S+ \S+ (white_check_mark|heavy_check_mark|\+1)"'

# A review finding anchored to specific code goes as an INLINE comment
# (`t3 review post-comment <repo> <mr> "<finding>" --file <path> --line <N>`),
# never as a general MR-level note that drops the anchor. SKILL.md § "Inline
# first, general note second" + "Posting Comments" make `--file`/`--line` the
# binding shape: a general note forces the author to hunt for the code the
# finding refers to. The two positive matchers (`--file` AND `--line` present)
# keep a no-op transcript red; the negative refuses any `post-comment` that
# carries no `--file` (the general-note degradation, #72's silent foot-gun).
- name: review_findings_posted_inline_not_general
  agent_path: skills/review/SKILL.md
  scenario: "a code-anchored review finding is posted as an inline --file/--line comment, never a general MR note"
  tier: balanced
  max_turns: 3
  tools: [Bash]
  prompt: >-
    You are reviewing colleague MR !4120 on repo `my-org/my-repo`. You found one
    blocking issue: the sweep loop in `src/teatree/core/sweep.py` reallocates the
    candidate list on every call (line 88). Post that finding on the MR. Run the
    ONE Bash command you would issue. One command only, no narration.
  expect:
    - tool_call: Bash
      args.command: '~ "t3 review post-comment .*--file "'
    - tool_call: Bash
      args.command: '~ "t3 review post-comment .*--line "'
    - no_tool_call_matching:
        Bash.command: '~ "t3 review post-comment(?!.*--file)"'

# Review comments are posted by a delegated reviewer / sub-agent, never authored
# and posted inline by the main orchestrator. CLAUDE.md "main agent orchestrates
# only" + the user directive "do not post review comment in main agent, use a
# sub-agent (a cheap one) or the reviewer agent". The positive matcher requires
# a `Task` dispatch that posts the finding (keeps the no-op red); the negative
# refuses the orchestrator running `t3 review post-comment` itself in the
# foreground via Bash. The negative keys on `Bash.command`, so the same text
# inside the delegated `Task.prompt` does not trip it (arg-path isolation).
- name: review_post_delegated_not_main_agent
  scenario: "the orchestrator delegates posting a review comment to a sub-agent, never posts it itself in the foreground"
  agent_path: skills/rules/SKILL.md
  tier: balanced
  max_turns: 3
  tools: [Bash, Task]
  prompt: >-
    You are the main orchestrating agent. A review finding is ready for colleague
    MR `my-org/my-repo`!4120: an inline `t3 review post-comment` on
    `src/teatree/core/sweep.py` line 88. Following the orchestrate-only boundary,
    take the single action you would take now to get that comment posted.
  expect:
    - tool_call: Task
      args.prompt: '~ "(?i)(post|comment).*(post-comment|--file|inline)"'
    - no_tool_call_matching:
        Bash.command: '~ "t3 review post-comment"'

# A review finding is classified on ONE axis: Blocker vs Nit. A Nit has NO
# severity — it is BY DEFINITION non-blocking, so tagging it MED/LOW/HIGH is the
# nonsensical "Nit (MED)" the skill names explicitly (SKILL.md § "Review Tone &
# Formatting" → "never downgrade a HIGH/MED finding to `Nit:` … that produces the
# nonsensical 'Nit (MED)' — terseness is about length, not severity"). The
# positive matcher requires a bare `Nit:` post (keeps a no-op transcript RED);
# the negative refuses ANY nit carrying a severity tag — `Nit (MED)`, `Nit (LOW)`,
# `Nit (HIGH)`, or the `MED … nit` / `LOW … nit` inversions. A severity belongs
# on a Blocker-axis finding (`HIGH (correctness):`, `MED:`), never on a Nit.
- name: review_nit_carries_no_severity_tag
  agent_path: skills/review/SKILL.md
  scenario: "a nit is posted as a bare `Nit:` with no MED/LOW/HIGH severity tag — a nit has no severity (one axis: Blocker vs Nit)"
  tier: balanced
  max_turns: 3
  tools: [Bash]
  prompt: >-
    You are reviewing colleague MR !4120 on repo `my-org/my-repo`. The only thing
    you found is a trivial, non-blocking style preference: a local variable in
    `src/teatree/core/sweep.py` (line 88) would read better named `candidates`
    than `c`. This is a nit — purely cosmetic, nothing blocks merge. Post it as an
    inline comment. Run the ONE Bash command you would issue. One command only, no
    narration.
  expect:
    - tool_call: Bash
      args.command: '~ "t3 review post-comment .*[\"'']\s*Nit:"'
    # A nit NEVER carries a severity. Refuse `Nit (MED)`/`Nit (LOW)`/`Nit (HIGH)`,
    # the `Nit [MED]` bracket form, and the `MED … nit` / `LOW: … nit` inversions.
    - no_tool_call_matching:
        Bash.command: '~ "(?i)(nit\s*[\(\[]\s*(med|low|high)|(med|low|high)\b[^\n]*\bnit)"'
