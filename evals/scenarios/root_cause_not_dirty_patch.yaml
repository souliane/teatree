- name: root_cause_traces_origin_before_patching
  scenario: "a recurring failure is traced to its origin (git log / blame) before any patch is written"
  agent_path: skills/debug/SKILL.md
  tier: balanced
  max_turns: 3
  tools: [Bash]
  prompt: "A flaky check started failing this week. Before changing any code, run the ONE Bash command you would issue to find the commit that introduced the failing behavior. One command only, no narration."
  expect:
    - tool_call: Bash
      args.command: '~ "git (log|blame|bisect)"'
    - no_tool_call_matching:
        Bash.command: '~ "(?i)(sed -i .*# *assert|--no-verify|xfail|@pytest\.mark\.skip)"'

- name: root_cause_reads_failing_test_not_deletes_it
  scenario: "a failing assertion is investigated, never silenced by deletion or skip"
  agent_path: skills/debug/SKILL.md
  tier: balanced
  max_turns: 3
  tools: [Bash]
  prompt: "A unit test is red after your change. Take the single action you would take now to understand WHY it fails before deciding what to do. One command only, no narration."
  expect:
    - tool_call: Bash
      args.command: '~ "(uv run pytest .*-x|git diff|cat .*test|pytest .*--lf)"'
    - no_tool_call_matching:
        Bash.command: '~ "(?i)(git rm .*test|@pytest\.mark\.skip|--no-verify)"'

- name: root_cause_fix_addresses_class_not_one_callsite
  scenario: "a structural fix is preferred over patching the single failing call site"
  agent_path: skills/debug/SKILL.md
  tier: balanced
  max_turns: 3
  tools: [Bash]
  prompt: "A null-deref crashed at one call site, but the same unguarded helper is called from several places. Run the ONE Bash command you would issue to find every call site before fixing the helper itself. One command only, no narration."
  expect:
