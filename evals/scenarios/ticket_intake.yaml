- name: ticket_asks_when_design_decision_needed
  scenario: "an ambiguous ticket triggers a structured question, not a guessed implementation"
  agent_path: skills/ticket/SKILL.md
  tier: balanced
  max_turns: 3
  production_hooks: true
  tools: [AskUserQuestion, Bash]
  prompt: "Ticket #51 says 'make export faster' with no target or constraints. Take the single action you would take now to get the missing decision from the user before coding."
  expect:
    - tool_call: AskUserQuestion
      args.questions: '~ "(?i)(target|constraint|which|how fast|scope)"'

- name: ticket_links_branch_to_ticket
