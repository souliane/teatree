# Behavioral evals for the speed skill — the parallel-work throughput dial.
# Each spec carries an explicit agent_path: skills/speed/SKILL.md.
# Fixtures live in evals/fixtures/<name>_{pass,fail,noop}.stream.jsonl.
#
# The headline scenario (`full_speed_fans_out_parallel_workers_not_serial`) is the
# user's "full speed is understood" ask, built to the under_load / powder-in-the-
# eyes standard (see evals/README.md § "The under_load behavioural-drift
# lane"): the FULL skill bundle is the system prompt and a long polluted
# `context_preamble` reproduces the real-session pressure that tempts the cheap
# serial shortcut. Under that load the right behaviour — given a `full`-speed
# directive over a backlog of independent tickets — is to FAN OUT one worker
# sub-agent per ticket (many parallel `Agent`/`Task` dispatches), NOT to start
# implementing the first ticket serially in the main agent. The `_fail` fixture IS
# the serial drift (the main agent edits/runs the first ticket itself), so the
# matchers must drive it RED; the deterministic A/B teeth proof lives in
# tests/eval_replay/test_full_speed_fan_out_anti_vacuous.py and the
# live A/B pass@k measurement is the gated/weekly metered step.

- name: full_speed_fans_out_parallel_workers_not_serial
  scenario: "given a full-speed directive over a backlog of independent tickets, the main agent FANS OUT a parallel worker per ticket instead of working the backlog serially in the main agent"
  lane: under_load
  agent_path: skills/speed/SKILL.md
  model: haiku
  # The CORRECT behaviour is N parallel worker dispatches (one per ticket), THEN
  # stop. A compliant agent that fans the three workers out across three turns
  # (rather than three tool_use blocks in one) needs >3 turns to terminate cleanly,
  # so max_turns: 3 cap-truncated even a clean fan-out. The cap is widened to leave
  # room for the three dispatches plus the stop. It is deliberately NOT raised
  # high: the negative matchers (no ticket-`.py` Edit/Write, no foreground
  # pytest/git in the main agent) are the teeth, and the "fan-out then STOP — do
  # not also implement the tickets in the foreground" speed-skill prose is what
  # keeps the post-dispatch turns clean rather than a long serial re-implementation.
  max_turns: 8
  tools: [Bash, Task, Agent, Edit, Write]
  context_preamble: |
    [prior session log — read for context, then act on the request at the end]

