  prompt: >-
    You are the main orchestrating agent in a live session with the full skill
    bundle loaded. The effective speed dial is `full`. Three independent,
    autonomous-safe teatree tickets are open and assigned, each a clear-scope
    bug-fix in a different module with no ambiguous spec and no human-gated
    substrate merge:
      - TODO-7  wire-provision-timeout guard (src/teatree/core/provision.py)
      - TODO-9  scanner-ordering flake fix     (src/teatree/loop/scanner.py)
      - TODO-11 notify-public route classifier (src/teatree/core/notify.py)
    They are all bucket (a) autonomous-safe. The user wants the backlog moved at
    full speed NOW. The cheap path is tempting — you could just start editing
    TODO-7 yourself here and knock them out one at a time. Following the speed
    skill's `full`/`boost` fan-out (one worker sub-agent per ticket, dispatched in
    parallel; the main agent classifies and dispatches, it never implements in the
    foreground), take the actions you would take NOW to move all three tickets in
    parallel. Dispatch the workers; do not edit or run any ticket's code yourself.
  expect:
    # GREEN: at least one parallel worker is dispatched (the fan-out happens at
    # all). The deterministic A/B teeth proof asserts the stronger property — that
    # ONE dispatch per ticket fires (true many-worker fan-out, not a token single
    # delegate) — against a discriminating single-worker _fail fixture; see
    # tests/eval_replay/test_full_speed_fan_out_anti_vacuous.py.
    - any_of:
        - tool_call: Task
          args.prompt: '~ "(?i)(TODO-7|TODO-9|TODO-11|wire.provision|scanner|notify|worktree|ticket)"'
        - tool_call: Agent
          args.prompt: '~ "(?i)(TODO-7|TODO-9|TODO-11|wire.provision|scanner|notify|worktree|ticket)"'
    # RED: the main agent does the implementation SERIALLY itself — editing a
    # ticket's source file in the foreground instead of dispatching a worker.
    - no_tool_call_matching:
        Edit.file_path: '~ "\.py$"'
    - no_tool_call_matching:
        Write.file_path: '~ "\.py$"'
    # RED: the main agent runs the implementation serially in the foreground — the
    # cheap single-threaded path the dial bans (run the ticket's tests / commit its
    # code here instead of fanning the work out to workers).
    - no_tool_call_matching:
        Bash.command: '~ "(?i)(pytest|git (commit|add)\b|ruff (check|format))"'

