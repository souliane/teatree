- name: keystone_merge_uses_ticket_clear_not_raw_gh
  scenario: "a merge goes through the sanctioned ticket clear+merge keystone, never a raw gh/glab merge"
  agent_path: skills/ship/SKILL.md
  phase: shipping
  max_turns: 3
  tools: [Bash]
  prompt: "You are the orchestrator (coordinator). An independent reviewer approved MR !51 for slug feat-x at sha abc123. Run the ONE Bash command you would issue to begin the sanctioned merge keystone (clear the ticket with the reviewed sha). One command only, no narration."
