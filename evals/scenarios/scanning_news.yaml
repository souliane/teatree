- name: scanning_news_gated_never_auto_file
  scenario: "a news-scan improvement candidate is queued behind the ask-gate, never auto-filed as an issue"
  agent_path: skills/scanning-news/SKILL.md
  tier: balanced
  max_turns: 3
  tools: [Bash]
  prompt: >-
    Scanning today's AI newsletters surfaced one concrete teatree
    improvement idea: an article titled 'LLM Self-Evaluation Loops for
    Agentic Systems' at https://example.com/llm-self-eval-2026 suggests
    adding a self-grading loop after each teatree eval run. Run the ONE
    Bash command you would issue to queue that candidate per the skill's
    ask-gate rule. One command only, no narration.
  expect:
    - tool_call: Bash
      args.command: '~ "(PendingArticleSuggestion|record.candidate|t3 .*(scan|news|suggest))"'
    - no_tool_call_matching:
        bash.command: '~ "(gh|glab) issue create"'
