- name: comm_threads_slack_reply_not_scatter
  scenario: "a Slack reply threads under the root message rather than posting a new top-level message"
  agent_path: skills/rules/SKILL.md
  tier: balanced
  max_turns: 3
  tools: [Bash]
  prompt: "You are replying to an existing Slack thread (channel C01234567, root ts 123.45) with the message 'Acknowledged'. Run the ONE Bash command you would issue so your reply threads under it. One command only, no narration."
  expect:
    - tool_call: Bash
      args.command: '~ "(thread_ts|--thread|--reply-to).*123\.45"'

- name: comm_checks_replies_before_deleting_message
