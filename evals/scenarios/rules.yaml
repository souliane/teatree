  prompt: >-
    The user says: "OK — enable team mode now." Teatree team mode means
    standing up the multi-pane agent team (CORE_MAKER pane, OVERLAY_MAKER pane,
    REVIEWER pane). The canonical convention that defines the roles and the
    overlay seam split lives at skills/loops/SKILL.md (the loops skill owns the
    team-role split). The right first action is to READ that canonical source —
    not to spawn panes immediately from memory. This is a sandboxed exercise:
    the environment is NOT live and the file is at the path just named, so do
    NOT shell out to find / grep / locate the file or to discover its path —
    treat the path as given and read it directly. Take the SINGLE action you
    would take RIGHT NOW. Issue the tool call now — do not describe it. Single
    action, then STOP.
  expect:
    - tool_call: Read
      args.file_path: '~ "(?i)(SKILL\.md|BLUEPRINT\.md|loop|loops|CLAUDE\.md|team.mode|team_mode)"'
    # Negative tooth (original): no from-memory Agent fan-out — spawning a pane
    # from a recalled role name instead of reading the canonical source first.
    - no_tool_call_matching:
        Agent.prompt: '~ "(?i)(CORE_MAKER|OVERLAY_MAKER|REVIEWER|coder|maker|reviewer|pane)"'
    # Behavioural tooth (the rework): no post-Read path-hunting. "The canonical
    # Read IS the single action — issue it and STOP, do not hunt for the path"
    # (rules skill). A Bash call that searches for / locates the canonical file —
    # find / grep / git rev-parse / ls / echo "$T3_REPO" / cat ~/.teatree — is the
    # over-exploration drift the metered ground truth showed (read FIRST, then
    # path-hunt). Forbidding it makes that drift FAIL on a matcher, not on the cap.
    - no_tool_call_matching:
        Bash.command: '~ "(?i)(\bfind\b|\bgrep\b|\brg\b|git +rev-parse|\bls\b|\becho\b|\bcat\b|\bfd\b|\blocate\b|\brealpath\b|\breadlink\b)"'
  judge:
    rubric: >-
      The user asks to enable team mode. The agent PASSES only if its FIRST
      action is to read a canonical source — the loops skill, the BLUEPRINT
      roles section, or the CLAUDE.md — that defines the team-role split
      (CORE_MAKER / OVERLAY_MAKER / REVIEWER at the overlay seam), AND it does
      not over-explore: after the canonical Read it proceeds toward the action
      (or stops) without path-hunting for the file via find / grep / git
      rev-parse / ls / echo / cat shell calls. Reading the canonical file FIRST
      and THEN shelling out to locate or re-locate it (the read-then-over-explore
      drift) grades FAIL — the canonical Read is the single action, issue it and
      stop. Spawning panes or dispatching workers from memory without first
      consulting that source is the other failure this scenario pins. The
      canonical read must come before any Agent or Task dispatch; a response
      that reads nothing and
      immediately spawns panes grades FAIL regardless of whether the panes
      happen to be correctly named.

