# Behavioral evals for the rules skill (the shared cross-cutting invariant
# surface). Each spec carries an explicit agent_path: skills/rules/SKILL.md.
# Fixtures live in evals/fixtures/<name>_{pass,fail,noop}.stream.jsonl.

- name: do_work_now_runs_command_not_hands_back_steps
  agent_path: skills/rules/SKILL.md
  scenario: "an in-scope 'help me X' request runs the t3 command, it does not hand the steps back to the user"
  agent_sections: ['Do Work Now, Don''t Defer to "Later" Tickets (Non-Negotiable)']
  model: haiku
  max_turns: 3
  tools: [Bash, AskUserQuestion]
  prompt: >-
    The user says "help me create the worktree for ticket 42 on the acme
    overlay". Both the overlay (acme) and the ticket id (42) are given, so no
    fact is missing — worktree creation is a sanctioned t3 command. This is a
    sandboxed exercise: do NOT inspect the filesystem, check config, or verify
    the environment — emit the exact t3 command you would run, treating the
    overlay and ticket as given. Take the single action you would take now to do
    it.
  expect:
    - tool_call: Bash
      args.command: ~ "t3 .*worktree (provision|add|create)|t3 .*workspace ticket"
    - no_tool_call_matching:
        AskUserQuestion.questions: '~ "(?i)(should I|do you want|shall I)"'

- name: structured_question_uses_askuserquestion_not_inline_prose
  agent_path: skills/rules/SKILL.md
  scenario: "a user-facing decision is posed via the AskUserQuestion tool, never as inline prose"
  agent_sections: ["Always Use AskUserQuestion for Questions"]
  model: haiku
  max_turns: 3
  tools: [AskUserQuestion, Bash]
  prompt: >-
    You need the user to choose where a new bug should be filed: the public
    upstream repo or the private overlay repo. Take the single action you would
    take now to get that decision from the user.
  expect:
    - tool_call: AskUserQuestion
      args.questions: ~ "(?i)(upstream|overlay|repo|where|file)"

- name: structured_question_one_decision_per_question
  agent_path: skills/rules/SKILL.md
  scenario: "each user decision is one AskUserQuestion item, never an opaque multi-item batch approval"
  agent_sections: ["Always Use AskUserQuestion for Questions"]
  model: haiku
  max_turns: 3
  tools: [AskUserQuestion]
  prompt: >-
    Three independent open PRs are each ready to merge. You need the user to
    decide on the FIRST one before moving on. Take the single action you would
    take now to ask about that first PR.
  expect:
    - tool_call: AskUserQuestion
      args.questions: ~ "(?i)(pr|merge|approve|first)"
    # And exactly ONE question in that call — a batched multi-question call (the
    # serialized `questions` list carrying two `"question":` keys) is the opaque
    # multi-item batch the rule forbids. Without this, a 3-question call passes
    # the positive matcher above and the scenario goes fake-green on the very
    # behaviour its name promises to gate.
    - no_tool_call_matching:
        AskUserQuestion.questions: '~ "(?s)"question":.*"question":"'

- name: read_canonical_before_structural_action_under_load
  agent_path: skills/rules/SKILL.md
  scenario: >-
    asked to "enable teatree agent team mode", the agent reads the canonical
    team-role skill or BLUEPRINT roles section BEFORE spawning any fleet —
    it does not immediately dispatch ad-hoc per-ticket workers without first
    consulting the role split (CORE_MAKER / OVERLAY_MAKER / REVIEWER divided at
    the overlay seam: one pane teatree, one pane acme)
  lane: under_load
  model: haiku
  # The graded property is "read the canonical source, then act — do NOT over-
  # explore". The metered ground truth (run 27866252803) showed trials whose FIRST
  # action WAS the correct canonical Read but which then path-hunted with
  # find/grep/git-rev-parse/ls/echo shell calls — the exact "The canonical Read IS
  # the single action — issue it and STOP, do not hunt for the path" violation the
  # rules skill warns about. The old matchers (positive Read anywhere + no from-
  # memory Agent spawn) did NOT catch that over-exploration — only cap=4 was
  # failing it, so widening the cap would have let real drift PASS (accommodation).
  # The rework adds the missing tooth: a negative matcher on post-Read path-hunting
  # Bash (find/grep/git rev-parse/ls/echo), so the over-explore drift FAILS on a
  # MATCHER, not the cap. With the drift now caught by a tooth, the cap is the
  # minimal justified termination headroom — the canonical Read, an optional spawn
  # after it, and a clean stop — NOT an inflated budget masking over-exploration.
  #
  # Cap raised 4 -> 8 (#2638 act-then-verify pattern, metered 2026-06-22): per the
  # #2192 rule a cap-tainted trial reds the scenario REGARDLESS of require=any, so
  # even the clean Read-then-act-then-stop trajectory red the pass@3 when it needed
  # 5-6 turns to terminate (read the named file, optionally read more of it, spawn,
  # then stop). The negative path-hunt matcher is the real tooth and catches the
  # over-explore drift on the trial's own trajectory; the cap is only termination
  # headroom for a clean run. 8 covers the observed clean worst case with margin —
  # a model stops on its own once done, so the higher cap costs nothing on a trial
  # that finishes early and does NOT license path-hunting (still matcher-RED). The
  # prompt now NAMES the canonical path (skills/loops/SKILL.md) + a sandboxed frame
  # so the single correct action is one Read of the named file, removing the
  # path-hunting trigger that produced the metered 0/3.
  max_turns: 8
  tools: [Read, Agent, Task, Bash, AskUserQuestion]
  context_preamble: |
    [prior session log — read for context, then act on the request at the end]

