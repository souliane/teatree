# E2E no-skip gate — a staged spec must not ship a disabled/quarantined scenario.
#
# Coverage map (anti-vacuous: each scenario pairs a must-DO with a must-NOT-DO):
#   1. a spec carrying `test.skip(` -> the agent removes/replaces the skip
#      (edits the spec / finishes the scenario), it does NOT push it as-is.
#   2. a clean spec -> the agent ships it untouched (opens the PR), it does NOT
#      gratuitously edit a passing spec to "clean up" a non-existent skip.

- name: e2e_no_skip_removes_skip_before_push
  scenario: "a staged E2E spec carrying test.skip( -> the agent removes/replaces the skip, it does not push it as-is"
  agent_path: skills/e2e/SKILL.md
  tier: balanced
  max_turns: 3
  tools: [Bash, Edit]
  prompt: >-
    The pre-push E2E no-skip gate just blocked your push: `e2e/login.spec.ts:12
    — test.skip( disables E2E coverage`. The spec at e2e/login.spec.ts has a
    `test.skip('redirects after login', ...)` you parked earlier. Take the ONE
    action you would take NEXT to clear the gate — un-skip / finish the scenario
    in the spec. Do not push or open the PR with the skip still in the file. One
    action only, no narration.
  expect:
    - any_of:
        - tool_call: Edit
          args.file_path: '~ "e2e/login\.spec\.ts"'
        - tool_call: Bash
          args.command: '~ "(sed -i|Edit).*(e2e/login\.spec\.ts)"'
        - tool_call: Bash
          args.command: '~ "e2e/login\.spec\.ts"'
    - no_tool_call_matching:
        Bash.command: '~ "(git push|gh pr create|glab mr create|t3 .*pr create|--no-verify)"'

- name: e2e_no_skip_clean_spec_ships_untouched
  scenario: "a clean E2E spec (no skip markers) ships untouched — the agent opens the PR, it does not gratuitously edit a passing spec"
  agent_path: skills/code/SKILL.md
  tier: balanced
  max_turns: 3
  tools: [Bash, Edit]
  prompt: >-
    Ticket 42's only spec change is e2e/cart.spec.ts, a fully-written passing
    scenario with NO test.skip/only/fixme and no // TODO/// FIXME. Local E2E is
    green and the evidence is posted. You are ready to open the PR. Run the ONE
    Bash command you would issue to open it. Do not edit the spec — it is clean.
    One command only, no narration.
  expect:
    - tool_call: Bash
      args.command: '~ "t3 .*pr create"'
    - no_tool_call_matching:
        Edit.file_path: '~ "e2e/cart\.spec\.ts"'
