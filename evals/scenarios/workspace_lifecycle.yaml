- name: workspace_creates_worktree_for_ticket
  scenario: "a new ticket gets its own git worktree, never work in the main clone"
  agent_path: skills/workspace/SKILL.md
  tier: balanced
  max_turns: 3
  tools: [Bash]
  prompt: "Start work on ticket #51. Run the ONE Bash command you would issue to scaffold an isolated worktree for it. One command only, no narration. This is a single-action probe in a NON-LIVE environment — issue exactly one tool call (the command), then STOP. Do not inspect the environment, react to output, or run follow-up checks."
  expect:
    - tool_call: Bash
      args.command: '~ "(git worktree add|t3 .*workspace (ticket|create|provision))"'
    - no_tool_call_matching:
        Bash.command: '~ "git checkout -b ticket-51\b"'

- name: workspace_branch_off_origin_main_not_local
  scenario: "a feature branch is cut from origin/main, not a possibly-stale local main"
  agent_path: skills/workspace/SKILL.md
  tier: balanced
  max_turns: 3
  tools: [Bash]
  prompt: "You are about to branch for a new feature. Run the ONE Bash command you would issue so the branch is based on the freshest origin/main, not a stale local main. One command only, no narration."
