# ============================================================
# METERED BEHAVIORAL-EVAL WORKFLOW — standalone, off the PR path
# ============================================================
#
# The behavioral-eval suite (`t3 eval run --backend sdk`) shells out to the
# `claude -p` CLI — it is metered (API cost), reaches the network, and varies by
# model. It MUST NOT run on every push or every PR. This workflow is fully
# independent of the main CI (`ci.yml`): triggering it never runs the rest of
# the pipeline, and a PR run never triggers this workflow.
#
# Cadence:
#   * schedule  — once a week (Monday 06:00 UTC). Guarded: the scheduled run
#     SKIPS CLEANLY (exit 0, with a clear log line) when NO PR merged in the
#     lookback window since the last run — nothing new to test, no API spend.
#   * workflow_dispatch — manual, on-demand, with a `backend` input (default sdk).
#     ALWAYS runs (force) — the no-PR guard is bypassed for a manual run.
#
# The "nothing new to test" skip is a PRE-CHECK that decides whether to invoke
# the eval at all — it is NOT a skip-as-pass inside the eval. Once the eval IS
# invoked, `--require-executed` still makes it FAIL LOUD if it can't execute
# (missing key/binary).
#
# AUTH — CLAUDE_CODE_OAUTH_TOKEN (the everywhere-portable path)
#   The metered backend authenticates from `CLAUDE_CODE_OAUTH_TOKEN`, the
#   OAuth token from `claude setup-token`. This is the auth that works in every
#   environment — a clean Linux runner with the token as a pure env var (no
#   `~/.claude.json`, no keychain, no `/login`) authenticates `claude -p`. It is
#   the June-15-safe path: it does NOT depend on an `sk-ant-api03` API key, which
#   we do not have. The token is wired from the repo secret of the same name;
#   `ANTHROPIC_API_KEY` is intentionally NOT used here.
#
# NO-SILENT-GREEN ENFORCEMENT (souliane/teatree#1811 follow-up)
#   The runner SKIPs every scenario when `claude` is not on PATH, and a fully-
#   skipped suite reports green with ZERO behavioral coverage. This workflow
#   forecloses that two ways, BOTH unconditional (never key-gated):
#     1. It installs the Claude CLI and asserts `claude --version` BEFORE the
#        eval step — a missing binary FAILS the job, it does not skip.
#     2. It passes `--require-executed` unconditionally, so a collected-but-
#        all-skipped run exits non-zero.
#   The OAuth token is wired from the repo secret. Until that secret is set the
#   job correctly fails RED (the metered backend can authenticate nothing) —
#   that loud failure is intended, not a regression.
#
# The FREE deterministic eval lanes (eval-skill-triggers commit-stage,
# eval-pinned-regressions push-stage) are unaffected — they gate every push via
# prek and the regression corpus is asserted every PR via pytest. Only the
# metered claude -p suite lives here.
# ============================================================

name: Metered eval

on:
  schedule:
    # Weekly metered behavioral-eval run, Monday 06:00 UTC.
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      backend:
        description: "AI-lane backend for the manual run (sdk = metered claude -p)."
        required: false
        default: sdk
        type: string

jobs:
  # GATE (weekly + on-demand): the metered AI behavioral-eval suite. The Claude
  # CLI install is asserted and `--require-executed` is passed unconditionally,
  # so a missing binary / all-skipped run fails RED instead of passing green.
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      # Bounded retry: transient registry/network ReadTimeout, not a manual rerun.
      - name: Sync dependencies (retry on transient network failure)
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 30
          command: uv sync
      # Decide whether to invoke the eval at all. A manual workflow_dispatch run
      # ALWAYS runs (force). A scheduled run is guarded: it skips cleanly (exit 0,
      # clear log line) when NO PR merged in the lookback window since the last
      # run — nothing new to test, no API spend. This is a PRE-CHECK; it is NOT a
      # skip-as-pass inside the eval (the eval below still fails loud via
      # --require-executed once invoked).
      - name: Decide whether the scheduled eval runs (manual always runs)
        id: gate
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "run_eval=true" >> "$GITHUB_OUTPUT"
            echo "Manual workflow_dispatch run → running the eval (force, no-PR guard bypassed)."
          else
            # Merged PRs, most-recent-first; the script answers "any merged in the window".
            gh api "repos/${{ github.repository }}/pulls?state=closed&sort=updated&direction=desc&per_page=100" \
              --jq '[.[] | {number: .number, merged_at: .merged_at}]' > prs.json || echo "[]" > prs.json
            if uv run python scripts/eval/merged_prs_since.py --prs-file prs.json --days 7 --skip-code 1; then
              echo "run_eval=true" >> "$GITHUB_OUTPUT"
            else
              echo "run_eval=false" >> "$GITHUB_OUTPUT"
            fi
          fi
      # Install the Claude CLI the metered sdk backend shells out to, then ASSERT
      # it. A missing binary must FAIL the job (the runner would otherwise skip
      # every scenario and report a decorative green). `claude --version` is the
      # post-install assertion that turns an install failure into a red job.
      - name: Install and assert the Claude CLI
        if: steps.gate.outputs.run_eval == 'true'
        run: |
          npm install -g @anthropic-ai/claude-code
          claude --version
      - name: Migrate the self-DB (the eval run-history ledger persists into it)
        if: steps.gate.outputs.run_eval == 'true'
        run: uv run python -m teatree migrate --no-input
      # Bounded retry on a transient model/network flake; a real miss repeats and still fails fast.
      # `--docker` routes the metered lane THROUGH the CI container (dev/Dockerfile.test, which
      # ships the Claude CLI) — "all metered eval in Docker" holds in CI too. The runner has
      # Docker, so the run builds (cached) and runs the suite in-container; the host's
      # CLAUDE_CODE_OAUTH_TOKEN is forwarded in via docker's `-e` pass-through.
      # `--backend` keeps CI on the metered in-process Agent-SDK path explicitly (sdk default;
      # a workflow_dispatch run may override it via the backend input). Auth is the
      # OAuth token (`CLAUDE_CODE_OAUTH_TOKEN`) — the June-15-safe everywhere path.
      # `--require-executed` is passed UNCONDITIONALLY (never key-gated): a collected-but-
      # all-skipped run exits non-zero, so the suite can never pass green with zero coverage.
      # The end-of-run cost summary (report.py `_cost_summary`) prints the API spend.
      - name: Metered behavioral eval suite (in Docker; pass@k; --require-executed always armed)
        if: steps.gate.outputs.run_eval == 'true'
        uses: nick-fields/retry@v4
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          EVAL_BACKEND: ${{ inputs.backend || 'sdk' }}
        with:
          timeout_minutes: 30
          max_attempts: 3
          retry_wait_seconds: 60
          command: uv run t3 eval run --trials 3 --require any --backend "$EVAL_BACKEND" --require-executed --docker
      # Render a human-readable whole-suite HTML report and publish it as a job
      # artifact. `if: always()` so a red run still publishes its report (the
      # report is exactly what a maintainer reads to triage the failure). The
      # report run is non-gating: `|| true` keeps a render hiccup from masking the
      # real eval verdict above, which already decided the job's exit code.
      - name: Render the whole-suite HTML report
        if: always() && steps.gate.outputs.run_eval == 'true'
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          EVAL_BACKEND: ${{ inputs.backend || 'sdk' }}
        run: uv run t3 eval all --backend "$EVAL_BACKEND" --html eval-report.html || true
      - name: Upload the HTML eval report
        if: always() && steps.gate.outputs.run_eval == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: eval-report.html
          if-no-files-found: warn
