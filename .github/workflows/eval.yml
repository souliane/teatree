# ============================================================
# METERED BEHAVIORAL-EVAL WORKFLOW — standalone, off the PR path
# ============================================================
#
# The behavioral-eval suite (`t3 eval run --backend api`) runs the metered
# in-process Agent-SDK suite (the SDK spawns the `claude` CLI child internally,
# so `shutil.which("claude")` is still the provisioning gate) — it is metered
# (API cost), reaches the network, and varies by
# model. It MUST NOT run on every push or every PR. This workflow is fully
# independent of the main CI (`ci.yml`): triggering it never runs the rest of
# the pipeline, and a PR run never triggers this workflow.
#
# Cadence:
#   * schedule  — once a week (Monday 06:00 UTC). Guarded: the scheduled run
#     SKIPS CLEANLY (exit 0, with a clear log line) when NO PR merged in the
#     lookback window since the last run — nothing new to test, no API spend.
#   * workflow_dispatch — manual, on-demand, always on the api backend
#     and an optional `lane` input. ALWAYS runs (force) — the no-PR guard is
#     bypassed for a manual run.
#
# LANE+SHARD FAN-OUT (souliane/teatree#2492, #2683):
#   The FULL suite (~196 scenarios x 3 trials) does not finish in a single 2x80min
#   budget. The catalog is NOT evenly split: clean_room is ~182 scenarios and
#   under_load is 14, so fanning out ONE leg per lane still leaves a 182-scenario
#   clean_room leg (~92% of the suite) that hits the same 80min wall. So the
#   `prepare` job computes a `{lane, shard}` matrix (`scripts/eval/lane_matrix.py`):
#   each lane is split into contiguous shards — a deterministic partition by
#   scenario name (every scenario in exactly one shard, none dropped or duplicated).
#   The per-shard ceiling is LANE-AWARE because the two lanes have wildly different
#   per-scenario cost (#2683):
#     * clean_room — ONE skill into an empty context, seconds-to-a-minute each, so
#       the ceiling is 14: clean_room (~182) becomes ceil(182 / 14) ~= 13 shards.
#     * under_load — FULL skill bundle + polluted context preamble + a spawned
#       multi-agent roster, 10-45 MINUTES per scenario at 3 trials. Run 27995563148
#       proved a single `1/1` under_load leg hits the 80min step cap (the 4800000ms
#       timeout), so its ceiling is 4: under_load (14) becomes 4 shards.
#   The `eval` job fans OUT one matrix leg per SHARD, each leg metering at most its
#   lane's ceiling — so EVERY leg (not just clean_room) fits the budget. Full
#   coverage, parallel wall-clock. `fail-fast: false` keeps each leg's verdict
#   independent (a red shard never cancels the others).
#
# The "nothing new to test" skip is a PRE-CHECK that decides whether to invoke
# the eval at all — it is NOT a skip-as-pass inside the eval. Once the eval IS
# invoked, `--require-executed` still makes it FAIL LOUD if it can't execute
# (missing key/binary).
#
# COST-BOUNDS GATE (`--gate-cost-bounds`, evals/cost_bounds.yaml):
#   The declarative per-scenario cost ceiling gate reads the JUST-PERSISTED run
#   to check each scenario's metered cost against its calibrated bound x
#   (1 + margin). It therefore needs the durable run-history ledger and CANNOT
#   run inside the ephemeral `--docker` container this workflow uses (the
#   in-container run is forced `--no-persist`). The cost gate is wired into the
#   PERSISTED metered path in `.gitlab-ci.yml` (no `--docker`), where the ledger
#   lives on the runner via `--local` — keeping the cost gate weekly/manual and
#   off the per-PR path. A maintainer can also run it on the host against the
#   accumulated ledger: `t3 eval run --backend api --local --gate-cost-bounds`.
#
# AUTH — ANTHROPIC_API_KEY (metered, EXCLUSIVE — never the subscription token)
#   The metered backend authenticates EXCLUSIVELY from `ANTHROPIC_API_KEY`, the
#   metered API key. It is wired from the repo secret of the same name as a pure
#   env var (no `~/.claude.json`, no keychain, no `/login`) and authenticates the
#   in-process Agent-SDK's `claude` child on the metered API. The subscription
#   `CLAUDE_CODE_OAUTH_TOKEN` is intentionally NOT used here (#2707): the
#   subscription is rate-limited by a depleting usage window, so a full
#   211-scenario run would throttle and the throttled cells would be mislabeled.
#   The metered API has no such window. The isolation env strips any inherited
#   OAuth token so the in-container SDK can never bill the subscription.
#
# NO-SILENT-GREEN ENFORCEMENT (souliane/teatree#1811 follow-up)
#   The runner SKIPs every scenario when `claude` is not on PATH, and a fully-
#   skipped suite reports green with ZERO behavioral coverage. This workflow
#   forecloses that two ways, BOTH unconditional (never key-gated):
#     1. It installs the Claude CLI and asserts `claude --version` BEFORE the
#        eval step — a missing binary FAILS the job, it does not skip.
#     2. It passes `--require-executed` unconditionally, so a collected-but-
#        all-skipped run exits non-zero.
#   The API key is wired from the `ANTHROPIC_API_KEY` repo secret. Until that
#   secret is set the job correctly fails RED (the metered backend can
#   authenticate nothing) — that loud failure is intended, not a regression.
#
# PUBLISH + FAILURE NOTIFICATION (souliane/teatree#2704)
#   After the shard fan-out, the `publish` job merges every shard's SANITIZED
#   summary (`eval-summary-*` — counts + a scenario|lane|verdict|trials table, NO
#   transcript) into the public dashboard `docs/evals/index.md` and pushes it to
#   main; that push triggers `docs.yml`, which serves the dashboard on Pages. The
#   private per-trial transcripts stay in the `eval-report-*` artifacts.
#   A red weekly run needs no extra alerting plumbing: GitHub's NATIVE
#   failed-workflow-run email goes to the maintainer (Actions → Notifications) with
#   no extra secret and no bot — that is the failure-notification mechanism here.
#
# The FREE deterministic TESTS (eval-skill-triggers commit-stage,
# eval-pinned-regressions push-stage) are unaffected — they gate every push via
# prek and the regression corpus is asserted every PR via pytest. Only the
# metered in-process Agent-SDK eval (the SDK spawns the `claude` CLI child
# internally, so `shutil.which("claude")` is still the provisioning gate) lives here.
# ============================================================

name: Metered eval

on:
  schedule:
    # Weekly metered behavioral-eval run, Monday 06:00 UTC.
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      lane:
        description: "Eval lane subset to run (clean_room | under_load); empty = every lane."
        required: false
        default: ""
        type: string

jobs:
  # PREPARE: ONE place that (a) decides whether the eval runs at all (the weekly
  # no-PR guard / manual force) and (b) computes the per-leg {lane, shard} matrix.
  # The full ~196-scenario x 3-trial suite (clean_room ~182 / under_load 14) cannot
  # finish in a single 2x80min budget (#2492), and BOTH a single ~182-scenario
  # clean_room leg AND a single under_load leg hit the wall — so the eval job below
  # fans OUT across SHARDS: one leg per shard, each metering at most its LANE's
  # ceiling (clean_room 14, under_load 4 — #2683, roster-spawning scenarios cost
  # 10-45 min each).
  prepare:
    runs-on: ubuntu-latest
    outputs:
      run_eval: ${{ steps.gate.outputs.run_eval }}
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7
        with:
          enable-cache: true
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.13"
      - name: Sync dependencies (retry on transient network failure)
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60  # v4
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 30
          command: uv sync
      # Decide whether to invoke the eval at all. A manual workflow_dispatch run
      # ALWAYS runs (force). A scheduled run is guarded: it skips cleanly (exit 0,
      # clear log line) when NO PR merged in the lookback window since the last
      # run — nothing new to test, no API spend. This is a PRE-CHECK; it is NOT a
      # skip-as-pass inside the eval (the eval below still fails loud via
      # --require-executed once invoked).
      - name: Decide whether the scheduled eval runs (manual always runs)
        id: gate
        env:
          GH_TOKEN: ${{ github.token }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "run_eval=true" >> "$GITHUB_OUTPUT"
            echo "Manual workflow_dispatch run → running the eval (force, no-PR guard bypassed)."
          else
            # Merged PRs, most-recent-first; the script answers "any merged in the window".
            gh api "repos/${{ github.repository }}/pulls?state=closed&sort=updated&direction=desc&per_page=100" \
              --jq '[.[] | {number: .number, merged_at: .merged_at}]' > prs.json || echo "[]" > prs.json
            if uv run python scripts/eval/merged_prs_since.py --prs-file prs.json --days 7 --skip-code 1; then
              echo "run_eval=true" >> "$GITHUB_OUTPUT"
            else
              echo "run_eval=false" >> "$GITHUB_OUTPUT"
            fi
          fi
      # Compute the {lane, shard} matrix the eval job fans out over. Empty `lane`
      # input (scheduled runs and the default manual run) = every permitted lane,
      # sharded into budget-safe legs on the lane-aware ceiling (clean_room ~182 →
      # ~13 shards of ≤14, under_load 14 → 4 shards of ≤4 — #2683). An explicit
      # `lane` input shards only that lane. An unknown lane fails loud here rather
      # than producing an empty matrix. The lane input is routed through an `env:`
      # var (never inlined into the shell) and validated by lane_matrix.py against
      # PERMITTED_LANES.
      - name: Compute the lane+shard matrix
        id: matrix
        env:
          EVAL_LANE: ${{ inputs.lane || '' }}
        run: |
          MATRIX="$(uv run python scripts/eval/lane_matrix.py --lane "$EVAL_LANE")"
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"
          echo "Lane+shard matrix: $MATRIX"

  # GATE (weekly + on-demand): the metered AI behavioral-eval suite, fanned out
  # ONE {lane, shard} per matrix leg (#2492). The Claude CLI install is asserted
  # and `--require-executed` is passed unconditionally, so a missing binary /
  # all-skipped run fails RED instead of passing green.
  eval:
    needs: prepare
    if: needs.prepare.outputs.run_eval == 'true'
    runs-on: ubuntu-latest
    strategy:
      # `fail-fast: false` so a red shard does not cancel the other shards
      # mid-run — each leg's verdict is independent signal.
      fail-fast: false
      # `include` with the prepare job's `{lane, shard}` objects: each leg meters
      # exactly its lane's `index/total` shard, bounded by the LANE's per-shard
      # ceiling (clean_room ≤14, under_load ≤4 — #2683), so EVERY leg fits the
      # budget — clean_room AND under_load alike.
      matrix:
        include: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    # FAIL LOUD on a hang. Without a job-level cap a wedge ANYWHERE outside the
    # retry-wrapped eval step (a stuck report render, a hung docker build/daemon)
    # runs to GitHub's 6h default with no signal — and an in-progress job's log
    # blob is never exposed, so a hang looks identical to a slow run for hours.
    # The eval step is bounded to 80min x 2 attempts (160min worst case);
    # 180min caps the whole job just above that (plus the report/upload steps)
    # so a real hang is killed and surfaced as a red, diagnosable run instead of
    # an indefinite stall. Each leg now meters ONE shard bounded by its lane's
    # ceiling (clean_room ≤14, under_load ≤4 — #2683), which fits the budget.
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7
        with:
          enable-cache: true
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.13"
      # Bounded retry: transient registry/network ReadTimeout, not a manual rerun.
      - name: Sync dependencies (retry on transient network failure)
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60  # v4
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 30
          command: uv sync
      # Install the Claude CLI the metered api backend shells out to, then ASSERT
      # it. A missing binary must FAIL the job (the runner would otherwise skip
      # every scenario and report a decorative green). `claude --version` is the
      # post-install assertion that turns an install failure into a red job.
      - name: Install and assert the Claude CLI
        run: |
          npm install -g @anthropic-ai/claude-code
          claude --version
      - name: Migrate the self-DB (the eval run-history ledger persists into it)
        run: uv run python -m teatree migrate --no-input
      # Bounded retry on a transient model/network flake; a real miss repeats and still fails fast.
      # `--docker` routes the metered lane THROUGH the CI container (dev/Dockerfile.test, which
      # ships the Claude CLI) — "all metered eval in Docker" holds in CI too. The runner has
      # Docker, so the run builds (cached) and runs the suite in-container; the host's
      # ANTHROPIC_API_KEY is forwarded in via docker's `-e` pass-through.
      # `--backend api` keeps CI on the metered in-process Agent-SDK path explicitly.
      # This workflow always runs `--trials 3`, which cannot be served by the
      # transcript backend, so there is intentionally no backend input. Auth is
      # the metered API key (`ANTHROPIC_API_KEY`) EXCLUSIVELY — never the
      # subscription OAuth token, which a full run would throttle (#2707).
      # `--require-executed` is passed UNCONDITIONALLY (never key-gated): a collected-but-
      # all-skipped run exits non-zero, so the suite can never pass green with zero coverage.
      # The end-of-run cost summary (report.py `_cost_summary`) prints the API spend.
      #
      # `--transcript-html` makes THIS run emit the per-trial transcript report
      # itself, written from its own in-memory results — NO separate render step
      # that re-runs the whole suite (the old `t3 eval all --html` step re-graded
      # all ~181 scenarios for ~64min AFTER this step), and NO read-only-mount
      # write failure (the report lands in $RUNNER_TEMP via the docker runner's
      # writable /artifacts bind-mount, never the `:ro` repo mount). The artifact
      # carries, per scenario, each trial's PASS/FAIL plus the agent's transcript
      # (reasoning + tool calls) so a maintainer can diagnose a red shard.
      # A filesystem-safe per-lane-and-shard suffix, computed BEFORE the eval run so
      # the summary file is uniquely named per shard. `merge-multiple` flattens every
      # shard's summary into ONE dir in the publish job — a shared basename would
      # collide (last-writer-wins) and silently drop all but one shard's results.
      - name: Compute a filesystem-safe artifact suffix
        id: artifact
        env:
          EVAL_LANE: ${{ matrix.lane }}
          EVAL_SHARD: ${{ matrix.shard }}
        run: echo "suffix=${EVAL_LANE}-${EVAL_SHARD//\//-}" >> "$GITHUB_OUTPUT"
      - name: Metered behavioral eval suite (in Docker; pass@k; --require-executed always armed)
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60  # v4
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # This leg meters exactly ONE shard of ONE lane (the matrix values), so the
          # per-shard subset is bounded by the LANE's ceiling — clean_room ≤14,
          # under_load ≤4 (#2683) — and fits the 2x80min budget where the full suite,
          # a single ~182-scenario clean_room leg, AND a single under_load 1/1 leg
          # (run 27995563148, 80min cap) did not. The matrix values come from the
          # prepare job's validated plan, never raw input — so `lane` is always a
          # permitted lane and `shard` is always a valid index/total.
          EVAL_LANE: ${{ matrix.lane }}
          EVAL_SHARD: ${{ matrix.shard }}
        with:
          # A single shard is ≤ its lane's ceiling (clean_room ≤14, under_load ≤4 —
          # #2683) x 3 trials, each a real metered `claude` SDK call. Each retry
          # re-runs the whole leg from scratch (`--no-persist`, no resume), so a
          # too-tight timeout just truncates and repeats partial work every attempt
          # and never completes (the observed "hang"). 80min per attempt lets ONE
          # shard finish comfortably (under_load's roster-spawning scenarios are
          # 10-45 min each, so ≤4 fits with headroom); 2 attempts
          # keep ONE transient-failure retry (the whole point of the retry wrapper —
          # an AI/network flake is retried, not red-failed) without a third
          # truncating pass. 2x80=160min sits under the 180min job cap. The
          # per-scenario RUN/DONE progress lines (multi_trial.py) plus the job-level
          # `timeout-minutes` make a genuine stall diagnosable (last RUN line = the
          # wedged scenario) and fail loud rather than re-burning spend indefinitely.
          timeout_minutes: 80
          max_attempts: 2
          retry_wait_seconds: 60
          # `--lane "$EVAL_LANE" --shard "$EVAL_SHARD"` scopes the leg to its one
          # lane's one shard. `--transcript-html` writes to $RUNNER_TEMP (always
          # writable; the report is dropped before the eval's own non-zero exit, so a
          # red shard is still captured). The retry re-runs the whole `command`, so
          # the file is simply overwritten with the last attempt's results — no
          # staleness.
          # `--summary-md` writes the SANITIZED publish-safe dashboard (counts +
          # a scenario|lane|verdict|trials table, NO transcript) alongside the
          # private transcript — both land in $RUNNER_TEMP (the writable artifacts
          # mount). The `publish` job merges every shard's summary into the public
          # dashboard; the transcript stays in the private `eval-report-*` artifact.
          command: |
            uv run t3 eval run --trials 3 --require any --backend api \
              --lane "$EVAL_LANE" --shard "$EVAL_SHARD" \
              --require-executed --docker \
              --transcript-html "$RUNNER_TEMP/eval-transcripts.html" \
              --summary-md "$RUNNER_TEMP/eval-summary-${{ steps.artifact.outputs.suffix }}.md"
      # Publish the per-trial transcript report THIS leg emitted as a job artifact.
      # `if: always()` so a red leg still publishes it (the report is exactly what a
      # maintainer reads to triage the failure; the eval step above already decided
      # the leg's exit code). No render step — the artifact was written by the run.
      # The name is per-lane-and-shard so parallel matrix legs never collide on one
      # artifact (the `/` in the shard token is replaced — artifact names forbid it).
      # The `artifact` suffix step runs earlier, just before the eval run.
      - name: Upload the per-trial transcript report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: eval-report-${{ steps.artifact.outputs.suffix }}
          path: ${{ runner.temp }}/eval-transcripts.html
          if-no-files-found: warn
      # The SANITIZED publish-safe summary (counts + a scenario|lane|verdict|trials
      # table, NO transcript) — a SEPARATE artifact from the private transcript so
      # the `publish` job can download just these and merge them into the public
      # dashboard. `if: always()` so a red shard still publishes its summary.
      - name: Upload the sanitized summary (publish-safe)
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: eval-summary-${{ steps.artifact.outputs.suffix }}
          path: ${{ runner.temp }}/eval-summary-${{ steps.artifact.outputs.suffix }}.md
          if-no-files-found: warn

  # PUBLISH: merge every shard's sanitized summary into ONE public dashboard and
  # commit it to main. `needs: [prepare, eval]` + `if: always() && run_eval == 'true'`
  # so it still runs when a shard went red (a red dashboard is worth publishing) but is
  # SKIPPED when prepare gated the eval out — otherwise it would download zero summaries
  # and commit a zero-row dashboard over the real one. It downloads only
  # the `eval-summary-*` artifacts (NEVER the private transcripts), merges them via
  # scripts/eval/merge_summaries.py into docs/evals/index.md, writes the same
  # content to $GITHUB_STEP_SUMMARY, and — when the file changed — commits + pushes
  # to main as github-actions[bot]. The push triggers docs.yml, which builds the
  # site and serves the dashboard on GitHub Pages. The unchanged-file guard makes a
  # no-diff run a clean no-op (no empty commit).
  #
  # FAILURE NOTIFICATION: a red weekly run is surfaced by GitHub's NATIVE failed-run
  # email to the maintainer (no extra secret, no bot) — see the top-of-file note.
  publish:
    needs: [prepare, eval]
    if: always() && needs.prepare.outputs.run_eval == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          ref: main
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7
        with:
          enable-cache: true
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.13"
      # Pull every shard's sanitized summary into one dir (merge-multiple flattens
      # the per-artifact subdirs). Only the publish-safe `eval-summary-*` artifacts
      # — the private transcripts are never downloaded here.
      - name: Download every shard's sanitized summary
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093  # v4
        with:
          path: ${{ runner.temp }}/summaries
          pattern: eval-summary-*
          merge-multiple: true
      # Merge into the public dashboard. The run-url / sha / generated-at are
      # INJECTED here (the script never calls datetime.now()), so the merge is
      # deterministic. `date -u` supplies the UTC timestamp.
      - name: Merge the shard summaries into the public dashboard
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          SHA: ${{ github.sha }}
        run: |
          GENERATED_AT="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          uv run python scripts/eval/merge_summaries.py "$RUNNER_TEMP/summaries" \
            --run-url "$RUN_URL" --sha "$SHA" --generated-at "$GENERATED_AT" \
            --out docs/evals/index.md
          cat docs/evals/index.md >> "$GITHUB_STEP_SUMMARY"
      # Commit + push the dashboard ONLY when it changed (an unchanged file is a
      # clean no-op — no empty commit). The push to main triggers docs.yml, which
      # serves the dashboard on Pages.
      - name: Commit and push the dashboard when it changed
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          if git diff --quiet -- docs/evals/index.md; then
            echo "Dashboard unchanged — nothing to commit."
          else
            git add docs/evals/index.md
            git commit -m "docs(evals): refresh weekly behavioral-eval dashboard"
            git push origin main
          fi
