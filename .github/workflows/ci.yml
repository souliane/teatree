name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: uv sync
      - uses: j178/prek-action@v2
        env:
          SKIP: pytest,uv-audit,cyclonedx-sbom

  uv-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: uv sync
      - run: uv audit --preview-features audit

  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: uv sync
      - run: scripts/hooks/generate_sbom.sh
      - run: git diff --exit-code sbom.json
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: sbom
          path: sbom.json

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: dev/Dockerfile.test
          load: true
          tags: teatree-test-${{ matrix.python-version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      # --cov-fail-under=0 disables the per-run threshold here — the 93% gate
      # runs on the combined unit+e2e report in the `coverage` job below.
      - run: >
          docker run --rm
          -v "$PWD":/app
          -e UV_PROJECT_ENVIRONMENT=/tmp/.venv
          -e COVERAGE_FILE=/app/.coverage.unit
          teatree-test-${{ matrix.python-version }}
          uv run -p ${{ matrix.python-version }} pytest --no-header -q
          -o cache_dir=/tmp/.pytest_cache
          --cov-fail-under=0
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-data-unit
          path: .coverage.unit*
          include-hidden-files: true

  e2e:
    runs-on: ubuntu-latest
    env:
      COVERAGE_FILE: .coverage.e2e
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: uv sync
      - run: uv run playwright install --with-deps chromium
      - run: uv tool install --editable .
      - run: t3 teatree e2e project --no-docker
      - name: Upload snapshot failure diffs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-snapshot-failures
          path: e2e/snapshot_tests_failures/
          if-no-files-found: ignore
          retention-days: 14
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-data-e2e
          path: .coverage.e2e*
          include-hidden-files: true
          if-no-files-found: ignore

  # Combine the .coverage.* artifacts produced by `test` and `e2e` into a
  # single report. No test re-run — `coverage combine` merges the data files,
  # then `report` enforces the threshold and `html` produces the browsable
  # report. Mirrors what scripts/coverage.sh does locally.
  coverage:
    runs-on: ubuntu-latest
    needs: [test, e2e]
    if: always()
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: uv sync
      - uses: actions/download-artifact@v6
        with:
          pattern: coverage-data-*
          merge-multiple: true
      - run: uv run coverage combine
      - run: uv run coverage report --fail-under=93
      - run: uv run coverage html
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-html
          path: htmlcov/
          retention-days: 30
