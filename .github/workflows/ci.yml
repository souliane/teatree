name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: uv sync
      - uses: j178/prek-action@v2
        env:
          SKIP: pytest,pip-audit

  pip-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: uv sync
      - run: |
          tmp=$(mktemp)
          uv export --no-hashes --dev -o "$tmp"
          uv run pip-audit -r "$tmp"

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: dev/Dockerfile.test
          load: true
          tags: teatree-test-${{ matrix.python-version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - run: >
          docker run --rm
          -v "$PWD":/app
          -e UV_PROJECT_ENVIRONMENT=/tmp/.venv
          -e COVERAGE_FILE=/app/.coverage
          teatree-test-${{ matrix.python-version }}
          uv run -p ${{ matrix.python-version }} pytest --no-header -q
          -o cache_dir=/tmp/.pytest_cache
          --cov-report=xml:/app/coverage.xml
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: uv sync
      - run: uv run playwright install --with-deps chromium
      - run: uv tool install --editable .
      - run: t3 teatree e2e project --no-docker
      - name: Upload snapshot failure diffs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: e2e-snapshot-failures
          path: e2e/snapshot_tests_failures/
          if-no-files-found: ignore
          retention-days: 14
