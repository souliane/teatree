name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: uv sync
      - uses: j178/prek-action@v2
        env:
          SKIP: pytest,uv-audit,cyclonedx-sbom

  blueprint-cross-pr:
    # Cross-PR §17.1 invariant-numbering gate (souliane/teatree#1288).
    # The pre-commit hook is tree-local; two concurrent PRs each adding
    # the same §17.N pass locally and pass each PR's CI. This step reads
    # BLUEPRINT.md at base (origin/main) and at HEAD and fails when the
    # PR introduces a number the base also added since the merge-base.
    # Only runs on pull_request events because push-to-main has nothing
    # to diff against and the underlying hook covers the merge result.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # fetch-depth: 0 so `git merge-base origin/main HEAD` resolves.
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: uv sync
      - name: Check for BLUEPRINT.md change in this PR
        id: blueprint_diff
        run: |
          if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -qx 'BLUEPRINT.md'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi
      - name: §17.1 invariant-numbering cross-PR check
        if: steps.blueprint_diff.outputs.changed == 'true'
        run: uv run python scripts/hooks/check_blueprint_invariant_numbering.py --ci --base-ref=origin/${{ github.base_ref }}

  doc-update-gate:
    # Deterministic doc-update gate (souliane/teatree#1461). The
    # pre-push hook runs against staged changes; CI re-runs the same
    # check on the PR diff so an agent that bypasses prek still trips
    # the gate. Reads the PR-vs-base diff into the git index so the
    # hook's ``git diff --cached`` query sees the PR contents.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: uv sync
      - name: Stage PR diff against base
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch --no-tags origin "${BASE_REF}"
          git reset --soft FETCH_HEAD
      - run: uv run python scripts/hooks/check_doc_update.py

  docs-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: uv sync --group docs
      # Regenerate every generated reference page and the CLI reference;
      # fail if the committed output is stale so the docs site never
      # drifts from the code. See souliane/teatree#890.
      - run: uv run python manage.py generate_all_docs
      - run: uv run python scripts/hooks/generate_cli_reference.py
      - run: git diff --exit-code docs/generated
      # A strict build is the second half of the gate: a broken link or
      # missing nav target fails CI instead of shipping a broken site.
      - run: uv run mkdocs build --strict

  uv-audit:
    # Job name preserved for compatibility with the PR-sweep scanner's
    # ``--fallback-uv-audit`` escape hatch (see
    # ``src/teatree/loop/scanners/pr_sweep.py`` ``UV_AUDIT_CHECK_NAME``).
    # The inner command is ``pip-audit`` because ``uv audit`` is still
    # a preview feature and astral-sh/uv#19492 (OSV parser regression)
    # turned every PR red. ``pip-audit`` uses the same OSV backend and
    # is production-stable. See souliane/teatree#1264.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: uv sync
      - run: uv export --format requirements-txt --no-emit-project --no-emit-workspace --no-header --quiet > requirements.audit.txt
      - run: uvx pip-audit --strict --vulnerability-service osv --disable-pip -r requirements.audit.txt

  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: uv sync
      - run: scripts/hooks/generate_sbom.sh
      - run: git diff --exit-code sbom.json
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: sbom
          path: sbom.json

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: dev/Dockerfile.test
          load: true
          tags: teatree-test-${{ matrix.python-version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      # ``--cov-fail-under=93`` is also configured in ``[tool.coverage.report]
      # fail_under``; passing it on the CLI makes the gate explicit at the
      # invocation site so a future ``pyproject.toml`` edit can't silently
      # disarm CI. Both must agree — ``tests/test_coverage_floor_guard.py``
      # locks the floor value.
      - run: >
          docker run --rm
          -v "$PWD":/app
          -e UV_PROJECT_ENVIRONMENT=/tmp/.venv
          -e COVERAGE_FILE=/app/.coverage
          teatree-test-${{ matrix.python-version }}
          uv run -p ${{ matrix.python-version }} pytest --no-header -q
          -o cache_dir=/tmp/.pytest_cache
          --cov-report=xml:/app/coverage.xml
          --cov-fail-under=93
      - name: Enforce per-module coverage floors
        run: >
          docker run --rm
          -v "$PWD":/app
          -e UV_PROJECT_ENVIRONMENT=/tmp/.venv
          -e COVERAGE_FILE=/app/.coverage
          teatree-test-${{ matrix.python-version }}
          uv run -p ${{ matrix.python-version }} t3 ci coverage
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml
