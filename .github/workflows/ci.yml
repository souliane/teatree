name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: uv sync
      - uses: j178/prek-action@v2
        env:
          SKIP: pytest,uv-audit,cyclonedx-sbom

  docs-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: uv sync --group docs
      # Regenerate every generated reference page and the CLI reference;
      # fail if the committed output is stale so the docs site never
      # drifts from the code. See souliane/teatree#890.
      - run: uv run python manage.py generate_all_docs
      - run: uv run python scripts/hooks/generate_cli_reference.py
      - run: git diff --exit-code docs/generated
      # A strict build is the second half of the gate: a broken link or
      # missing nav target fails CI instead of shipping a broken site.
      - run: uv run mkdocs build --strict

  uv-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: uv sync
      - run: uv audit --preview-features audit

  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: uv sync
      - run: scripts/hooks/generate_sbom.sh
      - run: git diff --exit-code sbom.json
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: sbom
          path: sbom.json

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: dev/Dockerfile.test
          load: true
          tags: teatree-test-${{ matrix.python-version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      # ``--cov-fail-under=93`` is also configured in ``[tool.coverage.report]
      # fail_under``; passing it on the CLI makes the gate explicit at the
      # invocation site so a future ``pyproject.toml`` edit can't silently
      # disarm CI. Both must agree — ``tests/test_coverage_floor_guard.py``
      # locks the floor value.
      - run: >
          docker run --rm
          -v "$PWD":/app
          -e UV_PROJECT_ENVIRONMENT=/tmp/.venv
          -e COVERAGE_FILE=/app/.coverage
          teatree-test-${{ matrix.python-version }}
          uv run -p ${{ matrix.python-version }} pytest --no-header -q
          -o cache_dir=/tmp/.pytest_cache
          --cov-report=xml:/app/coverage.xml
          --cov-fail-under=93
      - name: Enforce per-module coverage floors
        run: >
          docker run --rm
          -v "$PWD":/app
          -e UV_PROJECT_ENVIRONMENT=/tmp/.venv
          -e COVERAGE_FILE=/app/.coverage
          teatree-test-${{ matrix.python-version }}
          uv run -p ${{ matrix.python-version }} t3 ci coverage
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml
