name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Daily full-tree banned-brand backstop (#1570). The diff-only gate
    # cannot see a brand name already committed; this catches a pre-existing
    # leak even when no new diff touches it.
    - cron: "17 6 * * *"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: uv sync
      - uses: j178/prek-action@v2
        env:
          SKIP: pytest,uv-audit,cyclonedx-sbom
      # Migration-graph linearity gate. Two PRs branching a migration off
      # the same parent each pass locally and pass their own CI, then merge
      # into a forked graph with multiple leaf nodes that ``migrate`` refuses
      # to run. ``makemigrations --check`` raises ``Conflicting migrations
      # detected`` (exit 1) on a forked graph, failing the PR before it lands.
      - run: uv run python manage.py makemigrations --check --dry-run

  blueprint-cross-pr:
    # Cross-PR §17.1 invariant-numbering gate (souliane/teatree#1288).
    # The pre-commit hook is tree-local; two concurrent PRs each adding
    # the same §17.N pass locally and pass each PR's CI. This step reads
    # BLUEPRINT.md at base (origin/main) and at HEAD and fails when the
    # PR introduces a number the base also added since the merge-base.
    # Only runs on pull_request events because push-to-main has nothing
    # to diff against and the underlying hook covers the merge result.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # fetch-depth: 0 so `git merge-base origin/main HEAD` resolves.
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: uv sync
      - name: Check for BLUEPRINT.md change in this PR
        id: blueprint_diff
        run: |
          if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -qx 'BLUEPRINT.md'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi
      - name: §17.1 invariant-numbering cross-PR check
        if: steps.blueprint_diff.outputs.changed == 'true'
        run: uv run python scripts/hooks/check_blueprint_invariant_numbering.py --ci --base-ref=origin/${{ github.base_ref }}

  doc-update-gate:
    # Deterministic doc-update gate (souliane/teatree#1461). The
    # pre-push hook runs against staged changes; CI re-runs the same
    # check on the PR diff so an agent that bypasses prek still trips
    # the gate. Reads the PR-vs-base diff into the git index so the
    # hook's ``git diff --cached`` query sees the PR contents.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: uv sync
      - name: Stage PR diff against base
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch --no-tags origin "${BASE_REF}"
          git reset --soft FETCH_HEAD
      - run: uv run python scripts/hooks/check_doc_update.py

  docs-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: uv sync --group docs
      # Regenerate every generated reference page and the CLI reference;
      # fail if the committed output is stale so the docs site never
      # drifts from the code. See souliane/teatree#890.
      - run: uv run python manage.py generate_all_docs
      - run: uv run python scripts/hooks/generate_cli_reference.py
      - run: git diff --exit-code docs/generated
      # A strict build is the second half of the gate: a broken link or
      # missing nav target fails CI instead of shipping a broken site.
      - run: uv run mkdocs build --strict

  test-shape:
    # Conservative, report-first test-shape check (near-duplicate test
    # functions + test:source ratio regression vs the committed baseline in
    # [tool.teatree.test_shape]). Default mode is "warn" — the command exits
    # 0 and the job is advisory. Flipping mode to "block" in pyproject.toml
    # makes the same command exit non-zero, promoting this job to a gate
    # without any workflow change. Never a PreToolUse gate; it can never lock
    # the agent's tools.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: uv sync
      - name: Test-shape report
        run: uv run t3 tool test-shape --root .

  banned-terms-tree:
    # Full-tree banned-brand backstop (souliane/teatree#1570). The
    # diff/payload banned-terms gate only ever sees a *change*; a brand
    # name ALREADY committed never appears in a post-landing diff. This
    # job scans every git-tracked file's content for the high-confidence
    # brand list on push-to-main and on a daily schedule, failing CI if a
    # brand is present. The public repo ships with no brands; the list is
    # supplied from the TEATREE_BANNED_BRANDS secret so no tenant name is
    # ever committed. With no secret configured the scan is a clean no-op.
    if: github.event_name == 'push' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: uv sync
      - name: Full-tree banned-brand scan
        env:
          TEATREE_BANNED_BRANDS: ${{ secrets.TEATREE_BANNED_BRANDS }}
        run: uv run t3 banned-terms scan-tree --repo-root .

  uv-audit:
    # Job name preserved for compatibility with the PR-sweep scanner's
    # ``--fallback-uv-audit`` escape hatch (see
    # ``src/teatree/loop/scanners/pr_sweep.py`` ``UV_AUDIT_CHECK_NAME``).
    # The inner command is ``pip-audit`` because ``uv audit`` is still
    # a preview feature and astral-sh/uv#19492 (OSV parser regression)
    # turned every PR red. ``pip-audit`` uses the same OSV backend and
    # is production-stable. See souliane/teatree#1264.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: uv sync
      - run: uv export --format requirements-txt --no-emit-project --no-emit-workspace --no-header --quiet > requirements.audit.txt
      - run: uvx pip-audit --strict --vulnerability-service osv --disable-pip -r requirements.audit.txt

  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: uv sync
      - run: scripts/hooks/generate_sbom.sh
      - run: git diff --exit-code sbom.json
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: sbom
          path: sbom.json

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: dev/Dockerfile.test
          load: true
          tags: teatree-test-${{ matrix.python-version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      # ``--cov-fail-under=93`` is also configured in ``[tool.coverage.report]
      # fail_under``; passing it on the CLI makes the gate explicit at the
      # invocation site so a future ``pyproject.toml`` edit can't silently
      # disarm CI. Both must agree — ``tests/test_coverage_floor_guard.py``
      # locks the floor value.
      - run: >
          docker run --rm
          -v "$PWD":/app
          -e UV_PROJECT_ENVIRONMENT=/tmp/.venv
          -e COVERAGE_FILE=/app/.coverage
          teatree-test-${{ matrix.python-version }}
          uv run -p ${{ matrix.python-version }} pytest --no-header -q
          -o cache_dir=/tmp/.pytest_cache
          --cov-report=xml:/app/coverage.xml
          --cov-fail-under=93
      - name: Enforce per-module coverage floors
        run: >
          docker run --rm
          -v "$PWD":/app
          -e UV_PROJECT_ENVIRONMENT=/tmp/.venv
          -e COVERAGE_FILE=/app/.coverage
          teatree-test-${{ matrix.python-version }}
          uv run -p ${{ matrix.python-version }} t3 ci coverage
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml

  eval-weekly:
    # Weekly behavioral-eval gate. The eval suite shells out to `claude -p`
    # (cost, network, model variance), so it must NOT run on every push or
    # every PR. The cadence is once a week, on the FIRST pull request opened
    # that ISO week — `scripts/eval/first_pr_of_week.py` makes that decision
    # (order-independent, re-run safe). Manual on-demand runs bypass CI: the
    # user runs `t3 eval run` / `t3 eval trigger-qa` locally. The GitLab mirror
    # carries the equivalent rule in `.gitlab-ci.yml`.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: uv sync
      - name: Decide whether this is the first PR of the ISO week
        id: gate
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Most-recent-first so the current ISO week is on the first page even
          # for a repo with thousands of PRs. first_pr_of_week.py also keeps the
          # newest window as a second line of defence regardless of ordering.
          gh api "repos/${{ github.repository }}/pulls?state=all&sort=created&direction=desc&per_page=100" \
            --jq '[.[] | {number: .number, created_at: .created_at}]' > prs.json || echo "[]" > prs.json
          if uv run python scripts/eval/first_pr_of_week.py --mrs-file prs.json --current-iid "$PR_NUMBER" --skip-code 1; then
            echo "run_eval=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_eval=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Trigger-QA (deterministic, free)
        if: steps.gate.outputs.run_eval == 'true'
        run: uv run t3 eval trigger-qa
      - name: Migrate the self-DB (the needs_db regression checks open it)
        if: steps.gate.outputs.run_eval == 'true'
        run: uv run python -m teatree migrate --no-input
      - name: Regression corpus (deterministic, free; also gated every PR via pytest)
        if: steps.gate.outputs.run_eval == 'true'
        run: uv run t3 eval regression
      - name: Behavioral eval suite (pass@k; SKIPs cleanly without the claude CLI)
        if: steps.gate.outputs.run_eval == 'true'
        run: uv run t3 eval run --trials 3 --require any
