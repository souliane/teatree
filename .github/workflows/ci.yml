# ============================================================
# CI WORKFLOW LEGEND — read before editing
# ============================================================
#
# GATE vs ADVISORY
#   Gate:     exits non-zero on failure → PR cannot merge.
#   Advisory: always exits 0 → shows up as a warning/annotation but
#             never blocks. Look for `|| true` or the job comment
#             saying "advisory" to identify advisory jobs.
#
# LOAD-BEARING NAMES (do NOT rename without a coordinated change)
#   `test (3.13)` — The REQUIRED check context. Produced by the `test`
#       COMBINER job (matrix python-version="3.13"), which aggregates the
#       4-way `test-shard` matrix: it fails if any shard failed, asserts the
#       shards partition the suite exactly once
#       (scripts/ci/check_shard_completeness.py), then combines their coverage
#       and enforces the 93% branch floor ONCE over the whole tree. The job KEY
#       and matrix are unchanged, so the emitted context stays byte-for-byte
#       `test (3.13)`; branch protection lists this string by name. The
#       `test-shim` job reproduces the same context on docs-only PRs (see below).
#       Hardcoded as REQUIRED_CHECK_NAME in
#       src/teatree/loop/scanners/pr_sweep_types.py.
#   `uv-audit`  — The job key used as UV_AUDIT_CHECK_NAME in
#       src/teatree/loop/scanners/pr_sweep_types.py for the PR-sweep
#       scanner's fallback escape hatch.  Rename breaks the scanner.
#
# CONCURRENCY — supersede-cancel on PRs, never on main
#   A re-push to a PR cancels its own superseded in-progress wave
#   (group `ci-pr-<number>`, cancel-in-progress) instead of stacking a new
#   one behind it. push-to-main and the schedule get a UNIQUE never-cancelled
#   group (`ci-<run_id>`) so the full-tree banned-terms / overlay-leak
#   backstops always run to completion — a superseding event must never kill
#   a main-branch tree scan mid-run.
#
# THE `preflight` JOB — diff-scoped lane classifier
#   Reads the PR's file diff and exports two booleans:
#     run_heavy_python — true unless the diff is PROVABLY pure docs/markdown.
#     all              — always-run lane flag (currently unused by downstream).
#   Only runs on pull_request events (no base to diff on push/schedule).
#   The only sanctioned skip driven by preflight is the HEAVY `test` +
#   `mutation-diff` lanes on a provably pure-docs PR.  Every security,
#   quality, and docs gate ignores preflight and runs unconditionally.
#   Unknown/ambiguous paths always force run_heavy_python=true
#   (fail-safe-unknown, souliane/teatree#132).
#
# THE `test-shim` PATTERN
#   Branch protection requires `test (3.13)` on every PR.  When preflight
#   decides run_heavy_python=false (pure-docs diff), the real `test` job is
#   skipped and never emits that context — leaving the PR permanently pending.
#   `test-shim` fires in exactly that scenario: it sets `name: test` + the
#   same matrix so GitHub sees an identical `test (3.13)` context from a
#   no-op step.  The two jobs have mutually exclusive `if:` conditions so
#   they can never both report in the same run.
#
# JOB GROUPS (in order of appearance below)
#   1. Lane routing          — preflight
#   2. Fast static checks    — lint, blueprint-cross-pr
#   3. Docs integrity        — doc-update-gate, module-health-gate,
#                              comment-density-warning, docs-drift
#   4. Signal & ratchet      — test-shape (advisory),
#                              test-path-mirror (ratchet gate)
#   5. Test suite            — test-shard (4-way coverage matrix),
#                              test (combiner = required `test (3.13)`),
#                              test-shim
#   6. Architecture / quality fitness gates — mutation-diff, mutation-full,
#                              banned-terms-tree, overlay-leak-tree
#                              (the two tree gates run on push, schedule AND PR
#                              so a leak is caught before merge — #44)
#   7. Security & supply chain — uv-audit, sbom, uv-audit-advisory
#
# THE METERED AI EVAL DOES NOT RUN HERE
#   The metered behavioral-eval suite (`t3 eval run --backend api`, which shells
#   out to `claude -p` — cost, network, model variance) is NOT part of this PR
#   pipeline. It lives in a standalone workflow, `.github/workflows/eval.yml`,
#   on a weekly schedule + manual `workflow_dispatch`. A PR run neither runs nor
#   displays a metered-eval check. The FREE deterministic eval lane
#   (eval-pinned-regressions) still gates every push via
#   prek and the regression corpus is asserted every PR via pytest.
# ============================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Daily full-tree banned-brand backstop (#1570). The diff-only gate
    # cannot see a brand name already committed; this catches a pre-existing
    # leak even when no new diff touches it.
    - cron: "17 6 * * *"

# Supersede-cancel a PR's own in-progress wave on re-push; NEVER cancel a
# push-to-main or scheduled run (unique run_id group) so the full-tree
# banned-terms / overlay-leak backstops always finish. See the CONCURRENCY
# note in the legend above.
concurrency:
  group: ci-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || github.run_id }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:

  # ── 1. Lane routing ────────────────────────────────────────────────────────

  # GATE (PR-only): classifies the diff into heavy vs docs-only lanes; exports
  # run_heavy_python so downstream jobs can skip safely on pure-docs PRs.
  preflight:
    # Diff-scoped lane classifier with FAIL-SAFE-UNKNOWN routing
    # (souliane/teatree#132). Classifies the PR diff into lanes and
    # exports booleans the heavy downstream jobs gate on. The ONLY
    # sanctioned skip is a provably pure-docs/markdown diff, which may
    # skip the HEAVY ``test`` + ``mutation-diff`` lanes. Any unrecognised
    # path, any python change, or any config/CI/semgrep change forces
    # ``run_heavy_python=true`` (run everything) — uncertainty never
    # skips. Security/quality gates (semgrep, sbom, uv-audit, the advisory
    # uv-audit-advisory) and the docs gates are NOT gated here; they always run.
    #
    # On push-to-main and on the schedule there is no base to diff, so
    # this job is PR-only and the downstream ``if:`` conditions run the
    # heavy lanes unconditionally on non-PR events.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      run_heavy_python: ${{ steps.classify.outputs.run_heavy_python }}
      all: ${{ steps.classify.outputs.all }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          # fetch-depth: 0 so the PR-vs-base ``git diff`` resolves.
          fetch-depth: 0
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7
        with:
          enable-cache: true
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.13"
      - name: Classify the PR diff into CI lanes
        id: classify
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch --no-tags origin "$BASE_REF"
          # Fail-safe: if the diff command errors, feed an empty list,
          # which the classifier maps to all=true (run everything).
          git diff --name-only "origin/$BASE_REF...HEAD" > changed_paths.txt || true
          uv run python scripts/ci/changed_lanes.py < changed_paths.txt

  # ── 2. Fast static checks ──────────────────────────────────────────────────

  # GATE: ruff/prek lint + migration-graph linearity; runs on every push and PR.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7
        with:
          enable-cache: true
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.13"
      - run: uv sync
      - uses: j178/prek-action@e98a699c41eb69ab013a45817a0406469a748f8d  # v2
        env:
          SKIP: pytest,uv-audit,cyclonedx-sbom
          # Dual-env during the banned-term-registry transition: the legacy
          # T3_BANNED_TERMS secret stays authoritative; the consolidated
          # TEATREE_TERM_REGISTRY is read only once the operator populates it at
          # cutover (empty until then ⇒ no behaviour change).
          T3_BANNED_TERMS: ${{ secrets.TEATREE_BANNED_TERMS }}
          TEATREE_TERM_REGISTRY: ${{ secrets.TEATREE_TERM_REGISTRY }}
      # Migration-graph linearity gate. Two PRs branching a migration off
      # the same parent each pass locally and pass their own CI, then merge
      # into a forked graph with multiple leaf nodes that ``migrate`` refuses
      # to run. ``makemigrations --check`` raises ``Conflicting migrations
      # detected`` (exit 1) on a forked graph, failing the PR before it lands.
      - run: uv run python manage.py makemigrations --check --dry-run

  # GATE (PR-only): catches two concurrent PRs both adding the same §17.N
  # invariant number — local pre-commit can't see sibling PRs.
  blueprint-cross-pr:
    # Cross-PR §17.1 invariant-numbering gate (souliane/teatree#1288).
    # The pre-commit hook is tree-local; two concurrent PRs each adding
    # the same §17.N pass locally and pass each PR's CI. This step reads
    # BLUEPRINT.md at base (origin/main) and at HEAD and fails when the
    # PR introduces a number the base also added since the merge-base.
    # Only runs on pull_request events because push-to-main has nothing
    # to diff against and the underlying hook covers the merge result.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          # fetch-depth: 0 so `git merge-base origin/main HEAD` resolves.
          fetch-depth: 0
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7
        with:
          enable-cache: true
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.13"
      - run: uv sync
      - name: Check for BLUEPRINT.md change in this PR
        id: blueprint_diff
        run: |
          if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -qx 'BLUEPRINT.md'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi
      - name: §17.1 invariant-numbering cross-PR check
        if: steps.blueprint_diff.outputs.changed == 'true'
        run: uv run python scripts/hooks/check_blueprint_invariant_numbering.py --ci --base-ref=origin/${{ github.base_ref }}

  # ── 3. Docs integrity ──────────────────────────────────────────────────────

  # GATE (PR-only): re-runs the doc-update pre-push hook on the PR diff so an
  # agent that bypasses prek still trips the gate.
  doc-update-gate:
    # Deterministic doc-update gate (souliane/teatree#1461). The
    # pre-push hook runs against staged changes; CI re-runs the same
    # check on the PR diff so an agent that bypasses prek still trips
    # the gate. Reads the PR-vs-base diff into the git index so the
    # hook's ``git diff --cached`` query sees the PR contents.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7
        with:
          enable-cache: true
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.13"
      - run: uv sync
      - name: Stage PR diff against base
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch --no-tags origin "${BASE_REF}"
          git reset --soft FETCH_HEAD
      - run: uv run python scripts/hooks/check_doc_update.py

  # GATE (PR-only): re-runs the E2E no-skip pre-push hook on the PR diff so an
  # agent that bypasses prek still trips the gate.
  e2e-no-skip-gate:
    # Deterministic E2E no-skip gate. The pre-push hook scans staged spec files;
    # CI re-runs the SAME check on the PR-vs-base diff so an agent that bypasses
    # prek still trips the gate. Reads the PR diff into the git index (and the
    # PR's HEAD spec files onto disk) so the hook's ``git diff --cached`` query
    # sees the PR contents and the scan reads the PR's spec bodies.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7
        with:
          enable-cache: true
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.13"
      - run: uv sync
      - name: Stage PR diff against base
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch --no-tags origin "${BASE_REF}"
          git reset --soft FETCH_HEAD
      - run: uv run python scripts/hooks/check_e2e_no_skip.py

  # GATE (PR-only): re-runs the module-health LOC/function ratchet on the PR's
  # full base..head diff so a prek-bypassing or merge-routed module growth still
  # trips the gate.
  module-health-gate:
    # Deterministic module-health ratchet twin (souliane/teatree#2010). The
    # prek commit hook runs check_module_health.py per-commit against staged
    # files; CI re-runs the SAME ratchet on the PR's WHOLE base..head range so
    # an agent that bypasses prek (or routes growth through a merge) still trips
    # the gate. Computed once over the range (NOT per-commit), so the
    # merge-commit false-positive the staged-mode exemption guards against never
    # arises here. PR-only: push/schedule have no base to diff against, and the
    # prek hook covers the per-commit case.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          # fetch-depth: 0 so `origin/<base>...HEAD` resolves.
          fetch-depth: 0
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7
        with:
          enable-cache: true
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.13"
      - run: uv sync
      - name: Module-health ratchet over the PR diff
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch --no-tags origin "${BASE_REF}"
          uv run python scripts/hooks/check_module_health.py --from-ref "origin/${BASE_REF}"

  # ADVISORY (PR-only): warns about comment-dense files; always exits 0 so it
  # never blocks a PR — signal only.
  comment-density-warning:
    # Near-zero-comments check (souliane/teatree#1369). Advisory: the script
    # prints any comment-dense file as a warning and exits 0, so the job
    # never fails the pipeline. The pre-push hook surfaces the same warning
    # against staged changes; CI re-runs the SAME check on the PR diff so the
    # signal is visible on every PR. Stages the PR-vs-base diff into the index
    # so the hook's ``git diff --cached`` query sees the PR contents —
    # identical code path to prek and to ``t3 tool comment-density --staged``.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7
        with:
          enable-cache: true
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.13"
      - run: uv sync
      - name: Stage PR diff against base
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch --no-tags origin "${BASE_REF}"
          git reset --soft FETCH_HEAD
      - run: uv run python scripts/hooks/check_comment_density.py

  # GATE: regenerates all generated docs and runs mkdocs --strict; fails if
  # committed output is stale or if any link/nav target is broken.
  docs-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7
        with:
          enable-cache: true
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.13"
      - run: uv sync --group docs
      # Regenerate every generated reference page and the CLI reference;
      # fail if the committed output is stale so the docs site never
      # drifts from the code. See souliane/teatree#890.
      - run: uv run python manage.py generate_all_docs
      # Check the CLI reference is in sync with the command tree BEFORE
      # regenerating it. The sync check re-renders in memory and compares against
      # the COMMITTED (git-index) doc, so a stale committed reference fails the
      # gate independent of the `git diff` step's git-add ordering — a generator
      # that later repairs the working tree cannot mask the drift (the
      # generate-before-check vacuousness). See souliane/teatree#2599.
      - run: uv run python scripts/hooks/check_cli_reference_sync.py
      # Regenerate the CLI reference. CLI_REFERENCE_NO_STAGE stops the generator
      # from git-add-ing its output — a staged rewrite would match the index and
      # hide the drift from `git diff` below (no --cached). The render is
      # byte-deterministic across environments (pinned width, no tty/COLUMNS,
      # home dir folded to `~`) so the gate catches genuine drift, not env skew.
      # See souliane/teatree#2599.
      - run: uv run python scripts/hooks/generate_cli_reference.py
        env:
          CLI_REFERENCE_NO_STAGE: "1"
      # Regenerate the antipattern catalog from antipatterns.yaml so the
      # docs/generated diff gate below can catch any skew. ANTIPATTERN_CATALOG_NO_STAGE
      # stops the generator from git-add-ing its output — a staged rewrite would
      # match the index and hide the drift from `git diff` (no --cached).
      - run: uv run python scripts/hooks/generate_antipattern_catalog.py
        env:
          ANTIPATTERN_CATALOG_NO_STAGE: "1"
      # Check every FSM lifecycle diagram is in sync with its model BEFORE
      # regenerating it. The sync check reads the COMMITTED consumers, so it
      # catches drift in README + SKILL.md (which the docs/generated diff
      # below does NOT cover). It must run first: the generator REWRITES those
      # files on disk (FSM_DIAGRAMS_NO_STAGE only skips git-add), so a check run
      # after the generator would see freshly-repaired files and pass vacuously.
      - run: uv run python scripts/hooks/check_fsm_diagrams_sync.py
      # Belt-and-suspenders: regenerate (NO_STAGE) so the docs/generated diff
      # below also catches a stale committed canonical diagram.
      - run: uv run python scripts/hooks/generate_fsm_diagrams.py
        env:
          FSM_DIAGRAMS_NO_STAGE: "1"
      # Regenerate the admin-dashboard HTML snapshot (NO_STAGE, same reason as
      # above) so the docs/generated diff gate catches a stale committed snapshot.
      # The generator stands up its own throwaway sqlite test DB, so this step
      # needs no postgres service. See souliane/teatree#12.
      - run: uv run python scripts/hooks/generate_dashboard_snapshot.py
        env:
          DASHBOARD_SNAPSHOT_NO_STAGE: "1"
      # Regenerate the representative CLI-output fixture (NO_STAGE, same reason)
      # so the docs/generated diff gate catches a stale committed fixture. A pure
      # command-tree render — no DB needed. See souliane/teatree#12.
      - run: uv run python scripts/hooks/generate_cli_output_snapshot.py
        env:
          CLI_OUTPUT_SNAPSHOT_NO_STAGE: "1"
      - run: git diff --exit-code docs/generated
      # A strict build is the second half of the gate: a broken link or
      # missing nav target fails CI instead of shipping a broken site.
      - run: uv run mkdocs build --strict

  # ── 4. Signal & ratchet checks (mix of advisory + ratchet gate) ────────────

  # NOTE: the former ``semgrep-regressions`` advisory job was removed (#2128).
  # The named regression-detector layer is fully BLOCKING and was migrated off
  # semgrep to ast-grep in souliane/teatree#87: all rules live in
  # ``.ast-grep/blocking/`` (the ``.semgrep`` tree no longer exists), and the
  # blocking set is enforced on every push/PR via the prek ``regression-rules``
  # hook in the ``lint`` job (``.pre-commit-config.yaml`` ->
  # ``scripts/hooks/check_regression_rules.py``, the pinned ast-grep engine over
  # ``.ast-grep/blocking``, exit non-zero on a finding). The deleted advisory job
  # scanned the now-absent ``.semgrep/warn`` (semgrep exits 0 on a missing config,
  # and the trailing ``|| true`` swallowed any non-zero), so it was a no-op
  # fake-green gate — deleting it lost no coverage.

  # ADVISORY: reports near-duplicate test functions and test-to-source ratio;
  # default mode exits 0 (warn-only); flip to "block" in pyproject.toml to gate.
  test-shape:
    # Conservative, report-first test-shape check (near-duplicate test
    # functions + test:source ratio regression vs the committed baseline in
    # [tool.teatree.test_shape]). Default mode is "warn" — the command exits
    # 0 and the job is advisory. Flipping mode to "block" in pyproject.toml
    # makes the same command exit non-zero, promoting this job to a gate
    # without any workflow change. Never a PreToolUse gate; it can never lock
    # the agent's tools.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7
        with:
          enable-cache: true
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.13"
      - run: uv sync
      - name: Test-shape report
        run: uv run t3 tool test-shape --root .

  # GATE: ratchet that fails (exits non-zero) only when a NEW mis-pathed test
  # file appears — live count exceeds the committed baseline; never blocks on
  # pre-existing violations; baseline trends toward 0 as the sweep proceeds.
  test-path-mirror:
    # Forward-guard: every test file mirrors its src/teatree/<pkg>/... module
    # path as tests/teatree_<pkg>/... ([tool.teatree.test_path_mirror]). The
    # verdict is a baseline ratchet — RED only when the live mis-pathed count
    # EXCEEDS the committed baseline, so a NEW mis-pathed file fails CI while the
    # documented floor (files predating the convention) never does. The baseline
    # ratchets toward 0 as the relocation sweep proceeds. Never a PreToolUse
    # gate; it can never lock the agent's tools.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7
        with:
          enable-cache: true
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.13"
      - run: uv sync
      - name: Test-path-mirror ratchet
        run: uv run t3 tool test-path-mirror --root .

  # ── 5. Test suite ──────────────────────────────────────────────────────────

  # GATE (heavy lane): one of the 4 coverage SHARDS. Each shard runs a
  # duration-balanced quarter of the suite (pytest-split `--splits 4 --group N`)
  # in Docker WITH `--cov --cov-branch --doctest-modules` but NO floor and NO
  # report — partial coverage data must never be floor-judged. The `test`
  # combiner below aggregates all four and enforces the 93% floor once over the
  # combined data. Skipped ONLY on a provably pure-docs PR diff
  # (run_heavy_python=false); always runs on push-to-main, schedule, and any
  # non-pure-docs PR — same heavy-lane gating as the old monolithic `test` job.
  # NOT a required context: `test-shard (3.13, N)` is aggregated by the combiner.
  test-shard:
    # Heavy lane. Skipped ONLY on a provably pure-docs/markdown PR diff
    # (preflight ``run_heavy_python=false``). On push-to-main and on the
    # schedule (no PR diff to classify) and on any non-pure-docs PR it
    # runs unconditionally — fail-safe-unknown. (#132)
    needs: preflight
    if: >
      always() &&
      (github.event_name != 'pull_request' ||
      needs.preflight.outputs.run_heavy_python == 'true')
    timeout-minutes: 15
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]
        group: [1, 2, 3, 4]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7
        with:
          context: .
          file: dev/Dockerfile.test
          load: true
          tags: teatree-test-${{ matrix.python-version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      # Shard N/4: pytest-split slices collection by `dev/.test_durations`;
      # `-n auto` parallelises WITHIN the shard. `--cov --cov-branch --doctest-modules`
      # measure exactly what the old monolithic lane did, but `--cov-report=`
      # (empty) suppresses any report and `--cov-fail-under=0` NEUTRALISES the
      # `[tool.coverage.report] fail_under=93` config floor — a shard measures
      # only a QUARTER of the tree, so floor-judging its partial data would fail
      # every shard; the combiner owns the real floor over the combined data.
      # The `shard_stats_plugin` records the collected-vs-selected counts so the
      # combiner can prove the shards partition the suite exactly once
      # (`--group shard` installs pytest-split; PYTHONPATH=/app makes the
      # `-p scripts.ci.shard_stats_plugin` import resolve at plugin-load time).
      - name: Test shard ${{ matrix.group }}/4 (coverage, no floor — partial data)
        run: >
          docker run --rm
          -v "$PWD":/app
          -e UV_PROJECT_ENVIRONMENT=/tmp/.venv
          -e COVERAGE_FILE=/app/coverage.shard${{ matrix.group }}
          -e PYTHONPATH=/app
          teatree-test-${{ matrix.python-version }}
          uv run --group shard -p ${{ matrix.python-version }} pytest --no-header -q -n auto
          -o cache_dir=/tmp/.pytest_cache
          --doctest-modules --cov --cov-branch --cov-report= --cov-fail-under=0
          --splits 4 --group ${{ matrix.group }} --durations-path dev/.test_durations
          -p scripts.ci.shard_stats_plugin
          --shard-stats-out=/app/shard-stats.${{ matrix.group }}.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        if: always()
        with:
          name: shard-artifacts-${{ matrix.group }}
          path: |
            coverage.shard${{ matrix.group }}
            shard-stats.${{ matrix.group }}.json

  # GATE (heavy lane): the COMBINER. Its job key + matrix produce the EXACT
  # required `test (3.13)` check context (unchanged from the old monolithic job).
  # It (1) fails if ANY shard failed, (2) asserts the shards partition the suite
  # exactly once (no dropped/duplicated tests), then (3) combines the four
  # shards' coverage and enforces the 93% branch floor + per-module floors ONCE
  # over the whole tree — identical floor semantics to the old single-process
  # lane, just computed over combined shards.
  # LOAD-BEARING: the job key `test` + matrix python-version "3.13" produce
  # `test (3.13)` — do NOT rename without updating branch protection.
  test:
    needs: [preflight, test-shard]
    if: >
      always() &&
      (github.event_name != 'pull_request' ||
      needs.preflight.outputs.run_heavy_python == 'true')
    timeout-minutes: 12
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]
    steps:
      # A FAILED shard (real test failure) must red the required context. The
      # shards only ran a QUARTER of the suite each, so a green combiner without
      # this guard could pass on combined coverage while a test failed in a shard.
      - name: Require every test shard to have passed
        run: |
          result='${{ needs.test-shard.result }}'
          if [ "$result" != "success" ]; then
            echo "::error::test-shard result was '$result' — the required test (${{ matrix.python-version }}) gate fails."
            exit 1
          fi
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # v4
      - uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a  # v7
        with:
          context: .
          file: dev/Dockerfile.test
          load: true
          tags: teatree-test-${{ matrix.python-version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c  # v8.0.1
        with:
          pattern: shard-artifacts-*
          merge-multiple: true
      # Anti-vacuity: prove every test ran in exactly one shard BEFORE trusting
      # the combined coverage number. A silently-dropped shard (sum<total) or a
      # duplicated group (sum>total) fails LOUD here, not by riding a green floor.
      - name: Assert the shards partition the suite exactly once
        run: >
          docker run --rm
          -v "$PWD":/app
          -e UV_PROJECT_ENVIRONMENT=/tmp/.venv
          teatree-test-${{ matrix.python-version }}
          uv run -p ${{ matrix.python-version }} python scripts/ci/check_shard_completeness.py
          shard-stats.1.json shard-stats.2.json shard-stats.3.json shard-stats.4.json
      # Combine the four shards' data and enforce the whole-tree 93% branch floor
      # ONCE — same data, same floor as the old single-process lane. `coverage
      # report --fail-under=93` is the explicit invocation-site floor
      # (tests/test_coverage_floor_guard.py locks it here + in dev/test-cov.sh).
      - name: Combine shard coverage and enforce the 93% floor
        run: >
          docker run --rm
          -v "$PWD":/app
          -e UV_PROJECT_ENVIRONMENT=/tmp/.venv
          -e COVERAGE_FILE=/app/.coverage
          teatree-test-${{ matrix.python-version }}
          bash -c "uv run -p ${{ matrix.python-version }} coverage combine coverage.shard1 coverage.shard2 coverage.shard3 coverage.shard4 && uv run -p ${{ matrix.python-version }} coverage report --fail-under=93 && uv run -p ${{ matrix.python-version }} coverage xml -o coverage.xml"
      - name: Enforce per-module coverage floors
        run: >
          docker run --rm
          -v "$PWD":/app
          -e UV_PROJECT_ENVIRONMENT=/tmp/.venv
          -e COVERAGE_FILE=/app/.coverage
          teatree-test-${{ matrix.python-version }}
          uv run -p ${{ matrix.python-version }} t3 ci coverage
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        if: always()
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml

  # GATE (shim): emits the load-bearing `test (3.13)` required context on
  # pure-docs PRs where the `test` combiner (and its shards) are path-skipped;
  # a no-op step only — never runs tests. Mutually exclusive with the `test`
  # combiner above.
  test-shim:
    # Required-context shim for pure-docs PRs (souliane/teatree#1942).
    # Branch protection requires the context `test (3.13)`. The heavy lane
    # (`test-shard` + the `test` combiner) is path-skipped on a provably
    # pure-docs diff (preflight run_heavy_python == 'false'), so it NEVER
    # reports that context — and a never-reported required context leaves the
    # PR permanently pending / BLOCKED. This job reports a passing `test (3.13)`
    # ONLY in that exact skip case, so a docs-only PR can merge without running
    # the shards.
    #
    # It must never mask a real failure: it runs ONLY when the heavy lane was
    # path-skipped (run_heavy_python == 'false') AND only on pull_request
    # events. On push-to-main, on the schedule, and on any non-pure-docs PR
    # the `test` combiner runs and owns the `test (3.13)` context; this
    # shim is skipped (its `if` is false), so the two can never both report.
    #
    # The `name: test` + matrix `python-version: ["3.13"]` makes the produced
    # check context the exact string `test (3.13)` the branch protection
    # requires — verify with `gh pr checks` after this lands.
    name: test
    needs: preflight
    if: >
      github.event_name == 'pull_request' &&
      needs.preflight.outputs.run_heavy_python == 'false'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]
    steps:
      - name: Report the required test context for a path-skipped docs-only PR
        run: >
          echo "Pure-docs PR: the heavy test lane was path-skipped
          (run_heavy_python=false). Emitting a passing 'test (${{ matrix.python-version }})'
          so the required status context is satisfied without re-running the suite."

  # GATE (heavy lane): order-dependence audit. Runs the order-fragile loop test
  # subset under a SHUFFLED collection order (pytest-randomly) so a test that
  # leaks shared global state — a stray env var, an unreset singleton, a
  # module-level cache — and the victim it breaks cannot silently return
  # (souliane/teatree#2359 Class B). The heavy `test (3.13)` lane runs the suite
  # in its committed file order and so never exercises the polluter→victim
  # adjacency; this lane does.
  test-shuffle:
    # WHY a SUBSET, not the whole suite: a small set of concurrency/timeout tests
    # seed their isolated DB at import time and are only collectable in the
    # suite's natural order, so a full-suite shuffle reds on an UNRELATED
    # collection error. The Class B flakes live in ``tests/teatree_loop/``, which
    # collects cleanly under shuffle — scoping here keeps the gate signal about
    # order-dependence, not about that separate import-order fragility.
    #
    # WHY ``--group shuffle`` (not the default ``dev``): adding pytest-randomly to
    # ``dev`` would shuffle every ``uv run pytest`` and the heavy coverage lane,
    # destabilising them; the plugin is isolated to this lane.
    #
    # SEEDS: 7 is the recorded reproducer (it red'd 27 ``tests/teatree_loop/``
    # tests on the pre-fix code); the others widen the order coverage. ``-n0`` is
    # serial so a single in-process collection order is exercised end to end
    # (xdist would isolate the polluter from the victim across workers).
    #
    # Heavy lane: PR-only AND skipped on a provably pure-docs diff
    # (preflight ``run_heavy_python=false``); any non-pure-docs PR runs it.
    needs: preflight
    if: >
      always() &&
      (github.event_name != 'pull_request' ||
      needs.preflight.outputs.run_heavy_python == 'true')
    timeout-minutes: 20
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7
        with:
          enable-cache: true
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: uv sync --group shuffle
      - name: Run the order-fragile loop subset under shuffled collection
        run: |
          set -euo pipefail
          for seed in 7 1 13 100; do
            echo "::group::pytest-randomly seed=$seed"
            uv run -p ${{ matrix.python-version }} pytest -n0 -q -p randomly \
              --randomly-seed="$seed" tests/teatree_loop/
            echo "::endgroup::"
          done

  # ── 6. Architecture / quality fitness gates ────────────────────────────────

  # GATE (heavy lane, PR-only): diff-scoped mutation testing on safety modules;
  # skipped on pure-docs PRs; most PRs touch no safety module and pass instantly.
  mutation-diff:
    # Scoped (narrow) mutation testing, PR-only (souliane/teatree#131).
    # ``t3 mutation run`` diffs the PR vs base, intersects with
    # ``[tool.teatree.mutation].high_value_modules``, and mutates ONLY the
    # touched safety modules — a no-op (fast pass) when the PR touches none, so
    # most PRs pay nothing. Programmatic ratchet: the command fails when the
    # surviving-mutant count exceeds the recorded ``baseline_surviving`` total,
    # in BOTH ``warn`` and ``block`` mode (the count may only ever shrink) —
    # survivors at-or-below baseline still pass. Flipping ``mode`` to "block" is
    # a later follow-up (gate on survivors existing at all), no workflow change.
    # ``t3 mutation run --all --update-baseline`` tightens the recorded counts.
    # The 10-min cap bounds a pathological run.
    #
    # Heavy lane: PR-only AND skipped on a provably pure-docs diff
    # (preflight ``run_heavy_python=false``). Any non-pure-docs PR runs
    # it — fail-safe-unknown. (#132)
    needs: preflight
    if: >
      always() &&
      github.event_name == 'pull_request' &&
      needs.preflight.outputs.run_heavy_python == 'true'
    timeout-minutes: 12
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          # fetch-depth: 0 so ``git merge-base origin/main HEAD`` resolves.
          fetch-depth: 0
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7
        with:
          enable-cache: true
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.13"
      - run: uv sync --group mutation
      - name: Diff-scoped mutation run (warn-first; 10-min cap)
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch --no-tags origin "$BASE_REF"
          timeout 600 uv run t3 mutation run --target "origin/$BASE_REF"

  # GATE (weekly cadence, PR-only): full-registry mutation run on the first PR
  # of each ISO week; a no-op (skipped) on every subsequent PR that week.
  mutation-full:
    # Weekly full-scope mutation run over the whole registry (not just the
    # diff). Like the eval suite, it is metered (slow), so it runs once a week
    # on the FIRST PR opened that ISO week — ``scripts/eval/first_pr_of_week.py``
    # makes that decision (order-independent, re-run safe). Warn-first as above;
    # mutates every declared safety module by passing each registry path as the
    # changed set.
    if: github.event_name == 'pull_request'
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7
        with:
          enable-cache: true
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.13"
      - run: uv sync --group mutation
      - name: Decide whether this is the first PR of the ISO week
        id: gate
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # FAIL-SAFE: if the PR list cannot be fetched (gh outage, rate-limit,
          # network), default to RUNNING the mutation suite — never silently
          # skip. The old empty-list fallback made a fetch failure look like
          # "not the first PR of the week" and skipped the run, exiting 0 even
          # when it should have run (fake-green).
          if ! gh api "repos/${{ github.repository }}/pulls?state=all&sort=created&direction=desc&per_page=100" \
              --jq '[.[] | {number: .number, created_at: .created_at}]' > prs.json; then
            echo "WARNING: could not fetch the PR list — running mutation (run-when-uncertain)." >&2
            echo "run_mutation=true" >> "$GITHUB_OUTPUT"
          elif uv run python scripts/eval/first_pr_of_week.py --mrs-file prs.json --current-iid "$PR_NUMBER" --skip-code 1; then
            echo "run_mutation=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_mutation=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Full-scope mutation run (warn-first)
        if: steps.gate.outputs.run_mutation == 'true'
        run: uv run t3 mutation run --all

  # GATE (push + schedule + PR): full-tree scan for committed customer brand
  # names. Runs daily, on push-to-main, AND on every PR so a brand committed by
  # a PR is caught BEFORE merge instead of turning main RED on landing (#44).
  banned-terms-tree:
    # Full-tree banned-brand backstop (souliane/teatree#1570, #44). The
    # diff/payload banned-terms gate only ever sees a *change*; a brand
    # name ALREADY committed never appears in a post-landing diff. This
    # job scans every git-tracked file's content for the high-confidence
    # brand list on push-to-main, on a daily schedule, and on PRs, failing
    # CI if a brand is present. The public repo ships with no brands; the
    # list is supplied from the TEATREE_BANNED_BRANDS secret so no tenant
    # name is ever committed.
    #
    # push/schedule keep ``--require-brands`` so a MISSING secret stays a LOUD
    # exit-2 failure on main. The PR step drops it and adds a fork-safe
    # explicit-empty fallback: a same-repo PR reads the secret (full brand +
    # terminology coverage), while a fork PR — which cannot read secrets —
    # still runs the always-on terminology pass instead of false-redding on
    # the unset-list refusal.
    if: github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7
        with:
          enable-cache: true
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.13"
      - run: uv sync
      - name: Full-tree banned-brand scan (push/schedule — require brands)
        if: github.event_name != 'pull_request'
        env:
          TEATREE_BANNED_BRANDS: ${{ secrets.TEATREE_BANNED_BRANDS }}
          # Dual-env during the banned-term-registry transition: the legacy brand
          # secret stays authoritative; the consolidated registry is read only
          # once the operator populates it at cutover (empty until then).
          TEATREE_TERM_REGISTRY: ${{ secrets.TEATREE_TERM_REGISTRY }}
        run: uv run t3 banned-terms scan-tree --repo-root . --require-brands
      - name: Full-tree banned-brand + terminology scan (PR — brands optional)
        if: github.event_name == 'pull_request'
        env:
          TEATREE_BANNED_BRANDS: ${{ secrets.TEATREE_BANNED_BRANDS }}
          TEATREE_TERM_REGISTRY: ${{ secrets.TEATREE_TERM_REGISTRY }}
        # A fork PR cannot read $TEATREE_BANNED_BRANDS, so the brand list is
        # genuinely unset. --allow-unset is the EXPLICIT, fail-closed-by-default
        # opt-in that runs the always-on terminology pass instead of the exit-2
        # refusal. It replaces the dead T3_BANNED_TERMS_CONFIG file fallback
        # (which no code ever consumed). Same-repo PRs read the secret and get
        # the full brand backstop; push/schedule keep --require-brands.
        run: uv run t3 banned-terms scan-tree --repo-root . --allow-unset

  # GATE (push + schedule + PR): full-tree overlay-leak scan. The pre-commit
  # `no-overlay-leak` hook only sees STAGED files; an overlay-scoped name or a
  # real-shaped Slack/forge opaque id ALREADY committed never appears in a
  # staged diff. This job walks every scanned root (src/teatree, docs, skills,
  # agents, tests, scripts + top-level README/BLUEPRINT/AGENTS) for the
  # configured term list AND the always-on opaque-ID pass. It runs on every PR
  # too (#44) so a leak introduced by a PR is caught BEFORE merge instead of
  # turning main RED on landing.
  #
  # push/schedule keep ``--require-terms`` so a MISSING
  # TEATREE_OVERLAY_LEAK_TERMS secret stays a LOUD exit-2 failure on main. The
  # PR step drops it: a same-repo PR reads the secret (full term + opaque-ID
  # coverage), while a fork PR — which cannot read secrets — still runs the
  # always-on opaque-ID pass (term pass inert, never a false exit-2). Local dev
  # omits the flag and stays green.
  overlay-leak-tree:
    if: github.event_name == 'push' || github.event_name == 'schedule' || github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: uv sync
      - name: Full-tree overlay-leak scan (push/schedule — require terms)
        if: github.event_name != 'pull_request'
        env:
          TEATREE_OVERLAY_LEAK_TERMS: ${{ secrets.TEATREE_OVERLAY_LEAK_TERMS }}
        run: uv run python scripts/hooks/check_no_overlay_leak.py --require-terms
      - name: Full-tree overlay-leak scan (PR — terms optional)
        if: github.event_name == 'pull_request'
        env:
          TEATREE_OVERLAY_LEAK_TERMS: ${{ secrets.TEATREE_OVERLAY_LEAK_TERMS }}
        run: uv run python scripts/hooks/check_no_overlay_leak.py

  # GATE (PR-only, NON-required): ground-truth anti-vacuity audit for the
  # incremental push gate (souliane/teatree#122). Runs the WHOLE-TREE ast-grep scan
  # + WHOLE-TREE doctest sweep, then asserts every finding/failure is INSIDE the
  # SCOPED set the push gate would have run for this diff. A whole-tree
  # finding/failure the scoped gate would have SKIPPED is a measured false negative
  # -> the job fails LOUD and files a tracking issue. Scoping earns trust from
  # evidence before `incremental_push_gate` is flipped on per-overlay. NOT a merge
  # gate: the required `test (3.13)` whole-tree lane is the hard backstop; this is
  # the rollout soak-window trust-builder.
  selection-audit:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          # fetch-depth: 0 so `git merge-base origin/<base> HEAD` resolves.
          fetch-depth: 0
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7
        with:
          enable-cache: true
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.13"
      - run: uv sync
      - name: Audit the scoped push gate against whole-tree ground truth
        id: audit
        env:
          BASE_REF_NAME: ${{ github.base_ref }}
        run: |
          git fetch --no-tags origin "$BASE_REF_NAME"
          BASE_REF="origin/$BASE_REF_NAME" uv run python scripts/ci/push_gate_selection_audit.py
      - name: File a tracking issue on a measured selection miss
        if: failure() && steps.audit.outcome == 'failure'
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          gh issue create \
            --title "push-gate selection-audit: measured false negative (#122)" \
            --body "The incremental push gate would have SKIPPED a whole-tree ast-grep finding or doctest failure on PR #${PR_NUMBER} (${PR_URL}). See the failed selection-audit job logs for the offending path(s). Do NOT enable \`incremental_push_gate\` until resolved." \
            --label needs-triage || true

  # ── 7. Security & supply chain ─────────────────────────────────────────────

  # GATE: dependency vulnerability audit via pip-audit (OSV backend). Job key
  # `uv-audit` is LOAD-BEARING — hardcoded as UV_AUDIT_CHECK_NAME in
  # src/teatree/loop/scanners/pr_sweep.py. The inner tool is pip-audit, not
  # `uv audit`, because `uv audit` has a known OSV parser regression (#19492).
  uv-audit:
    # Job name preserved for compatibility with the PR-sweep scanner's
    # ``--fallback-uv-audit`` escape hatch (see
    # ``src/teatree/loop/scanners/pr_sweep.py`` ``UV_AUDIT_CHECK_NAME``).
    # The inner command is ``pip-audit`` because ``uv audit`` is still
    # a preview feature and astral-sh/uv#19492 (OSV parser regression)
    # turned every PR red. ``pip-audit`` uses the same OSV backend and
    # is production-stable. See souliane/teatree#1264.
    #
    # AUDITED SURFACE: ``--no-default-groups --all-extras`` exports the SHIPPED
    # runtime surface (all optional extras, no dev tooling). Previously ``uv sync``
    # included dev group packages that never ship to users, inflating the CVE
    # surface with development tools. Optional extras (markdown, notion, slack) ARE
    # shipped to users and must be audited.
    #
    # ALLOWLIST: add unfixable transitive CVEs to ``requirements.audit.ignore`` —
    # one ``VULN-ID  # package==version: justification`` entry per line. See that
    # file for the format. Keep the list as short as possible; every entry is a
    # conscious decision to ship with a known vulnerability.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7
        with:
          enable-cache: true
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.13"
      - name: Export shipped runtime surface for audit
        run: uv export --no-default-groups --all-extras --format requirements-txt --no-emit-workspace --no-header --quiet > requirements.audit.txt
      - name: Read CVE allowlist
        id: ignore
        run: |
          if [ -s requirements.audit.ignore ]; then
            grep -v '^\s*#' requirements.audit.ignore | grep -v '^\s*$' \
              | awk '{print "--ignore-vuln", $1}' | tr '\n' ' ' > /tmp/ignore_flags.txt
            echo "flags=$(cat /tmp/ignore_flags.txt)" >> "$GITHUB_OUTPUT"
          else
            echo "flags=" >> "$GITHUB_OUTPUT"
          fi
      - name: pip-audit (OSV backend; strict; allowlist applied)
        env:
          IGNORE_FLAGS: ${{ steps.ignore.outputs.flags }}
        # shellcheck disable=SC2086 — word-splitting on IGNORE_FLAGS is intentional:
        # it expands to zero or more ``--ignore-vuln GHSA-xxxx`` pairs from the
        # committed requirements.audit.ignore allowlist (never user-supplied input).
        run: uvx pip-audit --strict --vulnerability-service osv --disable-pip -r requirements.audit.txt $IGNORE_FLAGS

  # GATE: regenerates dist/sbom.json and fails if the committed copy is stale;
  # also uploads the SBOM as a workflow artifact for supply-chain visibility.
  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7
        with:
          enable-cache: true
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.13"
      - run: uv sync
      - run: scripts/hooks/generate_sbom.sh
      - run: git diff --exit-code dist/sbom.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        if: always()
        with:
          name: sbom
          path: dist/sbom.json

  # ADVISORY (never blocks): uv-native, uv.lock-accurate, OSV-backed vulnerability
  # scan via `uv audit` (https://astral.sh/blog/uv-audit). Runs ALONGSIDE — never
  # replaces — the blocking `uv-audit` (pip-audit) gate and the `sbom` SBOM-diff
  # gate above. Kept advisory because `uv audit` is still a PREVIEW feature with
  # possible breaking changes (the same astral-sh/uv#19492 OSV-parser regression
  # that moved the blocking gate to pip-audit, souliane/teatree#1264). The uv
  # version is PINNED so preview flag churn can't break this lane out from under
  # us; promote to a gate (drop continue-on-error, un-pin) once `uv audit` is
  # stable. Allowlist of accepted advisories: `[tool.teatree.uv_audit].ignore`
  # in pyproject.toml.
  #
  # Job key `uv-audit-advisory` is DELIBERATELY distinct from the load-bearing
  # `uv-audit` (UV_AUDIT_CHECK_NAME in src/teatree/loop/scanners/pr_sweep.py) so
  # the two never collide.
  uv-audit-advisory:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7
        with:
          enable-cache: true
          # PIN the uv version: `uv audit` is preview, so a floating `latest`
          # could change flags out from under this lane. Bump deliberately.
          version: "0.11.15"
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6
        with:
          python-version: "3.13"
      # `--frozen` audits the locked `uv.lock` resolution without re-locking;
      # `--no-default-groups` audits the SHIPPED runtime surface (mirrors the
      # blocking gate's `--no-default-groups`, excluding dev-only tooling).
      # `|| true` plus `continue-on-error: true` are the two independent
      # guards keeping this lane non-blocking: a finding, a preview crash, or
      # an offline/network hiccup is reported but never reds the build.
      - name: uv audit (advisory; OSV; never blocks)
        continue-on-error: true
        run: uv audit --frozen --no-default-groups --output-format text || true

  # The metered behavioral-eval suite (`t3 eval run --backend api`, `claude -p`)
  # is NOT a job here. It runs in the standalone `.github/workflows/eval.yml`
  # (weekly schedule + manual workflow_dispatch) so a PR pipeline neither runs
  # nor displays a metered-eval check. See that workflow for the install +
  # `--require-executed` enforcement.
