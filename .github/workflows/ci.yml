name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Daily full-tree banned-brand backstop (#1570). The diff-only gate
    # cannot see a brand name already committed; this catches a pre-existing
    # leak even when no new diff touches it.
    - cron: "17 6 * * *"

jobs:
  preflight:
    # Diff-scoped lane classifier with FAIL-SAFE-UNKNOWN routing
    # (souliane/teatree#132). Classifies the PR diff into lanes and
    # exports booleans the heavy downstream jobs gate on. The ONLY
    # sanctioned skip is a provably pure-docs/markdown diff, which may
    # skip the HEAVY ``test`` + ``mutation-diff`` lanes. Any unrecognised
    # path, any python change, or any config/CI/semgrep change forces
    # ``run_heavy_python=true`` (run everything) — uncertainty never
    # skips. Security/quality gates (semgrep, sbom, uv-audit) and the
    # docs gates are NOT gated here; they always run.
    #
    # On push-to-main and on the schedule there is no base to diff, so
    # this job is PR-only and the downstream ``if:`` conditions run the
    # heavy lanes unconditionally on non-PR events.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      run_heavy_python: ${{ steps.classify.outputs.run_heavy_python }}
      all: ${{ steps.classify.outputs.all }}
    steps:
      - uses: actions/checkout@v6
        with:
          # fetch-depth: 0 so the PR-vs-base ``git diff`` resolves.
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Classify the PR diff into CI lanes
        id: classify
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch --no-tags origin "$BASE_REF"
          # Fail-safe: if the diff command errors, feed an empty list,
          # which the classifier maps to all=true (run everything).
          git diff --name-only "origin/$BASE_REF...HEAD" > changed_paths.txt || true
          uv run python scripts/ci/changed_lanes.py < changed_paths.txt

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: uv sync
      - uses: j178/prek-action@v2
        env:
          SKIP: pytest,uv-audit,cyclonedx-sbom
      # Migration-graph linearity gate. Two PRs branching a migration off
      # the same parent each pass locally and pass their own CI, then merge
      # into a forked graph with multiple leaf nodes that ``migrate`` refuses
      # to run. ``makemigrations --check`` raises ``Conflicting migrations
      # detected`` (exit 1) on a forked graph, failing the PR before it lands.
      - run: uv run python manage.py makemigrations --check --dry-run

  blueprint-cross-pr:
    # Cross-PR §17.1 invariant-numbering gate (souliane/teatree#1288).
    # The pre-commit hook is tree-local; two concurrent PRs each adding
    # the same §17.N pass locally and pass each PR's CI. This step reads
    # BLUEPRINT.md at base (origin/main) and at HEAD and fails when the
    # PR introduces a number the base also added since the merge-base.
    # Only runs on pull_request events because push-to-main has nothing
    # to diff against and the underlying hook covers the merge result.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # fetch-depth: 0 so `git merge-base origin/main HEAD` resolves.
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: uv sync
      - name: Check for BLUEPRINT.md change in this PR
        id: blueprint_diff
        run: |
          if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -qx 'BLUEPRINT.md'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi
      - name: §17.1 invariant-numbering cross-PR check
        if: steps.blueprint_diff.outputs.changed == 'true'
        run: uv run python scripts/hooks/check_blueprint_invariant_numbering.py --ci --base-ref=origin/${{ github.base_ref }}

  doc-update-gate:
    # Deterministic doc-update gate (souliane/teatree#1461). The
    # pre-push hook runs against staged changes; CI re-runs the same
    # check on the PR diff so an agent that bypasses prek still trips
    # the gate. Reads the PR-vs-base diff into the git index so the
    # hook's ``git diff --cached`` query sees the PR contents.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: uv sync
      - name: Stage PR diff against base
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch --no-tags origin "${BASE_REF}"
          git reset --soft FETCH_HEAD
      - run: uv run python scripts/hooks/check_doc_update.py

  comment-density-warning:
    # Near-zero-comments check (souliane/teatree#1369). Advisory: the script
    # prints any comment-dense file as a warning and exits 0, so the job
    # never fails the pipeline. The pre-push hook surfaces the same warning
    # against staged changes; CI re-runs the SAME check on the PR diff so the
    # signal is visible on every PR. Stages the PR-vs-base diff into the index
    # so the hook's ``git diff --cached`` query sees the PR contents —
    # identical code path to prek and to ``t3 tool comment-density --staged``.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: uv sync
      - name: Stage PR diff against base
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch --no-tags origin "${BASE_REF}"
          git reset --soft FETCH_HEAD
      - run: uv run python scripts/hooks/check_comment_density.py

  semgrep-regressions:
    # Advisory warn-set scan for the named regression-detector rules
    # (souliane/teatree#126). The blocking set rides the prek step above
    # (full-tree, --error, fails CI on a finding). This job runs the WARN
    # config and ALWAYS exits 0, so a still-open regression's findings are
    # visible on every PR without gating — mirrors comment-density-warning.
    # Each warn rule flips warn/ -> blocking/ in its bug's fix PR.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: uv sync
      - name: Warn-set regression scan (advisory; never fails)
        run: uvx semgrep@1.165.0 scan --config .semgrep/warn || true

  mutation-diff:
    # Scoped (narrow) mutation testing, PR-only (souliane/teatree#131).
    # ``t3 mutation run`` diffs the PR vs base, intersects with
    # ``[tool.teatree.mutation].high_value_modules``, and mutates ONLY the
    # touched safety modules — a no-op (fast pass) when the PR touches none, so
    # most PRs pay nothing. Warn-first: ``mode = "warn"`` makes the command
    # exit 0 even with survivors, so the job never blocks the pipeline day one;
    # flipping ``mode`` to "block" in pyproject.toml promotes it to a gate
    # (only-shrinks ratchet via ``baseline_surviving``) with no workflow change.
    # The 10-min cap bounds a pathological run.
    #
    # Heavy lane: PR-only AND skipped on a provably pure-docs diff
    # (preflight ``run_heavy_python=false``). Any non-pure-docs PR runs
    # it — fail-safe-unknown. (#132)
    needs: preflight
    if: >
      always() &&
      github.event_name == 'pull_request' &&
      needs.preflight.outputs.run_heavy_python == 'true'
    timeout-minutes: 12
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # fetch-depth: 0 so ``git merge-base origin/main HEAD`` resolves.
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: uv sync --group mutation
      - name: Diff-scoped mutation run (warn-first; 10-min cap)
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch --no-tags origin "$BASE_REF"
          timeout 600 uv run t3 mutation run --target "origin/$BASE_REF"

  mutation-weekly:
    # Weekly full-scope mutation run over the whole registry (not just the
    # diff). Like the eval suite, it is metered (slow), so it runs once a week
    # on the FIRST PR opened that ISO week — ``scripts/eval/first_pr_of_week.py``
    # makes that decision (order-independent, re-run safe). Warn-first as above;
    # mutates every declared safety module by passing each registry path as the
    # changed set.
    if: github.event_name == 'pull_request'
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: uv sync --group mutation
      - name: Decide whether this is the first PR of the ISO week
        id: gate
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh api "repos/${{ github.repository }}/pulls?state=all&sort=created&direction=desc&per_page=100" \
            --jq '[.[] | {number: .number, created_at: .created_at}]' > prs.json || echo "[]" > prs.json
          if uv run python scripts/eval/first_pr_of_week.py --mrs-file prs.json --current-iid "$PR_NUMBER" --skip-code 1; then
            echo "run_mutation=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_mutation=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Full-scope mutation run (warn-first)
        if: steps.gate.outputs.run_mutation == 'true'
        run: uv run t3 mutation run --all

  docs-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: uv sync --group docs
      # Regenerate every generated reference page and the CLI reference;
      # fail if the committed output is stale so the docs site never
      # drifts from the code. See souliane/teatree#890.
      - run: uv run python manage.py generate_all_docs
      - run: uv run python scripts/hooks/generate_cli_reference.py
      - run: git diff --exit-code docs/generated
      # A strict build is the second half of the gate: a broken link or
      # missing nav target fails CI instead of shipping a broken site.
      - run: uv run mkdocs build --strict

  test-shape:
    # Conservative, report-first test-shape check (near-duplicate test
    # functions + test:source ratio regression vs the committed baseline in
    # [tool.teatree.test_shape]). Default mode is "warn" — the command exits
    # 0 and the job is advisory. Flipping mode to "block" in pyproject.toml
    # makes the same command exit non-zero, promoting this job to a gate
    # without any workflow change. Never a PreToolUse gate; it can never lock
    # the agent's tools.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: uv sync
      - name: Test-shape report
        run: uv run t3 tool test-shape --root .

  banned-terms-tree:
    # Full-tree banned-brand backstop (souliane/teatree#1570). The
    # diff/payload banned-terms gate only ever sees a *change*; a brand
    # name ALREADY committed never appears in a post-landing diff. This
    # job scans every git-tracked file's content for the high-confidence
    # brand list on push-to-main and on a daily schedule, failing CI if a
    # brand is present. The public repo ships with no brands; the list is
    # supplied from the TEATREE_BANNED_BRANDS secret so no tenant name is
    # ever committed. With no secret configured the scan is a clean no-op.
    if: github.event_name == 'push' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: uv sync
      - name: Full-tree banned-brand scan
        env:
          TEATREE_BANNED_BRANDS: ${{ secrets.TEATREE_BANNED_BRANDS }}
        run: uv run t3 banned-terms scan-tree --repo-root .

  uv-audit:
    # Job name preserved for compatibility with the PR-sweep scanner's
    # ``--fallback-uv-audit`` escape hatch (see
    # ``src/teatree/loop/scanners/pr_sweep.py`` ``UV_AUDIT_CHECK_NAME``).
    # The inner command is ``pip-audit`` because ``uv audit`` is still
    # a preview feature and astral-sh/uv#19492 (OSV parser regression)
    # turned every PR red. ``pip-audit`` uses the same OSV backend and
    # is production-stable. See souliane/teatree#1264.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: uv sync
      - run: uv export --format requirements-txt --no-emit-project --no-emit-workspace --no-header --quiet > requirements.audit.txt
      - run: uvx pip-audit --strict --vulnerability-service osv --disable-pip -r requirements.audit.txt

  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: uv sync
      - run: scripts/hooks/generate_sbom.sh
      - run: git diff --exit-code sbom.json
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: sbom
          path: sbom.json

  test:
    # Heavy lane. Skipped ONLY on a provably pure-docs/markdown PR diff
    # (preflight ``run_heavy_python=false``). On push-to-main and on the
    # schedule (no PR diff to classify) and on any non-pure-docs PR it
    # runs unconditionally — fail-safe-unknown. (#132)
    needs: preflight
    if: >
      always() &&
      (github.event_name != 'pull_request' ||
      needs.preflight.outputs.run_heavy_python == 'true')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: dev/Dockerfile.test
          load: true
          tags: teatree-test-${{ matrix.python-version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      # ``--cov-fail-under=93`` is also configured in ``[tool.coverage.report]
      # fail_under``; passing it on the CLI makes the gate explicit at the
      # invocation site so a future ``pyproject.toml`` edit can't silently
      # disarm CI. Both must agree — ``tests/test_coverage_floor_guard.py``
      # locks the floor value.
      - run: >
          docker run --rm
          -v "$PWD":/app
          -e UV_PROJECT_ENVIRONMENT=/tmp/.venv
          -e COVERAGE_FILE=/app/.coverage
          teatree-test-${{ matrix.python-version }}
          uv run -p ${{ matrix.python-version }} pytest --no-header -q
          -o cache_dir=/tmp/.pytest_cache
          --cov-report=xml:/app/coverage.xml
          --cov-fail-under=93
      - name: Enforce per-module coverage floors
        run: >
          docker run --rm
          -v "$PWD":/app
          -e UV_PROJECT_ENVIRONMENT=/tmp/.venv
          -e COVERAGE_FILE=/app/.coverage
          teatree-test-${{ matrix.python-version }}
          uv run -p ${{ matrix.python-version }} t3 ci coverage
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml

  eval-weekly:
    # Weekly behavioral-eval gate. The eval suite shells out to `claude -p`
    # (cost, network, model variance), so it must NOT run on every push or
    # every PR. The cadence is once a week. Two complementary paths fire it:
    #
    #   * PR path — on the FIRST pull request opened that ISO week
    #     (`first_pr_of_week.py --mode first-of-week`, order-independent,
    #     re-run safe). Covers any week that opened a PR.
    #   * Cron path — on the daily `schedule` (the shared `17 6 * * *` cron),
    #     but only when NO PR was opened this ISO week
    #     (`first_pr_of_week.py --mode no-pr-week`). Closes the gap where a
    #     PR-less week ran no eval at all. The two paths share one marker —
    #     the week's PR list — so a week the PR path already covered is never
    #     re-run on the cron (no double-run). The cron is further pinned to
    #     the ISO week's Monday so a multi-day PR-less week fires once, not
    #     every day.
    #
    # Manual on-demand runs bypass CI: the user runs `t3 eval run` /
    # `t3 eval trigger-qa` locally (also wired as the periodic local-eval
    # loop job — `EvalLocalScanner`). The GitLab mirror carries the PR-path
    # rule in `.gitlab-ci.yml` (no scheduled-pipeline equivalent there).
    if: github.event_name == 'pull_request' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      # Bounded retry: transient registry/network ReadTimeout, not a manual rerun.
      - name: Sync dependencies (retry on transient network failure)
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 30
          command: uv sync
      - name: Decide whether the weekly eval runs (PR path or cron path)
        id: gate
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          # Most-recent-first so the current ISO week is on the first page even
          # for a repo with thousands of PRs. first_pr_of_week.py also keeps the
          # newest window as a second line of defence regardless of ordering.
          gh api "repos/${{ github.repository }}/pulls?state=all&sort=created&direction=desc&per_page=100" \
            --jq '[.[] | {number: .number, created_at: .created_at}]' > prs.json || echo "[]" > prs.json
          if [ "$EVENT_NAME" = "schedule" ]; then
            # Cron path: run only in a PR-less ISO week (the PR path covers the
            # rest), and only on the ISO week's Monday so a multi-day PR-less
            # week fires the eval exactly once instead of every daily cron tick.
            if [ "$(date -u +%u)" != "1" ]; then
              echo "run_eval=false" >> "$GITHUB_OUTPUT"
            elif uv run python scripts/eval/first_pr_of_week.py --mrs-file prs.json --mode no-pr-week --skip-code 1; then
              echo "run_eval=true" >> "$GITHUB_OUTPUT"
            else
              echo "run_eval=false" >> "$GITHUB_OUTPUT"
            fi
          elif uv run python scripts/eval/first_pr_of_week.py --mrs-file prs.json --current-iid "$PR_NUMBER" --skip-code 1; then
            echo "run_eval=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_eval=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Trigger-QA (deterministic, free)
        if: steps.gate.outputs.run_eval == 'true'
        run: uv run t3 eval trigger-qa
      - name: Migrate the self-DB (the needs_db regression checks open it)
        if: steps.gate.outputs.run_eval == 'true'
        run: uv run python -m teatree migrate --no-input
      - name: Regression corpus (deterministic, free; also gated every PR via pytest)
        if: steps.gate.outputs.run_eval == 'true'
        run: uv run t3 eval regression
      # Decide whether the behavioral suite can actually execute. The runner
      # SKIPs every scenario when `claude` is not on PATH or no key is
      # configured, and a fully-skipped suite reports green with ZERO behavioral
      # coverage. When ANTHROPIC_API_KEY IS configured, arm `--require-executed`
      # so a fully-skipped run exits non-zero instead of passing decoratively
      # (souliane/teatree#1811). With no key the metered path cannot run, so the
      # suite skips and the gate stays disarmed — trigger-qa + regression above
      # carry the deterministic coverage.
      - name: Decide eval-execution enforcement
        id: eval_exec
        if: steps.gate.outputs.run_eval == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "$ANTHROPIC_API_KEY" ]; then
            echo "require_executed=--require-executed" >> "$GITHUB_OUTPUT"
          else
            echo "require_executed=" >> "$GITHUB_OUTPUT"
          fi
      # Bounded retry on a transient model/network flake; a real miss repeats and still fails fast.
      # `--backend sdk` keeps CI on the metered claude -p / ANTHROPIC_API_KEY path
      # explicitly. LOCAL `t3 eval run` defaults to the subscription backend (no API
      # spend); CI is the budgeted exception. (`--trials` already forces the sdk
      # runner, so the flag is the explicit, debuggable statement of that intent.)
      # `--require-executed` (armed only when a key is configured) fails the job
      # if the suite collected scenarios but executed none — no silent decorative pass.
      - name: Behavioral eval suite (pass@k; --require-executed armed when a key is set)
        if: steps.gate.outputs.run_eval == 'true'
        uses: nick-fields/retry@v4
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        with:
          timeout_minutes: 30
          max_attempts: 3
          retry_wait_seconds: 60
          command: uv run t3 eval run --trials 3 --require any --backend sdk ${{ steps.eval_exec.outputs.require_executed }}
