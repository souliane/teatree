# ============================================================
# CI WORKFLOW LEGEND — read before editing
# ============================================================
#
# GATE vs ADVISORY
#   Gate:     exits non-zero on failure → PR cannot merge.
#   Advisory: always exits 0 → shows up as a warning/annotation but
#             never blocks. Look for `|| true` or the job comment
#             saying "advisory" to identify advisory jobs.
#
# LOAD-BEARING NAMES (do NOT rename without a coordinated change)
#   `test (3.13)` — The check context produced by the `test` job
#       matrix entry with python-version="3.13".  Branch protection
#       lists this string by name.  The `test-shim` job deliberately
#       reproduces the same context on docs-only PRs (see below).
#       Hardcoded as REQUIRED_CHECK_NAME in
#       src/teatree/loop/scanners/pr_sweep.py.
#   `uv-audit`  — The job key used as UV_AUDIT_CHECK_NAME in
#       src/teatree/loop/scanners/pr_sweep.py for the PR-sweep
#       scanner's fallback escape hatch.  Rename breaks the scanner.
#
# THE `preflight` JOB — diff-scoped lane classifier
#   Reads the PR's file diff and exports two booleans:
#     run_heavy_python — true unless the diff is PROVABLY pure docs/markdown.
#     all              — always-run lane flag (currently unused by downstream).
#   Only runs on pull_request events (no base to diff on push/schedule).
#   The only sanctioned skip driven by preflight is the HEAVY `test` +
#   `mutation-diff` lanes on a provably pure-docs PR.  Every security,
#   quality, and docs gate ignores preflight and runs unconditionally.
#   Unknown/ambiguous paths always force run_heavy_python=true
#   (fail-safe-unknown, souliane/teatree#132).
#
# THE `test-shim` PATTERN
#   Branch protection requires `test (3.13)` on every PR.  When preflight
#   decides run_heavy_python=false (pure-docs diff), the real `test` job is
#   skipped and never emits that context — leaving the PR permanently pending.
#   `test-shim` fires in exactly that scenario: it sets `name: test` + the
#   same matrix so GitHub sees an identical `test (3.13)` context from a
#   no-op step.  The two jobs have mutually exclusive `if:` conditions so
#   they can never both report in the same run.
#
# JOB GROUPS (in order of appearance below)
#   1. Lane routing          — preflight
#   2. Fast static checks    — lint, blueprint-cross-pr, blueprint-size-cross-pr
#   3. Docs integrity        — doc-update-gate, comment-density-warning,
#                              docs-drift
#   4. Advisory signals      — semgrep-regressions, test-shape, test-path-mirror
#   5. Test suite            — test, test-shim
#   6. Architecture / quality fitness gates — mutation-diff, mutation-weekly,
#                              banned-terms-tree
#   7. Security & supply chain — uv-audit, sbom
#   8. Metered / scheduled   — eval-weekly
# ============================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Daily full-tree banned-brand backstop (#1570). The diff-only gate
    # cannot see a brand name already committed; this catches a pre-existing
    # leak even when no new diff touches it.
    - cron: "17 6 * * *"
  workflow_dispatch:
    # On-demand manual run of the weekly behavioral-eval gate. The weekly
    # cadence (first PR of the ISO week or the Sunday cron) means a maintainer
    # who wants the suite at an arbitrary time has no CI path otherwise. A
    # dispatch forces the eval to run unconditionally (see the eval-weekly gate
    # step). The backend input picks the AI-lane runner: sdk (metered claude -p,
    # the CI default) requires ANTHROPIC_API_KEY.
    inputs:
      backend:
        description: "AI-lane backend for the manual run (sdk = metered claude -p)."
        required: false
        default: sdk
        type: string

jobs:

  # ── 1. Lane routing ────────────────────────────────────────────────────────

  # GATE (PR-only): classifies the diff into heavy vs docs-only lanes; exports
  # run_heavy_python so downstream jobs can skip safely on pure-docs PRs.
  preflight:
    # Diff-scoped lane classifier with FAIL-SAFE-UNKNOWN routing
    # (souliane/teatree#132). Classifies the PR diff into lanes and
    # exports booleans the heavy downstream jobs gate on. The ONLY
    # sanctioned skip is a provably pure-docs/markdown diff, which may
    # skip the HEAVY ``test`` + ``mutation-diff`` lanes. Any unrecognised
    # path, any python change, or any config/CI/semgrep change forces
    # ``run_heavy_python=true`` (run everything) — uncertainty never
    # skips. Security/quality gates (semgrep, sbom, uv-audit) and the
    # docs gates are NOT gated here; they always run.
    #
    # On push-to-main and on the schedule there is no base to diff, so
    # this job is PR-only and the downstream ``if:`` conditions run the
    # heavy lanes unconditionally on non-PR events.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      run_heavy_python: ${{ steps.classify.outputs.run_heavy_python }}
      all: ${{ steps.classify.outputs.all }}
    steps:
      - uses: actions/checkout@v6
        with:
          # fetch-depth: 0 so the PR-vs-base ``git diff`` resolves.
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - name: Classify the PR diff into CI lanes
        id: classify
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch --no-tags origin "$BASE_REF"
          # Fail-safe: if the diff command errors, feed an empty list,
          # which the classifier maps to all=true (run everything).
          git diff --name-only "origin/$BASE_REF...HEAD" > changed_paths.txt || true
          uv run python scripts/ci/changed_lanes.py < changed_paths.txt

  # ── 2. Fast static checks ──────────────────────────────────────────────────

  # GATE: ruff/prek lint + migration-graph linearity; runs on every push and PR.
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: uv sync
      - uses: j178/prek-action@v2
        env:
          SKIP: pytest,uv-audit,cyclonedx-sbom
      # Migration-graph linearity gate. Two PRs branching a migration off
      # the same parent each pass locally and pass their own CI, then merge
      # into a forked graph with multiple leaf nodes that ``migrate`` refuses
      # to run. ``makemigrations --check`` raises ``Conflicting migrations
      # detected`` (exit 1) on a forked graph, failing the PR before it lands.
      - run: uv run python manage.py makemigrations --check --dry-run

  # GATE (PR-only): catches two concurrent PRs both adding the same §17.N
  # invariant number — local pre-commit can't see sibling PRs.
  blueprint-cross-pr:
    # Cross-PR §17.1 invariant-numbering gate (souliane/teatree#1288).
    # The pre-commit hook is tree-local; two concurrent PRs each adding
    # the same §17.N pass locally and pass each PR's CI. This step reads
    # BLUEPRINT.md at base (origin/main) and at HEAD and fails when the
    # PR introduces a number the base also added since the merge-base.
    # Only runs on pull_request events because push-to-main has nothing
    # to diff against and the underlying hook covers the merge result.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # fetch-depth: 0 so `git merge-base origin/main HEAD` resolves.
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: uv sync
      - name: Check for BLUEPRINT.md change in this PR
        id: blueprint_diff
        run: |
          if git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -qx 'BLUEPRINT.md'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi
      - name: §17.1 invariant-numbering cross-PR check
        if: steps.blueprint_diff.outputs.changed == 'true'
        run: uv run python scripts/hooks/check_blueprint_invariant_numbering.py --ci --base-ref=origin/${{ github.base_ref }}

  # GATE (PR-only): fails when this PR alone grows BLUEPRINT.md past its
  # per-PR byte-delta allowance; concurrent growth on main cannot red an
  # innocent PR (race-free delta comparison vs the merge-base).
  blueprint-size-cross-pr:
    # Delta-based, race-free BLUEPRINT size gate (souliane/teatree#2040). The
    # gate fails only when the PR's OWN diff grows the corpus past the per-PR
    # allowance vs the merge-base — concurrent main growth between branch-point
    # and merge can never red an innocent PR. Absolute caps are warn-only.
    # Only runs on pull_request: push-to-main has nothing to diff against and
    # the pre-commit hook covers the merge result.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # fetch-depth: 0 so `git merge-base origin/main HEAD` resolves.
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: uv sync
      - name: BLUEPRINT per-PR size-delta check
        run: uv run python scripts/hooks/check_blueprint_size_budget.py --ci --base-ref=origin/${{ github.base_ref }}

  # ── 3. Docs integrity ──────────────────────────────────────────────────────

  # GATE (PR-only): re-runs the doc-update pre-push hook on the PR diff so an
  # agent that bypasses prek still trips the gate.
  doc-update-gate:
    # Deterministic doc-update gate (souliane/teatree#1461). The
    # pre-push hook runs against staged changes; CI re-runs the same
    # check on the PR diff so an agent that bypasses prek still trips
    # the gate. Reads the PR-vs-base diff into the git index so the
    # hook's ``git diff --cached`` query sees the PR contents.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: uv sync
      - name: Stage PR diff against base
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch --no-tags origin "${BASE_REF}"
          git reset --soft FETCH_HEAD
      - run: uv run python scripts/hooks/check_doc_update.py

  # ADVISORY (PR-only): warns about comment-dense files; always exits 0 so it
  # never blocks a PR — signal only.
  comment-density-warning:
    # Near-zero-comments check (souliane/teatree#1369). Advisory: the script
    # prints any comment-dense file as a warning and exits 0, so the job
    # never fails the pipeline. The pre-push hook surfaces the same warning
    # against staged changes; CI re-runs the SAME check on the PR diff so the
    # signal is visible on every PR. Stages the PR-vs-base diff into the index
    # so the hook's ``git diff --cached`` query sees the PR contents —
    # identical code path to prek and to ``t3 tool comment-density --staged``.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: uv sync
      - name: Stage PR diff against base
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch --no-tags origin "${BASE_REF}"
          git reset --soft FETCH_HEAD
      - run: uv run python scripts/hooks/check_comment_density.py

  # GATE: regenerates all generated docs and runs mkdocs --strict; fails if
  # committed output is stale or if any link/nav target is broken.
  docs-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: uv sync --group docs
      # Regenerate every generated reference page and the CLI reference;
      # fail if the committed output is stale so the docs site never
      # drifts from the code. See souliane/teatree#890.
      - run: uv run python manage.py generate_all_docs
      - run: uv run python scripts/hooks/generate_cli_reference.py
      - run: git diff --exit-code docs/generated
      # A strict build is the second half of the gate: a broken link or
      # missing nav target fails CI instead of shipping a broken site.
      - run: uv run mkdocs build --strict

  # ── 4. Advisory signals ────────────────────────────────────────────────────

  # ADVISORY (PR-only): runs the warn-set semgrep rules and always exits 0;
  # a finding is visible in CI output but does not block the PR.
  semgrep-regressions:
    # Advisory warn-set scan for the named regression-detector rules
    # (souliane/teatree#126). The blocking set rides the prek step above
    # (full-tree, --error, fails CI on a finding). This job runs the WARN
    # config and ALWAYS exits 0, so a still-open regression's findings are
    # visible on every PR without gating — mirrors comment-density-warning.
    # Each warn rule flips warn/ -> blocking/ in its bug's fix PR.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: uv sync
      - name: Warn-set regression scan (advisory; never fails)
        run: uvx semgrep@1.165.0 scan --config .semgrep/warn || true

  # ADVISORY: reports near-duplicate test functions and test-to-source ratio;
  # default mode exits 0 (warn-only); flip to "block" in pyproject.toml to gate.
  test-shape:
    # Conservative, report-first test-shape check (near-duplicate test
    # functions + test:source ratio regression vs the committed baseline in
    # [tool.teatree.test_shape]). Default mode is "warn" — the command exits
    # 0 and the job is advisory. Flipping mode to "block" in pyproject.toml
    # makes the same command exit non-zero, promoting this job to a gate
    # without any workflow change. Never a PreToolUse gate; it can never lock
    # the agent's tools.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: uv sync
      - name: Test-shape report
        run: uv run t3 tool test-shape --root .

  # ADVISORY: ratchet that fails only when a NEW mis-pathed test file appears
  # (live count exceeds the committed baseline); never blocks on pre-existing
  # violations; baseline trends toward 0 as the relocation sweep proceeds.
  test-path-mirror:
    # Forward-guard: every test file mirrors its src/teatree/<pkg>/... module
    # path as tests/teatree_<pkg>/... ([tool.teatree.test_path_mirror]). The
    # verdict is a baseline ratchet — RED only when the live mis-pathed count
    # EXCEEDS the committed baseline, so a NEW mis-pathed file fails CI while the
    # documented floor (files predating the convention) never does. The baseline
    # ratchets toward 0 as the relocation sweep proceeds. Never a PreToolUse
    # gate; it can never lock the agent's tools.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: uv sync
      - name: Test-path-mirror ratchet
        run: uv run t3 tool test-path-mirror --root .

  # ── 5. Test suite ──────────────────────────────────────────────────────────

  # GATE (heavy lane): full pytest suite in Docker + per-module coverage floors.
  # Skipped ONLY on a provably pure-docs PR diff (preflight run_heavy_python=false);
  # always runs on push-to-main, schedule, and any non-pure-docs PR.
  # LOAD-BEARING: the job key + matrix produce the `test (3.13)` check context
  # that branch protection requires — do NOT rename without updating protection.
  test:
    # Heavy lane. Skipped ONLY on a provably pure-docs/markdown PR diff
    # (preflight ``run_heavy_python=false``). On push-to-main and on the
    # schedule (no PR diff to classify) and on any non-pure-docs PR it
    # runs unconditionally — fail-safe-unknown. (#132)
    needs: preflight
    if: >
      always() &&
      (github.event_name != 'pull_request' ||
      needs.preflight.outputs.run_heavy_python == 'true')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: dev/Dockerfile.test
          load: true
          tags: teatree-test-${{ matrix.python-version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      # ``--cov-fail-under=93`` is also configured in ``[tool.coverage.report]
      # fail_under``; passing it on the CLI makes the gate explicit at the
      # invocation site so a future ``pyproject.toml`` edit can't silently
      # disarm CI. Both must agree — ``tests/test_coverage_floor_guard.py``
      # locks the floor value.
      - run: >
          docker run --rm
          -v "$PWD":/app
          -e UV_PROJECT_ENVIRONMENT=/tmp/.venv
          -e COVERAGE_FILE=/app/.coverage
          teatree-test-${{ matrix.python-version }}
          uv run -p ${{ matrix.python-version }} pytest --no-header -q
          -o cache_dir=/tmp/.pytest_cache
          --cov-report=xml:/app/coverage.xml
          --cov-fail-under=93
      - name: Enforce per-module coverage floors
        run: >
          docker run --rm
          -v "$PWD":/app
          -e UV_PROJECT_ENVIRONMENT=/tmp/.venv
          -e COVERAGE_FILE=/app/.coverage
          teatree-test-${{ matrix.python-version }}
          uv run -p ${{ matrix.python-version }} t3 ci coverage
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-${{ matrix.python-version }}
          path: coverage.xml

  # GATE (shim): emits the load-bearing `test (3.13)` required context on
  # pure-docs PRs where the real `test` job is path-skipped; a no-op step
  # only — never runs tests. Mutually exclusive with the `test` job above.
  test-shim:
    # Required-context shim for pure-docs PRs (souliane/teatree#1942).
    # Branch protection requires the context `test (3.13)`. The heavy `test`
    # lane is path-skipped on a provably pure-docs diff (preflight
    # run_heavy_python == 'false'), so it NEVER reports that context — and a
    # never-reported required context leaves the PR permanently pending /
    # BLOCKED. This job reports a passing `test (3.13)` ONLY in that exact
    # skip case, so a docs-only PR can merge without re-running the suite.
    #
    # It must never mask a real failure: it runs ONLY when the heavy lane was
    # path-skipped (run_heavy_python == 'false') AND only on pull_request
    # events. On push-to-main, on the schedule, and on any non-pure-docs PR
    # the heavy `test` lane runs and owns the `test (3.13)` context; this
    # shim is skipped (its `if` is false), so the two can never both report.
    #
    # The `name: test` + matrix `python-version: ["3.13"]` makes the produced
    # check context the exact string `test (3.13)` the branch protection
    # requires — verify with `gh pr checks` after this lands.
    name: test
    needs: preflight
    if: >
      github.event_name == 'pull_request' &&
      needs.preflight.outputs.run_heavy_python == 'false'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13"]
    steps:
      - name: Report the required test context for a path-skipped docs-only PR
        run: >
          echo "Pure-docs PR: the heavy test lane was path-skipped
          (run_heavy_python=false). Emitting a passing 'test (${{ matrix.python-version }})'
          so the required status context is satisfied without re-running the suite."

  # ── 6. Architecture / quality fitness gates ────────────────────────────────

  # GATE (heavy lane, PR-only): diff-scoped mutation testing on safety modules;
  # skipped on pure-docs PRs; most PRs touch no safety module and pass instantly.
  mutation-diff:
    # Scoped (narrow) mutation testing, PR-only (souliane/teatree#131).
    # ``t3 mutation run`` diffs the PR vs base, intersects with
    # ``[tool.teatree.mutation].high_value_modules``, and mutates ONLY the
    # touched safety modules — a no-op (fast pass) when the PR touches none, so
    # most PRs pay nothing. Programmatic ratchet: the command fails when the
    # surviving-mutant count exceeds the recorded ``baseline_surviving`` total,
    # in BOTH ``warn`` and ``block`` mode (the count may only ever shrink) —
    # survivors at-or-below baseline still pass. Flipping ``mode`` to "block" is
    # a later follow-up (gate on survivors existing at all), no workflow change.
    # ``t3 mutation run --all --update-baseline`` tightens the recorded counts.
    # The 10-min cap bounds a pathological run.
    #
    # Heavy lane: PR-only AND skipped on a provably pure-docs diff
    # (preflight ``run_heavy_python=false``). Any non-pure-docs PR runs
    # it — fail-safe-unknown. (#132)
    needs: preflight
    if: >
      always() &&
      github.event_name == 'pull_request' &&
      needs.preflight.outputs.run_heavy_python == 'true'
    timeout-minutes: 12
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # fetch-depth: 0 so ``git merge-base origin/main HEAD`` resolves.
          fetch-depth: 0
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: uv sync --group mutation
      - name: Diff-scoped mutation run (warn-first; 10-min cap)
        env:
          BASE_REF: ${{ github.base_ref }}
        run: |
          git fetch --no-tags origin "$BASE_REF"
          timeout 600 uv run t3 mutation run --target "origin/$BASE_REF"

  # GATE (weekly cadence, PR-only): full-registry mutation run on the first PR
  # of each ISO week; a no-op (skipped) on every subsequent PR that week.
  mutation-weekly:
    # Weekly full-scope mutation run over the whole registry (not just the
    # diff). Like the eval suite, it is metered (slow), so it runs once a week
    # on the FIRST PR opened that ISO week — ``scripts/eval/first_pr_of_week.py``
    # makes that decision (order-independent, re-run safe). Warn-first as above;
    # mutates every declared safety module by passing each registry path as the
    # changed set.
    if: github.event_name == 'pull_request'
    timeout-minutes: 30
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: uv sync --group mutation
      - name: Decide whether this is the first PR of the ISO week
        id: gate
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          gh api "repos/${{ github.repository }}/pulls?state=all&sort=created&direction=desc&per_page=100" \
            --jq '[.[] | {number: .number, created_at: .created_at}]' > prs.json || echo "[]" > prs.json
          if uv run python scripts/eval/first_pr_of_week.py --mrs-file prs.json --current-iid "$PR_NUMBER" --skip-code 1; then
            echo "run_mutation=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_mutation=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Full-scope mutation run (warn-first)
        if: steps.gate.outputs.run_mutation == 'true'
        run: uv run t3 mutation run --all

  # GATE (push + schedule only): full-tree scan for committed customer brand names;
  # runs daily and on push-to-main; skipped on PRs (diff-only gate handles PRs).
  banned-terms-tree:
    # Full-tree banned-brand backstop (souliane/teatree#1570). The
    # diff/payload banned-terms gate only ever sees a *change*; a brand
    # name ALREADY committed never appears in a post-landing diff. This
    # job scans every git-tracked file's content for the high-confidence
    # brand list on push-to-main and on a daily schedule, failing CI if a
    # brand is present. The public repo ships with no brands; the list is
    # supplied from the TEATREE_BANNED_BRANDS secret so no tenant name is
    # ever committed. With no secret configured the scan is a clean no-op.
    if: github.event_name == 'push' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: uv sync
      - name: Full-tree banned-brand scan
        env:
          TEATREE_BANNED_BRANDS: ${{ secrets.TEATREE_BANNED_BRANDS }}
        run: uv run t3 banned-terms scan-tree --repo-root .

  # ── 7. Security & supply chain ─────────────────────────────────────────────

  # GATE: dependency vulnerability audit via pip-audit (OSV backend). Job key
  # `uv-audit` is LOAD-BEARING — hardcoded as UV_AUDIT_CHECK_NAME in
  # src/teatree/loop/scanners/pr_sweep.py. The inner tool is pip-audit, not
  # `uv audit`, because `uv audit` has a known OSV parser regression (#19492).
  uv-audit:
    # Job name preserved for compatibility with the PR-sweep scanner's
    # ``--fallback-uv-audit`` escape hatch (see
    # ``src/teatree/loop/scanners/pr_sweep.py`` ``UV_AUDIT_CHECK_NAME``).
    # The inner command is ``pip-audit`` because ``uv audit`` is still
    # a preview feature and astral-sh/uv#19492 (OSV parser regression)
    # turned every PR red. ``pip-audit`` uses the same OSV backend and
    # is production-stable. See souliane/teatree#1264.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: uv sync
      - run: uv export --format requirements-txt --no-emit-project --no-emit-workspace --no-header --quiet > requirements.audit.txt
      - run: uvx pip-audit --strict --vulnerability-service osv --disable-pip -r requirements.audit.txt

  # GATE: regenerates dist/sbom.json and fails if the committed copy is stale;
  # also uploads the SBOM as a workflow artifact for supply-chain visibility.
  sbom:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      - run: uv sync
      - run: scripts/hooks/generate_sbom.sh
      - run: git diff --exit-code dist/sbom.json
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: sbom
          path: dist/sbom.json

  # ── 8. Metered / scheduled ─────────────────────────────────────────────────

  # GATE (weekly + on-demand): AI behavioral eval suite (metered, calls claude -p).
  # Runs on the first PR of each ISO week, the Sunday cron backstop for PR-less
  # weeks, and unconditionally on workflow_dispatch. Skipped (internal gate step)
  # on every other PR and every non-Sunday cron tick.
  eval-weekly:
    # Weekly behavioral-eval gate. The eval suite shells out to `claude -p`
    # (cost, network, model variance), so it must NOT run on every push or
    # every PR. The cadence is once a week. Two complementary paths fire it:
    #
    #   * PR path — on the FIRST pull request opened that ISO week
    #     (`first_pr_of_week.py --mode first-of-week`, order-independent,
    #     re-run safe). This is the PRIMARY path; it covers any week that
    #     opened a PR.
    #   * Cron path — a genuine last-resort backstop for a PR-LESS week,
    #     pinned to the ISO week's LAST day (Sunday, `date -u +%u` == 7) on
    #     the shared daily `17 6 * * *` cron, and only when NO PR was opened
    #     this ISO week (`first_pr_of_week.py --mode no-pr-week`). Closes the
    #     gap where a PR-less week ran no eval at all.
    #
    # Ordering / double-run: the two paths share one marker — the week's PR
    # list — and the cron fires only at end-of-week. By Sunday a week with no
    # PR has almost certainly produced none, so the backstop runs ~once for
    # that week and the PR path never fired (it had no PR to fire on). The
    # ONLY residual overlap is a PR opened on Sunday AFTER the 06:17 UTC cron
    # already ran: that PR is then the first-of-week and its PR-path run is a
    # second run for that ISO week. This is an accepted, sub-day sliver for a
    # last-resort backstop; the zero-run direction (PR-less week → no eval at
    # all) is the bug this closes and is fully eliminated.
    #
    # On-demand: a `workflow_dispatch` event runs the suite unconditionally
    # (the gate step below forces run_eval=true for it). Local runs still work
    # via `t3 eval run` / `t3 eval skill-triggers` (also the periodic local-eval
    # loop job — `EvalLocalScanner`). The GitLab mirror carries the PR-path rule
    # and a `when: manual` eval job in `.gitlab-ci.yml`.
    if: >
      github.event_name == 'pull_request' ||
      github.event_name == 'schedule' ||
      github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"
      # Bounded retry: transient registry/network ReadTimeout, not a manual rerun.
      - name: Sync dependencies (retry on transient network failure)
        uses: nick-fields/retry@v4
        with:
          timeout_minutes: 10
          max_attempts: 3
          retry_wait_seconds: 30
          command: uv sync
      - name: Decide whether the weekly eval runs (PR path or cron path)
        id: gate
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          # Most-recent-first so the current ISO week is on the first page even
          # for a repo with thousands of PRs. first_pr_of_week.py also keeps the
          # newest window as a second line of defence regardless of ordering.
          gh api "repos/${{ github.repository }}/pulls?state=all&sort=created&direction=desc&per_page=100" \
            --jq '[.[] | {number: .number, created_at: .created_at}]' > prs.json || echo "[]" > prs.json
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            # Manual on-demand run: always run, no first-of-week gating.
            echo "run_eval=true" >> "$GITHUB_OUTPUT"
          elif [ "$EVENT_NAME" = "schedule" ]; then
            # Cron path: last-resort backstop for a PR-less ISO week. Pinned to
            # the week's LAST day (Sunday, %u == 7) so it cannot preempt the
            # PR path mid-week (which would let a later first-PR run double-fire)
            # and so it fires at most once per PR-less week, not every daily tick.
            if [ "$(date -u +%u)" != "7" ]; then
              echo "run_eval=false" >> "$GITHUB_OUTPUT"
            elif uv run python scripts/eval/first_pr_of_week.py --mrs-file prs.json --mode no-pr-week --skip-code 1; then
              echo "run_eval=true" >> "$GITHUB_OUTPUT"
            else
              echo "run_eval=false" >> "$GITHUB_OUTPUT"
            fi
          elif uv run python scripts/eval/first_pr_of_week.py --mrs-file prs.json --current-iid "$PR_NUMBER" --skip-code 1; then
            echo "run_eval=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_eval=false" >> "$GITHUB_OUTPUT"
          fi
      # The deterministic lanes (skill-triggers, pinned-regressions) are NOT run
      # standalone here: they gate every push via prek (eval-skill-triggers
      # commit-stage, eval-pinned-regressions push-stage) and the regression
      # corpus is also asserted every PR via pytest. One source of truth — this
      # weekly job owns only the metered AI suite below.
      - name: Migrate the self-DB (the eval run-history ledger persists into it)
        if: steps.gate.outputs.run_eval == 'true'
        run: uv run python -m teatree migrate --no-input
      # Decide whether the behavioral suite can actually execute. The runner
      # SKIPs every scenario when `claude` is not on PATH or no key is
      # configured, and a fully-skipped suite reports green with ZERO behavioral
      # coverage. When ANTHROPIC_API_KEY IS configured, arm `--require-executed`
      # so a fully-skipped run exits non-zero instead of passing decoratively
      # (souliane/teatree#1811). With no key the metered path cannot run, so the
      # suite skips and the gate stays disarmed — the deterministic lanes
      # (prek + pytest) carry the token-free coverage.
      - name: Decide eval-execution enforcement
        id: eval_exec
        if: steps.gate.outputs.run_eval == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          if [ -n "$ANTHROPIC_API_KEY" ]; then
            echo "require_executed=--require-executed" >> "$GITHUB_OUTPUT"
          else
            echo "require_executed=" >> "$GITHUB_OUTPUT"
          fi
      # Bounded retry on a transient model/network flake; a real miss repeats and still fails fast.
      # `--backend` keeps CI on the metered claude -p / ANTHROPIC_API_KEY path explicitly
      # (sdk default). A workflow_dispatch run may override it via the backend input; the
      # empty PR/schedule input falls back to sdk. LOCAL `t3 eval run` defaults to the
      # subscription backend (no API spend); CI is the budgeted exception.
      # `--require-executed` (armed only when a key is configured) fails the job
      # if the suite collected scenarios but executed none — no silent decorative pass.
      - name: Behavioral eval suite (pass@k; --require-executed armed when a key is set)
        if: steps.gate.outputs.run_eval == 'true'
        uses: nick-fields/retry@v4
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EVAL_BACKEND: ${{ inputs.backend || 'sdk' }}
        with:
          timeout_minutes: 30
          max_attempts: 3
          retry_wait_seconds: 60
          command: uv run t3 eval run --trials 3 --require any --backend "$EVAL_BACKEND" ${{ steps.eval_exec.outputs.require_executed }}
