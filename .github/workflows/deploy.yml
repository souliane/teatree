# Teatree headless deploy to an existing box over direct SSH.
# Runs on every push to main (each merged PR) plus the manual trigger; the
# deploy script is idempotent and the concurrency group serializes runs, so a
# merge train converges the box to the newest main. The box is reached by a
# fixed host/IP held in a secret (DEPLOY_SSH_HOST) — no cloud API resolves it,
# so this works for a plain HostKey / bare-metal / any-provider box, not just
# Hetzner Cloud. No box-identifying info lives here — the host/IP, SSH
# user/port, host key, and private key all come from secrets, and the host/IP
# is masked out of the logs. Uses no third-party actions (nothing to SHA-pin).
name: Deploy teatree

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read

# Deploy debounce (drain-then-deploy Piece A). A single fixed group serializes
# every deploy to the one box, and `cancel-in-progress: false` NEVER cancels a
# RUNNING convergence mid-run — a merge train coalesces into: the in-flight run
# finishes, and GitHub keeps only the NEWEST queued run (superseding older queued
# ones), which `deploy/deploy.sh` fast-forwards to the latest main. So a burst of
# merges converges the box to newest main with exactly one extra run, and an
# in-flight drain (deploy.sh quiesces the worker and waits for in-flight agents)
# is never interrupted. Both keys are pinned by tests/test_deploy_rolling_drain.py.
concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Validate required secrets
        env:
          DEPLOY_SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
          DEPLOY_SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
          DEPLOY_SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_SSH_KNOWN_HOSTS: ${{ secrets.DEPLOY_SSH_KNOWN_HOSTS }}
        run: |
          # The five DEPLOY_SSH_* secrets are the direct-SSH connection plane and
          # are strictly required — the box is unreachable without every one.
          # Other credentials are deliberately NOT required workflow secrets: the
          # box holds them in its gpg-encrypted `pass` store, sourced at boot:
          #   * CLAUDE_CODE_OAUTH_TOKEN — anthropic/<account>/oauth-token
          #     (anthropic_oauth_pass_paths routing).
          #   * TEATREE_GH_TOKEN / T3_ADMIN_PASSWORD — sourced by the entrypoint
          #     (#3454), so no plaintext GitHub token or admin password is written
          #     to teatree.env. See deploy/README.md § credential provisioning.
          # The entrypoint preflight fails loud when a required credential has
          # NEITHER source, so omitting the secret cannot silently deploy a dead
          # loop.
          missing=0
          for name in DEPLOY_SSH_HOST DEPLOY_SSH_USER DEPLOY_SSH_PORT \
                      DEPLOY_SSH_KEY DEPLOY_SSH_KNOWN_HOSTS; do
            if [ -z "${!name}" ]; then
              echo "MISSING SECRET $name - set it under Settings > Secrets and re-run"
              missing=1
            fi
          done
          [ "$missing" -eq 0 ] || exit 1

      - name: Mask deploy host
        env:
          DEPLOY_SSH_HOST: ${{ secrets.DEPLOY_SSH_HOST }}
        run: |
          echo "::add-mask::$DEPLOY_SSH_HOST"
          echo "SERVER_HOST=$DEPLOY_SSH_HOST" >> "$GITHUB_ENV"

      - name: Configure SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_SSH_KNOWN_HOSTS: ${{ secrets.DEPLOY_SSH_KNOWN_HOSTS }}
        run: |
          mkdir -p "$HOME/.ssh"
          umask 077
          printf '%s\n' "$DEPLOY_SSH_KEY" > "$HOME/.ssh/id_deploy"
          chmod 600 "$HOME/.ssh/id_deploy"
          printf '%s\n' "$DEPLOY_SSH_KNOWN_HOSTS" > "$HOME/.ssh/known_hosts"
          chmod 600 "$HOME/.ssh/known_hosts"

      - name: Write box secrets file and deploy
        env:
          SSH_USER: ${{ secrets.DEPLOY_SSH_USER }}
          SSH_PORT: ${{ secrets.DEPLOY_SSH_PORT }}
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          T3_ADMIN_USER: ${{ secrets.T3_ADMIN_USER }}
          GIT_AUTHOR_NAME: ${{ secrets.GIT_AUTHOR_NAME }}
          GIT_AUTHOR_EMAIL: ${{ secrets.GIT_AUTHOR_EMAIL }}
          # Repo VARIABLES (not secrets): the box's fleet-scoped loop split,
          # consumed by the entrypoint's apply_fleet_loop_policy. ENABLED loops
          # are force-enabled here (clearing any stale hold — this box HOSTS the
          # DM-only `inbox` loop); DISABLED loops are forced off (the colleague/
          # human-facing `review`/`directive_loop` the laptop owns). The fallbacks
          # are the box's shipped role; the entrypoint validates every name and
          # fails the deploy loudly on a typo.
          TEATREE_ENABLED_LOOPS: ${{ vars.TEATREE_ENABLED_LOOPS || 'inbox' }}
          TEATREE_DISABLED_LOOPS: ${{ vars.TEATREE_DISABLED_LOOPS || 'review,directive_loop' }}
          # Repo VARIABLE: when 'true' the box's teatree.env gets NO Anthropic
          # env token even though the secret exists (the eval workflows still
          # need the secret) — the env source beats the pass rotation in
          # llm/credentials, so omitting the line is what hands the box to its
          # provisioned pass store.
          TEATREE_BOX_USE_PASS: ${{ vars.TEATREE_BOX_USE_PASS || 'false' }}
        run: |
          SSH="ssh -p ${SSH_PORT} -i ${HOME}/.ssh/id_deploy -o UserKnownHostsFile=${HOME}/.ssh/known_hosts -o StrictHostKeyChecking=yes -o ConnectTimeout=20"
          TARGET="${SSH_USER}@${SERVER_HOST}"

          # 1. Ensure the build-context checkout exists on the box.
          $SSH "$TARGET" 'set -e; REMOTE_DIR="$HOME/teatree-deploy"; if [ ! -d "$REMOTE_DIR/.git" ]; then git clone https://github.com/souliane/teatree.git "$REMOTE_DIR"; fi; mkdir -p "$REMOTE_DIR/deploy"'

          # 2. Write the env file (piped over stdin — never on argv or in logs; mode 600).
          # The GitHub token and admin password are NOT written here: the box
          # sources them from its `pass` store at boot (#3454), keeping the
          # no-secret-on-disk invariant. The Anthropic env token is written only
          # when the secret exists; without it the box resolves credentials via its
          # pass store (option-b routing), and an absent env line is what lets the
          # pass rotation actually win.
          {
            if [ -n "$CLAUDE_CODE_OAUTH_TOKEN" ] && [ "$TEATREE_BOX_USE_PASS" != "true" ]; then
              printf 'CLAUDE_CODE_OAUTH_TOKEN=%s\n' "$CLAUDE_CODE_OAUTH_TOKEN"
            fi
            printf 'T3_ADMIN_USER=%s\n' "$T3_ADMIN_USER"
            printf 'GIT_AUTHOR_NAME=%s\n' "$GIT_AUTHOR_NAME"
            printf 'GIT_AUTHOR_EMAIL=%s\n' "$GIT_AUTHOR_EMAIL"
            printf 'TEATREE_ENABLED_LOOPS=%s\n' "$TEATREE_ENABLED_LOOPS"
            printf 'TEATREE_DISABLED_LOOPS=%s\n' "$TEATREE_DISABLED_LOOPS"
          } | $SSH "$TARGET" 'umask 077; cat > "$HOME/teatree-deploy/deploy/teatree.env"'

          # 3. Converge the stack (deploy.sh reads no secrets — compose's env_file does).
          $SSH "$TARGET" 'cd "$HOME/teatree-deploy" && bash deploy/deploy.sh'
