# TRIGGER: push to main only — regenerate the docs and deploy them to GitHub Pages
# on every merge.
name: Push · Publish docs (Pages)

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v7.0.1
      - uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7
        with:
          enable-cache: true
      - uses: actions/setup-python@5fda3b95a4ea91299a34e894583c3862153e4b97  # v6
        with:
          python-version: "3.13"
      - run: uv sync --group docs
      # The generated reference pages are committed; regenerate so a
      # deploy from a slightly stale main still ships current docs.
      - run: uv run python manage.py generate_all_docs
      - run: uv run python scripts/hooks/generate_cli_reference.py
      - run: uv run python scripts/hooks/generate_fsm_diagrams.py
      - run: uv run python scripts/hooks/generate_dashboard_snapshot.py
      - run: uv run python scripts/hooks/generate_cli_output_snapshot.py
      - run: uv run mkdocs build --strict
      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d  # v6
      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9  # v5
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5
