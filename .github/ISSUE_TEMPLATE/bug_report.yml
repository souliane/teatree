name: Bug report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the bug. Include screenshots if relevant.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: How can we trigger this?
      placeholder: |
        1. Run `t3 ...`
        2. Open dashboard
        3. See error
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Relevant logs, template/view names, or related issues.
