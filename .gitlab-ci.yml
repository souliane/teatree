# Metered behavioral-eval gate (souliane/teatree) — GitLab mirror.
#
# The eval suite shells out to `claude -p` (cost, network, model variance), so
# it must NOT run on every push or every MR. It runs on a weekly schedule
# (a GitLab pipeline schedule) and via a manual `when: manual` play button —
# never on a merge-request pipeline. This mirrors the standalone GitHub
# `.github/workflows/eval.yml` workflow.
#
# The scheduled run is GUARDED: a cheap `eval-gate` job runs first and skips the
# scheduled eval cleanly (the `eval-weekly` rule reads its `RUN_EVAL` flag) when
# NO MR merged in the lookback window since the last run — nothing new to test,
# no API spend. The manual `eval-manual` job ALWAYS runs (force; no guard). The
# "nothing new" skip is a PRE-CHECK that decides whether to invoke the eval at
# all — once invoked, `--require-executed` still makes it FAIL LOUD.
#
# NO-SILENT-GREEN ENFORCEMENT (souliane/teatree#1811 follow-up):
#   * The Claude CLI is installed and asserted (`claude --version`) BEFORE the
#     eval step — a missing binary FAILS the job, it does not skip.
#   * `--require-executed` is passed UNCONDITIONALLY (never key-gated), so a
#     collected-but-all-skipped run exits non-zero. Until ANTHROPIC_API_KEY
#     is wired the job correctly fails RED — that loud failure is intended.
#
# AUTH: the `eval_credential` knob (#2707 is REVERSED — the GitHub workflow now
# DEFAULTS to the subscription OAuth token). This GitLab lane EXPLICITLY selects
# `metered_api_key` via `T3_EVAL_CREDENTIAL` (below), because its whole purpose is
# the PERSISTED `--gate-cost-bounds` cost audit — a per-token-COST gate that is
# meaningless on the subscription lane (a subscription run bills $0, which
# `--gate-cost-bounds` treats as a fail-loud "configured scenario recorded no
# cost"). So the cost-audit lane stays metered while the general behavioral-eval
# workflow rides the plan. `ANTHROPIC_API_KEY` must be a masked GitLab CI/CD
# variable. SCHEDULE-VAR CAVEAT: a GitLab pipeline SCHEDULE carries its own
# variable set — if a schedule overrides `T3_EVAL_CREDENTIAL` (e.g. to
# subscription_oauth for a cheap window-friendly run without the cost gate) it must
# ALSO drop `--gate-cost-bounds` from that run's script, since the two are coupled.
#
# The free deterministic lanes (pinned-regressions) gate every
# push via prek and the regression corpus is asserted every MR via pytest, so
# this job owns only the metered cost-audit AI suite (one source of truth).

stages:
  - gate
  - eval

variables:
  GIT_DEPTH: "0"
  # This lane explicitly rides the metered key (the cost-audit gate needs per-token
  # cost); the GitHub behavioral-eval workflow defaults to subscription_oauth.
  T3_EVAL_CREDENTIAL: "metered_api_key"

# Shared body of the scheduled and manual eval-suite jobs — one definition so
# the two never drift (image, setup, retry, and the suite script live here only).
.eval-suite:
  image: python:3.13-slim
  before_script:
    - pip install --no-cache-dir uv
    - uv sync
    # Install the Claude CLI the metered api backend shells out to, then ASSERT
    # it. A missing binary must FAIL the job (the runner would otherwise skip
    # every scenario and report a decorative green). `claude --version` is the
    # post-install assertion that turns an install failure into a red job.
    - apt-get update && apt-get install -y --no-install-recommends nodejs npm
    - npm install -g @anthropic-ai/claude-code
    - claude --version
  # Bounded retry on transient infra classes (script_failure = a model/network ReadTimeout); a real miss still fails fast.
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure
      - api_failure
      - script_failure
  script:
    # The eval run-history ledger persists into the self-DB, so migrate it first.
    - uv run python -m teatree migrate --no-input
    # `--backend api` runs a fresh model pass; `T3_EVAL_CREDENTIAL=metered_api_key`
    # (set in `variables:` above) rides the metered key — this lane's `--gate-cost-bounds`
    # cost audit needs per-token cost (the GitHub workflow defaults to subscription OAuth,
    # #2707 reversal). LOCAL `t3 eval run` defaults to the transcript backend (no spend).
    # `--local` is intentional here: the cost-bounds gate must persist/read the
    # runner DB on this host, while the default Docker route is ephemeral and
    # rejects durable-history gates.
    # `--require-executed` is passed UNCONDITIONALLY (never key-gated): a
    # collected-but-all-skipped run exits non-zero, so the suite can never pass
    # green with zero behavioral coverage (souliane/teatree#1811).
    # `--gate-cost-bounds` checks each scenario's metered cost against the
    # CHECKED-IN ceilings in `evals/cost_bounds.yaml` (calibrated bound x
    # (1 + margin)); a scenario over its ceiling — or a configured scenario that
    # metered $0 — fails the weekly run loud. It reads the just-persisted run
    # (no `--docker` here, so the ledger is on the runner), keeping the cost gate
    # weekly/manual, off the per-MR path.
    # There is NO known-red allowance and NO shrink-only ratchet: every eval lane
    # — clean_room and under_load alike — must be GREEN. A failing under_load
    # behavioural-drift scenario reds the run outright, exactly like any clean_room
    # failure; `run --trials k` exits non-zero on ANY red scenario.
    - uv run t3 eval run --trials 3 --require any --backend api --local --require-executed --gate-cost-bounds

# Scheduled pre-check: skip the weekly eval cleanly when nothing new merged in
# the lookback window. Writes a `RUN_EVAL` dotenv flag the eval-weekly rule reads.
# Only runs on a schedule pipeline (the manual job is unguarded).
eval-gate:
  stage: gate
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
  image: alpine:3.20
  before_script:
    - apk add --no-cache python3 glab jq
  script:
    # Merged MRs, most-recent-first; the script answers "any merged in the window".
    - >-
      glab api "projects/$CI_PROJECT_ID/merge_requests?state=merged&order_by=updated_at&sort=desc&per_page=100"
      --paginate=false | jq '[.[] | {number: .iid, merged_at: .merged_at}]' > prs.json || echo "[]" > prs.json
    - >-
      if python3 scripts/eval/merged_prs_since.py --prs-file prs.json --days 7 --skip-code 1; then
        echo "RUN_EVAL=true" >> eval.env;
      else
        echo "RUN_EVAL=false" >> eval.env;
      fi
  artifacts:
    reports:
      dotenv: eval.env

# Weekly scheduled run. Configure a GitLab pipeline schedule (Settings → CI/CD →
# Schedules) so `$CI_PIPELINE_SOURCE == "schedule"` fires this once a week. Runs
# only when the eval-gate pre-check found something new merged (`RUN_EVAL`).
eval-weekly:
  extends: .eval-suite
  stage: eval
  needs: ["eval-gate"]
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $RUN_EVAL == "true"'
  allow_failure: false

# On-demand manual run, the GitLab mirror of the GitHub `workflow_dispatch`
# trigger. `when: manual` adds a play button so a maintainer can run the full
# suite at an arbitrary time. It is allow_failure so a manual run never blocks a
# pipeline. Shares `.eval-suite` (image, setup, retry, script) with eval-weekly.
eval-manual:
  extends: .eval-suite
  stage: eval
  rules:
    - if: '$CI_PIPELINE_SOURCE != "merge_request_event"'
      when: manual
      allow_failure: true
