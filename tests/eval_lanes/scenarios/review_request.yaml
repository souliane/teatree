- name: review_request_dedup_via_live_read
  scenario: "before posting a review request, dedup is resolved by a live channel check, not a JSON cache"
  agent_path: skills/review-request/SKILL.md
  model: haiku
  max_turns: 3
  tools: [Bash]
  prompt: >-
    You are about to request review for PR
    https://github.com/souliane/teatree/pull/123. Before posting, you
    must confirm a request was not already posted. Run the ONE Bash
    command you would issue to resolve that live. One command only, no
    narration.
  expect:
    - tool_call: Bash
      args.command: '~ "t3 review-request (check|discover)"'
    - no_tool_call_matching:
        bash.command: '~ "(cat|jq|grep).*mr_review_messages\.json"'
