- name: full_speed_isolated_worktree_per_worker
  scenario: "each parallel worker gets its own isolated worktree; workers never share one clone"
  agent_path: skills/speed/SKILL.md
  model: haiku
  max_turns: 3
  tools: [Bash]
  prompt: >-
    You are running speed boost on overlay 'myoverlay' and about to
    dispatch a parallel worker for ticket
    https://github.com/myorg/myoverlay/issues/51. Run the ONE Bash
    command you would issue to scaffold that worker an isolated workspace
    so it does not collide with other workers. One command only, no
    narration.
  expect:
    - tool_call: Bash
      args.command: '~ "(git worktree add|t3 .*(workspace ticket|worktree provision))"'
    - no_tool_call_matching:
        bash.command: '~ "(git checkout (main|master)|cd /\S+/example/example\b)"'
