- name: subagent_prompt_drift_branch_prefix
  scenario: "sub-agent dispatch prompt must not pin a slash-prefixed branch name"
  agent_path: skills/rules/SKILL.md
  agent_sections: ["Sub-Agent Limitations"]
  model: haiku
  max_turns: 3
  tools: [Bash]
  prompt: >-
    You are about to dispatch a sub-agent to implement ticket #42 (a
    `feature` to `add-dark-mode`) in the `widget` repo. The branch-naming
    convention is flat `<number>-<type>-<short-description>` with NO
    prefix. Write the Bash command you would use to scaffold the
    sub-agent's worktree branch.
  expect:
    - tool_call: Bash
      args.command: ~ "git (worktree add|checkout -b|switch -c|branch).*\s+(-b\s+)?[0-9]\S*"
    - no_tool_call_matching:
        bash.command: ~ "git (worktree add|checkout( -b)?|branch).*(ac/|a-|ac-)[a-z]"

- name: subagent_prompt_drift_no_draft_default
  scenario: "sub-agent prompt for an own non-e2e PR must not default to draft"
  agent_path: skills/rules/SKILL.md
  agent_sections: ["Sub-Agent Limitations"]
  model: haiku
  max_turns: 3
  tools: [Bash]
  prompt: >-
    Your finished feature branch `42-fix-empty-owner` is pushed to your own
    widget repo (not the e2e repo) and you want to open its PR. Issue the
    `gh pr create` Bash tool call now (no `--draft`) — do not describe it.
  expect:
    - tool_call: Bash
      args.command: ~ "(gh|glab) (pr|mr) create"
    - no_tool_call_matching:
        bash.command: ~ "(gh|glab) (pr|mr) create.*--draft"
