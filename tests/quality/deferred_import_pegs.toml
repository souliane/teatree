# Per-file deferred (function-scoped) intra-package import pegs -- the ratchet ledger (#2385 / #2413).
# A function-scoped `from teatree.core... / teatree.loop... import` hides an intra-package edge from
# tach's acyclic guard. Each key is a repo-relative source file; the value is the exact number of
# such deferred imports it may carry. Over-peg blocks (name the file); under-peg banks (lower the
# entry); a file not listed pegs at 0. Two disjoint PRs never collide: git unions independent keys;
# same-file contention surfaces as a textual conflict. The [intra_core] sum is the tach-invisible
# core-cycle floor; [intra_loop] the loop floor. Lower an entry as its edge becomes a declared tach
# sub-node edge; never raise one without the edge being genuinely load-bearing (rationale in the commit).

[intra_core]
"src/teatree/core/_checking_gather.py" = 5
"src/teatree/core/apps.py" = 2
"src/teatree/core/backend_factory.py" = 3
"src/teatree/core/checking.py" = 2
"src/teatree/core/cleanup/cleanup.py" = 1
"src/teatree/core/cost.py" = 1
