interfaces = []
forbid_circular_dependencies = true
exclude = [
  "**/*__pycache__",
  "**/*egg-info",
  "**/docs",
  "**/tests",
  "**/venv"
]
source_roots = ["tests", "src", "e2e"]
layers = [
  "interface",
  "orchestration",
  "integration",
  "domain",
  "platform",
  "foundation"
]

[[modules]]
path = "teatree.paths"
layer = "foundation"
depends_on = []

[[modules]]
path = "teatree.types"
layer = "foundation"
depends_on = []

[[modules]]
path = "teatree.config"
